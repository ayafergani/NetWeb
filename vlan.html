<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NetGuard — VLAN Management Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .vlan-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="vlan-root"></div>

    <script type="text/babel">
        const { useState } = React;

        const VLANPage = () => {
            // --- ÉTATS ---
            const [selectedVlan, setSelectedVlan] = useState(null);
            const [showCreateModal, setShowCreateModal] = useState(false);
            const [showAssignModal, setShowAssignModal] = useState(false);

            // --- DONNÉES ---
            const [vlans, setVlans] = useState([
                { id: 10, name: 'Finance', type: 'Data', ports: 'fa0/1, fa0/2', devices: 2, status: 'Active' },
                { id: 20, name: 'IT', type: 'Data', ports: 'fa0/3', devices: 1, status: 'Active' },
                { id: 99, name: 'Quarantine', type: 'Security', ports: 'fa0/4', devices: 1, status: 'Alert', reason: 'Intrusion detected (Snort)', srcIp: '192.168.1.10' }
            ]);

            return (
                <div className="p-8 max-w-[1600px] mx-auto animate-in fade-in duration-500">
                    
                    {/* HEADER SECTION */}
                    <div className="flex justify-between items-end mb-8">
                        <div>
                            <button 
                                onClick={() => window.location.href = 'network-dashboard.html'}
                                className="text-indigo-600 text-sm font-bold hover:text-indigo-800 transition-colors mb-2 flex items-center gap-1"
                            >
                                <span>←</span> Retour au Dashboard
                            </button>
                            <h1 className="text-3xl font-bold text-slate-800 tracking-tight">VLAN Management</h1>
                            <p className="text-slate-500 mt-1">Gérez la segmentation réseau et la sécurité des ports Cisco.</p>
                        </div>
                        <div className="flex gap-3">
                            <button className="px-5 py-2.5 bg-white border border-slate-200 rounded-xl font-semibold text-slate-700 shadow-sm hover:bg-slate-50 transition-all flex items-center gap-2">
                                <span className="text-lg">↻</span> Refresh
                            </button>
                            <button 
                                onClick={() => setShowCreateModal(true)}
                                className="px-5 py-2.5 bg-indigo-600 text-white rounded-xl font-semibold shadow-md shadow-indigo-200 hover:bg-indigo-700 transition-all flex items-center gap-2"
                            >
                                <span className="text-lg">+</span> Create VLAN
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-12 gap-8">
                        
                        {/* MAIN TABLE SECTION */}
                        <div className="col-span-12 lg:col-span-8 space-y-6">
                            <div className="bg-white rounded-[2rem] border border-slate-200 shadow-xl shadow-slate-200/50 overflow-hidden vlan-card">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50/80 border-b border-slate-100">
                                        <tr>
                                            <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">VLAN ID</th>
                                            <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Name</th>
                                            <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Type</th>
                                            <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Ports</th>
                                            <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Devices</th>
                                            <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</th>
                                            <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {vlans.map(vlan => (
                                            <tr 
                                                key={vlan.id} 
                                                onClick={() => setSelectedVlan(vlan)}
                                                className={`group cursor-pointer transition-all ${selectedVlan?.id === vlan.id ? 'bg-indigo-50/40' : 'hover:bg-slate-50/80'}`}
                                            >
                                                <td className="px-8 py-5 font-mono font-bold text-indigo-600">VLAN {vlan.id}</td>
                                                <td className="px-8 py-5 font-bold text-slate-700">{vlan.name}</td>
                                                <td className="px-8 py-5">
                                                    <span className={`px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-tighter ${
                                                        vlan.type === 'Security' ? 'bg-orange-100 text-orange-700' : 'bg-blue-50 text-blue-600'
                                                    }`}>
                                                        {vlan.type}
                                                    </span>
                                                </td>
                                                <td className="px-8 py-5 text-sm font-medium text-slate-500">{vlan.ports}</td>
                                                <td className="px-8 py-5 text-sm font-bold text-slate-600">{vlan.devices} dev.</td>
                                                <td className="px-8 py-5">
                                                    <span className={`inline-flex items-center gap-2 px-3 py-1 rounded-full text-[11px] font-bold ${
                                                        vlan.status === 'Active' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600 animate-pulse'
                                                    }`}>
                                                        <span className={`w-1.5 h-1.5 rounded-full ${vlan.status === 'Active' ? 'bg-emerald-500' : 'bg-rose-500'}`}></span>
                                                        {vlan.status}
                                                    </span>
                                                </td>
                                                <td className="px-8 py-5 text-right space-x-2">
                                                    <button className="text-slate-400 hover:text-indigo-600 transition-colors">✎</button>
                                                    <button onClick={(e) => {e.stopPropagation(); setShowAssignModal(true)}} className="text-slate-400 hover:text-blue-600 transition-colors">⇄</button>
                                                    <button className="text-slate-400 hover:text-rose-600 transition-colors">🗑</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* SIDE PANELS SECTION */}
                        <div className="col-span-12 lg:col-span-4 space-y-6">
                            
                            {/* VLAN DETAILS PANEL */}
                            {selectedVlan ? (
                                <div className="bg-white rounded-[2rem] border border-slate-200 p-8 shadow-xl shadow-slate-200/30 animate-in slide-in-from-right duration-300">
                                    <div className="flex justify-between items-start mb-6">
                                        <h2 className="text-xl font-bold text-slate-800">Détails de {selectedVlan.name}</h2>
                                        <span className="text-xs font-mono bg-slate-100 px-2 py-1 rounded text-slate-500">ID: {selectedVlan.id}</span>
                                    </div>
                                    
                                    <div className="space-y-6">
                                        {selectedVlan.status === 'Alert' && (
                                            <div className="p-4 bg-rose-50 border border-rose-100 rounded-2xl">
                                                <h4 className="text-rose-700 font-bold text-xs uppercase flex items-center gap-2 mb-2">
                                                    ⚠️ Alerte Sécurité (Snort)
                                                </h4>
                                                <p className="text-rose-600 text-sm leading-relaxed">{selectedVlan.reason}</p>
                                                <div className="mt-3 py-2 px-3 bg-white rounded-lg border border-rose-100 text-[10px] font-mono text-rose-500">
                                                    SOURCE IP: {selectedVlan.srcIp}
                                                </div>
                                                <button className="w-full mt-4 py-2.5 bg-rose-600 text-white text-xs font-bold rounded-xl hover:bg-rose-700 transition-all shadow-lg shadow-rose-200">
                                                    Release Device
                                                </button>
                                            </div>
                                        )}

                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="p-4 bg-slate-50 rounded-2xl">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase">Ports UP</span>
                                                <p className="text-lg font-bold text-slate-700">2 Active</p>
                                            </div>
                                            <div className="p-4 bg-slate-50 rounded-2xl">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase">Ports DOWN</span>
                                                <p className="text-lg font-bold text-slate-400">0</p>
                                            </div>
                                        </div>

                                        <div>
                                            <h4 className="text-[10px] font-bold text-slate-400 uppercase mb-3">Connected Devices</h4>
                                            <div className="space-y-2">
                                                {[...Array(selectedVlan.devices)].map((_, i) => (
                                                    <div key={i} className="flex items-center justify-between p-3 border border-slate-100 rounded-xl hover:border-indigo-100 transition-colors">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-500 text-xs">💻</div>
                                                            <span className="text-xs font-mono text-slate-600">192.168.{selectedVlan.id}.{12 + i}</span>
                                                        </div>
                                                        <span className="w-2 h-2 bg-emerald-400 rounded-full"></span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-64 flex flex-col items-center justify-center bg-slate-100/50 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-400">
                                    <span className="text-4xl mb-3">🖱️</span>
                                    <p className="text-sm font-medium">Sélectionnez un VLAN pour voir les détails</p>
                                </div>
                            )}

                            {/* ASSIGN PORT PANEL (STATIC) */}
                            <div className="bg-slate-900 rounded-[2rem] p-8 text-white shadow-2xl shadow-indigo-900/20">
                                <h3 className="text-lg font-bold mb-5 flex items-center gap-2">
                                    <span className="text-indigo-400">⇄</span> Assign Port
                                </h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[9px] font-black text-indigo-300 uppercase tracking-tighter mb-2 block">Interface</label>
                                        <select className="w-full bg-slate-800 border-none rounded-xl p-3 text-sm focus:ring-2 ring-indigo-500">
                                            <option>fa0/5</option>
                                            <option>fa0/6</option>
                                            <option>gi0/1</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-indigo-300 uppercase tracking-tighter mb-2 block">Target VLAN</label>
                                        <select className="w-full bg-slate-800 border-none rounded-xl p-3 text-sm focus:ring-2 ring-indigo-500">
                                            {vlans.map(v => <option key={v.id}>VLAN {v.id} - {v.name}</option>)}
                                        </select>
                                    </div>
                                    <button className="w-full py-3 bg-indigo-500 hover:bg-indigo-400 rounded-xl text-sm font-bold transition-all mt-2">
                                        Apply Configuration
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* CREATE MODAL */}
                    {showCreateModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-300">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-lg p-10 shadow-2xl animate-in zoom-in-95 duration-300">
                                <h2 className="text-2xl font-bold text-slate-800 mb-6">Create New VLAN</h2>
                                <div className="space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 mb-2">VLAN ID</label>
                                            <input type="number" className="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500" placeholder="30" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 mb-2">VLAN Name</label>
                                            <input type="text" className="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500" placeholder="Voice_VOIP" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-2">Traffic Type</label>
                                        <select className="w-full border border-slate-200 rounded-xl p-3 outline-none">
                                            <option>Data</option>
                                            <option>Voice</option>
                                            <option>Security / Isolation</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-2">Initial Port Assignment</label>
                                        <input type="text" className="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500" placeholder="fa0/10, fa0/11" />
                                    </div>
                                    <div className="flex gap-4 mt-8">
                                        <button onClick={() => setShowCreateModal(false)} className="flex-1 py-3 font-bold text-slate-400 hover:bg-slate-50 rounded-xl transition-all">Cancel</button>
                                        <button className="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">Create</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('vlan-root'));
        root.render(<VLANPage />);
    </script>
</body>
</html>
