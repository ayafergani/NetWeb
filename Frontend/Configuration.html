<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Configuration IDS - Console d'Administration</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="sidebar.css" />
<link rel="stylesheet" href="topbar.css" />
<link rel="stylesheet" href="dark-mode.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8fafc;
    --card: white;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --primary: #6366f1;
    --primary-soft: rgba(99, 102, 241, 0.12);
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --shadow: 0 4px 6px -1px rgba(100, 108, 255, 0.15);
  }

  html, body {
    height: 100%;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  body { overflow: hidden; }
  button, input, textarea { font: inherit; }

  .app-shell {
    width: 100vw;
    height: 100vh;
    display: flex;
    background: var(--bg);
  }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    padding: 15px 25px;
    display: flex;
    align-items: center;
    background: white;
    border-bottom: 1px solid var(--border);
  }

  .topbar-title {
    font-size: 20px;
    font-weight: 700;
    color: #1e293b;
    font-family: 'DM Sans', sans-serif;
  }

  .topbar-subtitle {
    font-size: 12px;
    color: #64748b;
    margin-top: 4px;
  }

  .content {
    flex: 1;
    padding: 25px;
    overflow-y: auto;
  }

  /* Stats bar */
  .stats-header-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 30px;
  }

  .stat-mini-card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .stat-icon {
    width: 45px;
    height: 45px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stat-info {
    display: flex;
    flex-direction: column;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: #1e293b;
  }

  .stat-label {
    font-size: 12px;
    color: #64748b;
  }

  .stat-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 4px;
    display: inline-block;
    font-weight: 600;
  }

  /* Card regles */
  .manage-section {
    background: white;
    padding: 20px;
    border-radius: 16px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: var(--shadow);
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    margin-bottom: 5px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #334155;
  }

  .status-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Tableau - regles affichees entierement */
  .table-wrap {
    overflow-x: auto;
    margin-top: 5px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  th {
    text-align: left;
    padding: 12px 12px;
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    background: #f8fafc;
  }

  th:nth-child(1) { width: 90px; }
  th:nth-child(2) { width: 100px; }
  th:nth-child(3) { width: auto; }

  td {
    text-align: left;
    padding: 14px 12px;
    border-bottom: 1px solid #f1f5f9;
    font-size: 13px;
    color: #334155;
    font-weight: 500;
    vertical-align: middle;
    word-wrap: break-word;
  }

  td:nth-child(3) {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    white-space: normal;
    word-break: break-word;
    line-height: 1.5;
  }

  tbody tr {
    transition: all 0.2s ease;
    cursor: pointer;
  }

  tbody tr:hover {
    background: #f8fafc;
  }

  tbody tr.selected {
    background: var(--primary-soft);
  }

  tbody tr.selected td:first-child {
    border-left: 3px solid var(--primary);
    padding-left: 9px;
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  .mono {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .badge-tcp {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    background: #eff6ff;
    color: #1d4ed8;
  }

  .badge-udp {
    background: #f0fdf4;
    color: #166534;
  }

  .badge-icmp {
    background: #fffbeb;
    color: #92400e;
  }

  /* Zone d'edition - police plus grande et plus lisible */
  .editor-area {
    width: 100%;
    min-height: 120px;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    resize: vertical;
    background: #fafcff;
    color: var(--text);
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    margin-top: 16px;
  }

  .editor-area:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
  }

  /* Label editeur */
  .editor-label {
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    margin-top: 16px;
    margin-bottom: 8px;
    display: block;
  }

  /* Boutons */
  .button-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn-primary {
    background: #6366f1;
    color: white;
  }

  .btn-primary:hover {
    background: #4f46e5;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: #64748b;
  }

  .btn-outline:hover {
    background: rgba(99, 102, 241, 0.08);
    border-color: var(--primary);
    color: var(--primary);
  }

  .btn-danger {
    background: #ef4444;
    color: white;
  }

  .btn-danger:hover {
    background: #dc2626;
  }

  .btn-success {
    background: #22c55e;
    color: white;
  }

  .btn-success:hover {
    background: #16a34a;
  }

  .bg-blue { background: #eff6ff; color: #1d4ed8; }
  .bg-green { background: #f0fdf4; color: #166534; }
  .bg-red { background: #fef2f2; color: #991b1b; }
  .bg-amber { background: #fffbeb; color: #92400e; }

  .toast {
    position: fixed;
    right: 20px;
    bottom: 20px;
    padding: 12px 20px;
    border-radius: 12px;
    background: #1e293b;
    color: white;
    font-size: 13px;
    box-shadow: 0 12px 24px -12px rgba(0,0,0,0.3);
    z-index: 1000;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
  }

  @media (max-width: 860px) {
    body { overflow: auto; }
    .app-shell { height: auto; min-height: 100vh; }
    .stats-header-grid { grid-template-columns: 1fr; }
    .content { padding: 18px; }
    .button-row { flex-direction: column; }
    .btn { width: 100%; }
    th:nth-child(1) { width: 70px; }
    th:nth-child(2) { width: 85px; }
  }

  /* Animations d'entrée inspirées de snort_alerts_dashboard */
  .topbar {
    animation: slideDown 0.4s ease;
  }

  .stats-header-grid {
    animation: fadeInUp 0.4s ease backwards;
    animation-delay: 0.1s;
  }

  .stat-mini-card {
    animation: fadeInUp 0.4s ease backwards;
  }

  .stat-mini-card:nth-child(1) { animation-delay: 0.2s; }
  .stat-mini-card:nth-child(2) { animation-delay: 0.25s; }
  .stat-mini-card:nth-child(3) { animation-delay: 0.3s; }

  .manage-section {
    animation: fadeInUp 0.4s ease backwards;
    animation-delay: 0.4s;
  }

  .table-row {
    animation: rowSlideIn 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) both;
  }

  .table-row:nth-child(1) { animation-delay: 0.2s; }
  .table-row:nth-child(2) { animation-delay: 0.25s; }
  .table-row:nth-child(3) { animation-delay: 0.3s; }
  .table-row:nth-child(4) { animation-delay: 0.35s; }

  .button-row {
    animation: fadeInUp 0.4s ease backwards;
    animation-delay: 0.4s;
  }

  .editor-container {
    animation: fadeInRight 0.4s ease backwards;
    animation-delay: 0.5s;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes rowSlideIn {
    from {
      opacity: 0;
      transform: translateX(-12px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  @keyframes fadeInRight {
    from {
      opacity: 0;
      transform: translateX(-10px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }
</style>
</head>
<body>
<div class="app-shell">
  <aside id="sidebar-root" class="sidebar-host" data-page="configuration"></aside>
  <main class="main">
    <div id="topbar-root" data-title="Configuration IDS" data-subtitle="Gestion des regles de securite et export Snort" data-notifications="2"></div>

    <section class="content">
      <div id="root"></div>
    </section>
  </main>
</div>

<script src="sidebar.js"></script>
<script src="topbar.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const initialRules = [
  { sid: '1000001', definition: 'alert tcp any any -> any 22 (msg:"SSH brute force suspect"; flow:to_server,established; sid:1000001; rev:1;)', type: 'tcp' },
  { sid: '1000002', definition: 'alert udp any any -> any 53 (msg:"DNS tunnel activity detected"; content:"|01 00 00 00|"; sid:1000002; rev:1;)', type: 'udp' },
  { sid: '1000003', definition: 'alert icmp any any -> any any (msg:"ICMP sweep detected"; itype:8; icode:0; sid:1000003; rev:1;)', type: 'icmp' },
  { sid: '1000004', definition: 'alert tcp any any -> any 80 (msg:"Suspicious HTTP request"; content:"GET"; http_method; sid:1000004; rev:1;)', type: 'tcp' }
];

const StatCard = ({ icon, label, value, badge, tone }) => {
  const getIcon = () => {
    switch(icon) {
      case 'rules': return <path d="M4 4h16v16H4zM8 8h8M8 12h6M8 16h4" />;
      case 'export': return <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />;
      case 'snort': return <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />;
      default: return null;
    }
  };

  return (
    <div className="stat-mini-card">
      <div className={`stat-icon ${tone}`}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {getIcon()}
        </svg>
      </div>
      <div className="stat-info">
        <span className="stat-value">{value}</span>
        <span className="stat-label">{label}</span>
        <span className={`stat-badge ${tone}`}>{badge}</span>
      </div>
    </div>
  );
};

function App() {
  const [rules, setRules] = useState(initialRules);
  const [selectedSid, setSelectedSid] = useState(initialRules[0].sid);
  const [editorValue, setEditorValue] = useState(initialRules[0].definition);
  const [toast, setToast] = useState('');
  const [lastUpdate] = useState(new Date());

  useEffect(() => {
    if (toast) {
      const timer = setTimeout(() => setToast(''), 2500);
      return () => clearTimeout(timer);
    }
  }, [toast]);

  const selectedRule = rules.find(r => r.sid === selectedSid);

  useEffect(() => {
    if (selectedRule) setEditorValue(selectedRule.definition);
  }, [selectedSid, selectedRule]);

  const getTypeBadge = (type) => {
    const classes = {
      tcp: 'badge-tcp',
      udp: 'badge-udp',
      icmp: 'badge-icmp'
    };
    return <span className={`badge-tcp ${classes[type] || 'badge-tcp'}`}>{type.toUpperCase()}</span>;
  };

  const handleRuleSelect = (sid) => setSelectedSid(sid);

  const handleSaveRule = () => {
    setRules(rules.map(r => r.sid === selectedSid ? { ...r, definition: editorValue } : r));
    setToast('Regle sauvegardee');
  };

  const handleAddRule = () => {
    const newSid = `10000${rules.length + 1}`;
    const newRule = { sid: newSid, definition: `alert tcp any any -> any any (msg:"Nouvelle regle"; sid:${newSid}; rev:1;)`, type: 'tcp' };
    setRules([...rules, newRule]);
    setSelectedSid(newSid);
    setToast('Nouvelle regle ajoutee');
  };

  const handleDeleteRule = () => {
    if (rules.length > 1) {
      const newRules = rules.filter(r => r.sid !== selectedSid);
      setRules(newRules);
      setSelectedSid(newRules[0].sid);
      setToast('Regle supprimee');
    } else {
      setToast('Impossible de supprimer la derniere regle');
    }
  };

  const handleResetRules = () => {
    setRules(initialRules);
    setSelectedSid(initialRules[0].sid);
    setToast('Regles reinitialisees');
  };

  const handleExportToSnort = async () => {
    const exportData = rules.map(r => r.definition).join('\n\n');
    try {
      await navigator.clipboard.writeText(exportData);
      setToast('Regles copiees dans le presse-papiers');
    } catch {
      setToast('Erreur lors de la copie');
    }
  };

  return (
    <>
      <div className="stats-header-grid">
        <StatCard icon="rules" label="Regles actives" value={rules.length} badge="En production" tone="bg-blue" />
        <StatCard icon="export" label="Dernier export" value="Aujourd'hui" badge={lastUpdate.toLocaleTimeString('fr-FR')} tone="bg-green" />
        <StatCard icon="snort" label="Statut Snort" value="Operationnel" badge="Pret" tone="bg-amber" />
      </div>

      <div className="manage-section">
        <div className="section-header">
          <span className="section-title">Regles IDS</span>
          <div className="status-indicator" style={{ background: '#22c55e' }}></div>
        </div>

        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>SID</th>
                <th>Protocole</th>
                <th>Definition de la regle</th>
              </tr>
            </thead>
            <tbody>
              {rules.map(rule => (
                <tr key={rule.sid} className={`table-row ${selectedSid === rule.sid ? 'selected' : ''}`} onClick={() => handleRuleSelect(rule.sid)}>
                  <td className="mono">{rule.sid}</td>
                  <td>{getTypeBadge(rule.type)}</td>
                  <td>{rule.definition}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div className="button-row">
          <button className="btn btn-primary" onClick={handleAddRule}>Ajouter</button>
          <button className="btn btn-outline" onClick={handleSaveRule}>Modifier</button>
          <button className="btn btn-danger" onClick={handleDeleteRule}>Supprimer</button>
          <button className="btn btn-outline" onClick={handleResetRules}>Reset</button>
          <button className="btn btn-success" onClick={handleExportToSnort}>Exporter vers Snort</button>
        </div>

        {selectedRule && (
          <div className="editor-container">
            <label className="editor-label">Editeur de regle - SID {selectedRule.sid}</label>
            <textarea
              className="editor-area"
              value={editorValue}
              onChange={e => setEditorValue(e.target.value)}
              placeholder="Entrez la definition de la regle Snort..."
            />
          </div>
        )}
      </div>

      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
