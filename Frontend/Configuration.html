<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Configuration IDS - Console d'Administration</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="sidebar.css" />
<link rel="stylesheet" href="topbar.css" />
<link rel="stylesheet" href="dark-mode.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8fafc;
    --card: white;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --primary: #6366f1;
    --primary-soft: rgba(99, 102, 241, 0.12);
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --shadow: 0 4px 6px -1px rgba(100, 108, 255, 0.15);
  }

  html, body {
    height: 100%;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  body { overflow: hidden; }
  button, input, textarea { font: inherit; }

  .app-shell {
    width: 100vw;
    height: 100vh;
    display: flex;
    background: var(--bg);
  }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .content {
    flex: 1;
    padding: 25px;
    overflow-y: auto;
  }

  .stats-header-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 30px;
  }

  .stat-mini-card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: all 0.2s ease;
  }

  .stat-icon {
    width: 45px;
    height: 45px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stat-info {
    display: flex;
    flex-direction: column;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: #1e293b;
  }

  .stat-label {
    font-size: 12px;
    color: #64748b;
  }

  .stat-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 4px;
    display: inline-block;
    font-weight: 600;
  }

  .manage-section {
    background: white;
    padding: 20px;
    border-radius: 16px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: var(--shadow);
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    margin-bottom: 5px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #334155;
  }

  .status-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transition: background 0.2s ease;
  }

  /* Conteneur scrollable pour la table */
  .table-scroll-container {
    max-height: 520px;
    overflow-y: auto;
    overflow-x: auto;
    border-radius: 12px;
    scrollbar-width: thin;
  }

  /* Style du scrollbar */
  .table-scroll-container::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  .table-scroll-container::-webkit-scrollbar-track {
    background: var(--border);
    border-radius: 10px;
  }

  .table-scroll-container::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
  }

  .table-scroll-container::-webkit-scrollbar-thumb:hover {
    background: #4f46e5;
  }

  /* Mode sombre scrollbar */
  .dark-mode .table-scroll-container::-webkit-scrollbar-track {
    background: #1e293b;
  }

  .dark-mode .table-scroll-container::-webkit-scrollbar-thumb {
    background: #475569;
  }

  .dark-mode .table-scroll-container::-webkit-scrollbar-thumb:hover {
    background: #6366f1;
  }

  /* En-tête de table sticky */
  .table-scroll-container thead tr {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .table-scroll-container table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .table-scroll-container th {
    background: #f8fafc;
    box-shadow: 0 1px 0 var(--border);
    padding: 12px 12px;
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
  }

  .table-scroll-container th:nth-child(1) { width: 90px; }
  .table-scroll-container th:nth-child(2) { width: 100px; }
  .table-scroll-container th:nth-child(3) { width: auto; }

  .table-scroll-container td {
    padding: 14px 12px;
    border-bottom: 1px solid #f1f5f9;
    font-size: 13px;
    color: #334155;
    font-weight: 500;
    vertical-align: middle;
    word-wrap: break-word;
  }

  .table-scroll-container td:nth-child(3) {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    white-space: normal;
    word-break: break-word;
    line-height: 1.5;
  }

  .table-scroll-container tbody tr {
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .table-scroll-container tbody tr:hover {
    background: #f8fafc;
  }

  .table-scroll-container tbody tr.selected {
    background: var(--primary-soft);
  }

  .table-scroll-container tbody tr.selected td:first-child {
    border-left: 3px solid var(--primary);
    padding-left: 9px;
  }

  .mono {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .badge-tcp {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    background: #eff6ff;
    color: #1d4ed8;
  }

  .badge-udp {
    background: #f0fdf4;
    color: #166534;
  }

  .badge-icmp {
    background: #fffbeb;
    color: #92400e;
  }

  .editor-area {
    width: 100%;
    min-height: 120px;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    resize: vertical;
    background: #fafcff;
    color: var(--text);
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    margin-top: 16px;
    transition: all 0.2s ease;
  }

  .editor-area:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
  }

  .editor-label {
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    margin-top: 16px;
    margin-bottom: 8px;
    display: block;
  }

  .button-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-primary { background: #6366f1; color: white; }
  .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: #64748b; }
  .btn-outline:hover { background: rgba(99, 102, 241, 0.08); border-color: var(--primary); color: var(--primary); }
  .btn-danger { background: #ef4444; color: white; }
  .btn-danger:hover { background: #dc2626; transform: translateY(-1px); }
  .btn-success { background: #22c55e; color: white; }
  .btn-success:hover { background: #16a34a; transform: translateY(-1px); }

  .bg-blue { background: #eff6ff; color: #1d4ed8; }
  .bg-green { background: #f0fdf4; color: #166534; }
  .bg-amber { background: #fffbeb; color: #92400e; }

  .toast {
    position: fixed;
    right: 20px;
    bottom: 20px;
    padding: 12px 20px;
    border-radius: 12px;
    background: #1e293b;
    color: white;
    font-size: 13px;
    box-shadow: 0 12px 24px -12px rgba(0,0,0,0.3);
    z-index: 1000;
    animation: slideIn 0.3s ease;
  }
  .toast-error { background: #dc2626; }
  .toast-success { background: #16a34a; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
  }

  .loading-spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #f3f3f3;
    border-top: 2px solid #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 8px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @media (max-width: 860px) {
    body { overflow: auto; }
    .app-shell { height: auto; min-height: 100vh; }
    .stats-header-grid { grid-template-columns: 1fr; }
    .content { padding: 18px; }
    .button-row { flex-direction: column; }
    .btn { width: 100%; }
    .table-scroll-container th:nth-child(1) { width: 70px; }
    .table-scroll-container th:nth-child(2) { width: 85px; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <aside id="sidebar-root" class="sidebar-host" data-page="configuration"></aside>
  <main class="main">
    <div id="topbar-root" data-title="Configuration IDS" data-subtitle="Gestion des regles de securite et export Snort" data-notifications="2"></div>
    <section class="content">
      <div id="root"></div>
    </section>
  </main>
</div>

<script src="sidebar.js"></script>
<script src="topbar.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// API base URL
const API_BASE_URL = window.location.port === '5000' ? '' : 'http://127.0.0.1:5000';

// API functions
const api = {
  async getRules() {
    const url = `${API_BASE_URL}/api/regles`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if (!data.success) throw new Error(data.error || "Erreur inconnue");
    const rulesArray = data.regles || data.rules || [];
    if (!Array.isArray(rulesArray)) throw new Error("La réponse ne contient pas un tableau de règles");
    return rulesArray;
  },

  async addRule(rule) {
    const response = await fetch(`${API_BASE_URL}/api/regles`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rule })
    });
    const data = await response.json();
    if (!data.success) throw new Error(data.error);
    return data;
  },

  async updateRule(sid, rule) {
    const response = await fetch(`${API_BASE_URL}/api/regles/${sid}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rule })
    });
    const data = await response.json();
    if (!data.success) throw new Error(data.error);
    return data;
  },

  async deleteRule(sid) {
    const response = await fetch(`${API_BASE_URL}/api/regles/${sid}`, {
      method: 'DELETE'
    });
    const data = await response.json();
    if (!data.success) throw new Error(data.error);
    return data;
  },

  async resetRules() {
    const response = await fetch(`${API_BASE_URL}/api/regles/reset`, {
      method: 'POST'
    });
    const data = await response.json();
    if (!data.success) throw new Error(data.error);
    return data;
  }
};

function extractProtocol(rule) {
  try {
    const parts = rule.split(/\s+/);
    if (parts.length > 1) {
      const protocol = parts[1].toLowerCase();
      if (['tcp', 'udp', 'icmp'].includes(protocol)) return protocol;
    }
    return 'tcp';
  } catch (e) {
    return 'tcp';
  }
}

const StatCard = ({ icon, label, value, badge, tone }) => {
  const getIcon = () => {
    switch(icon) {
      case 'rules': return <path d="M4 4h16v16H4zM8 8h8M8 12h6M8 16h4" />;
      case 'export': return <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />;
      case 'snort': return <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />;
      default: return null;
    }
  };
  return (
    <div className="stat-mini-card">
      <div className={`stat-icon ${tone}`}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          {getIcon()}
        </svg>
      </div>
      <div className="stat-info">
        <span className="stat-value">{value}</span>
        <span className="stat-label">{label}</span>
        <span className={`stat-badge ${tone}`}>{badge}</span>
      </div>
    </div>
  );
};

function App() {
  const [rules, setRules] = useState([]);
  const [selectedSid, setSelectedSid] = useState(null);
  const [editorValue, setEditorValue] = useState('');
  const [toast, setToast] = useState({ message: '', type: '' });
  const [loading, setLoading] = useState(true);
  const [lastUpdate, setLastUpdate] = useState(new Date());
  const [actionLoading, setActionLoading] = useState(false);

  // ✅ Mise à jour locale des statistiques sans recharger toute la page
  const updateStatsOnly = useCallback((newRules) => {
    // Met à jour uniquement les cartes statistiques
    const statTotal = document.getElementById('stat-total-value');
    if (statTotal) statTotal.textContent = newRules.length;
  }, []);

  const loadRules = useCallback(async (showLoading = true) => {
    if (showLoading) setLoading(true);
    try {
      const rulesData = await api.getRules();
      
      let formattedRules = [];
      if (Array.isArray(rulesData)) {
        formattedRules = rulesData.map(rule => ({
          sid: String(rule.sid),
          definition: rule.rule,
          type: extractProtocol(rule.rule)
        }));
      }
      
      // ✅ Mise à jour locale du state
      setRules(formattedRules);
      updateStatsOnly(formattedRules);
      
      if (formattedRules.length > 0) {
        const stillExists = formattedRules.some(r => r.sid === selectedSid);
        if (!stillExists || !selectedSid) {
          setSelectedSid(formattedRules[0].sid);
        }
      } else {
        setSelectedSid(null);
        setEditorValue('');
      }
    } catch (error) {
      console.error('Erreur chargement:', error);
      setToast({ message: 'Erreur: ' + error.message, type: 'error' });
    } finally {
      if (showLoading) setLoading(false);
    }
  }, [selectedSid, updateStatsOnly]);

  // Chargement initial uniquement
  useEffect(() => {
    loadRules(true);
  }, []);

  useEffect(() => {
    if (toast.message) {
      const timer = setTimeout(() => setToast({ message: '', type: '' }), 3000);
      return () => clearTimeout(timer);
    }
  }, [toast]);

  const selectedRule = rules.find(r => r.sid === selectedSid);
  useEffect(() => {
    if (selectedRule) setEditorValue(selectedRule.definition);
  }, [selectedSid, selectedRule]);

  const getTypeBadge = (type) => {
    const classes = { tcp: 'badge-tcp', udp: 'badge-udp', icmp: 'badge-icmp' };
    return <span className={classes[type] || 'badge-tcp'}>{type.toUpperCase()}</span>;
  };

  // ✅ Ajouter - met à jour uniquement la table et l'éditeur
  const handleAddRule = async () => {
    if (!editorValue.trim()) {
      setToast({ message: 'Veuillez saisir une règle dans l\'éditeur', type: 'error' });
      return;
    }
    
    setActionLoading(true);
    try {
      let newRule = editorValue.trim();
      const sidMatch = newRule.match(/sid:(\d+)/);
      let newSid;
      
      if (sidMatch) {
        newSid = parseInt(sidMatch[1]);
      } else {
        newSid = rules.length > 0 ? Math.max(...rules.map(r => parseInt(r.sid)), 1000000) + 1 : 1000001;
        newRule = `${newRule} sid:${newSid};`;
      }
      
      await api.addRule(newRule);
      
      // ✅ Recharge uniquement les données (pas la page)
      await loadRules(false);
      
      setSelectedSid(String(newSid));
      setToast({ message: 'Règle ajoutée', type: 'success' });
      setLastUpdate(new Date());
    } catch (error) {
      setToast({ message: 'Erreur: ' + error.message, type: 'error' });
    } finally {
      setActionLoading(false);
    }
  };

  // ✅ Modifier - met à jour uniquement la ligne modifiée
  const handleSaveRule = async () => {
    if (!selectedSid) {
      setToast({ message: 'Sélectionnez une règle à modifier', type: 'error' });
      return;
    }
    if (!editorValue.trim()) {
      setToast({ message: 'La règle ne peut pas être vide', type: 'error' });
      return;
    }
    
    setActionLoading(true);
    try {
      await api.updateRule(parseInt(selectedSid), editorValue);
      
      // ✅ Mise à jour locale de la règle modifiée sans recharger tout
      const updatedRules = rules.map(rule => 
        rule.sid === selectedSid 
          ? { ...rule, definition: editorValue, type: extractProtocol(editorValue) }
          : rule
      );
      setRules(updatedRules);
      
      setToast({ message: 'Règle sauvegardée', type: 'success' });
      setLastUpdate(new Date());
    } catch (error) {
      setToast({ message: 'Erreur: ' + error.message, type: 'error' });
    } finally {
      setActionLoading(false);
    }
  };

  // ✅ Supprimer - supprime la ligne sans recharger
  const handleDeleteRule = async () => {
    if (!selectedSid) return;
    if (rules.length <= 1) {
      setToast({ message: 'Impossible de supprimer la dernière règle', type: 'error' });
      return;
    }
    if (!confirm(`Supprimer la règle ${selectedSid} ?`)) return;
    
    setActionLoading(true);
    try {
      await api.deleteRule(parseInt(selectedSid));
      
      // ✅ Mise à jour locale après suppression
      const newRules = rules.filter(r => r.sid !== selectedSid);
      setRules(newRules);
      
      if (newRules.length > 0) {
        setSelectedSid(newRules[0].sid);
      } else {
        setSelectedSid(null);
        setEditorValue('');
      }
      
      setToast({ message: 'Règle supprimée', type: 'success' });
      setLastUpdate(new Date());
    } catch (error) {
      setToast({ message: 'Erreur: ' + error.message, type: 'error' });
    } finally {
      setActionLoading(false);
    }
  };

  // ✅ Reset - recharge depuis le serveur
  const handleResetRules = async () => {
    if (!confirm('⚠️ Supprimer TOUTES les règles ?')) return;
    setActionLoading(true);
    try {
      await api.resetRules();
      await loadRules(false);
      setToast({ message: 'Base réinitialisée', type: 'success' });
      setLastUpdate(new Date());
    } catch (error) {
      setToast({ message: 'Erreur: ' + error.message, type: 'error' });
    } finally {
      setActionLoading(false);
    }
  };

  // ✅ Export - ne change pas l'état
  const handleExportToSnort = async () => {
    const exportData = rules.map(r => r.definition).join('\n\n');
    try {
      await navigator.clipboard.writeText(exportData);
      setToast({ message: `${rules.length} règles copiées`, type: 'success' });
    } catch {
      setToast({ message: 'Erreur de copie', type: 'error' });
    }
  };

  // ✅ Sélection d'une règle - mise à jour locale uniquement
  const handleRuleSelect = (sid) => {
    setSelectedSid(sid);
  };

  if (loading) {
    return (
      <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '400px' }}>
        <div className="loading-spinner"></div>
        <span style={{ marginLeft: '10px' }}>Chargement des règles...</span>
      </div>
    );
  }

  return (
    <>
      <div className="stats-header-grid">
        <StatCard icon="rules" label="Regles actives" value={rules.length} badge="En production" tone="bg-blue" />
        <StatCard icon="export" label="Dernière modif" value={lastUpdate.toLocaleTimeString('fr-FR')} badge="Manuel" tone="bg-green" />
        <StatCard icon="snort" label="Statut API" value="Connectée" badge="Prêt" tone="bg-amber" />
      </div>

      <div className="manage-section">
        <div className="section-header">
          <span className="section-title">Règles IDS</span>
          <div className="status-indicator" style={{ background: rules.length > 0 ? '#22c55e' : '#ef4444' }}></div>
        </div>

        {/* Table scrollable */}
        <div className="table-scroll-container">
          <table>
            <thead>
              <tr>
                <th>SID</th>
                <th>Protocole</th>
                <th>Définition de la règle</th>
              </tr>
            </thead>
            <tbody>
              {rules.map(rule => (
                <tr 
                  key={rule.sid} 
                  className={selectedSid === rule.sid ? 'selected' : ''} 
                  onClick={() => handleRuleSelect(rule.sid)}
                >
                  <td className="mono">{rule.sid}</td>
                  <td>{getTypeBadge(rule.type)}</td>
                  <td>{rule.definition}</td>
                </tr>
              ))}
              {rules.length === 0 && (
                <tr>
                  <td colSpan="3" style={{ textAlign: 'center', padding: '40px' }}>
                    Aucune règle trouvée. Écrivez une règle dans l'éditeur et cliquez "Ajouter".
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>

        <div className="button-row">
          <button className="btn btn-primary" onClick={handleAddRule} disabled={actionLoading}>
            {actionLoading ? <div className="loading-spinner" style={{ width: '14px', height: '14px' }}></div> : 'Ajouter'}
          </button>
          <button className="btn btn-outline" onClick={handleSaveRule} disabled={actionLoading || !selectedSid}>
            Modifier
          </button>
          <button className="btn btn-danger" onClick={handleDeleteRule} disabled={actionLoading || !selectedSid || rules.length <= 1}>
            Supprimer
          </button>
          <button className="btn btn-outline" onClick={handleResetRules} disabled={actionLoading}>
            Reset
          </button>
          <button className="btn btn-success" onClick={handleExportToSnort} disabled={rules.length === 0}>
            Exporter
          </button>
        </div>

        {selectedRule && (
          <div>
            <label className="editor-label">Éditeur de règle - SID {selectedRule.sid}</label>
            <textarea
              className="editor-area"
              value={editorValue}
              onChange={e => setEditorValue(e.target.value)}
              placeholder="Entrez la définition de la règle Snort..."
              disabled={actionLoading}
            />
          </div>
        )}
      </div>

      {toast.message && (
        <div className={`toast ${toast.type === 'error' ? 'toast-error' : toast.type === 'success' ? 'toast-success' : ''}`}>
          {toast.message}
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  (function syncDarkMode() {
    const savedTheme = localStorage.getItem('netguard-theme');
    const htmlElement = document.documentElement;
    if (savedTheme === 'dark') htmlElement.classList.add('dark-mode');
    else if (savedTheme === 'light') htmlElement.classList.remove('dark-mode');
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) htmlElement.classList.add('dark-mode');
    
    window.addEventListener('storage', function(e) {
      if (e.key === 'netguard-theme') {
        if (e.newValue === 'dark') htmlElement.classList.add('dark-mode');
        else if (e.newValue === 'light') htmlElement.classList.remove('dark-mode');
      }
    });
    
    window.addEventListener('themeChanged', function(e) {
      if (e.detail.isDark) htmlElement.classList.add('dark-mode');
      else htmlElement.classList.remove('dark-mode');
    });
  })();
</script>
</body>
</html>
