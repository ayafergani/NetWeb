<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NetGuard — Network Security Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body { 
    height: 100%; 
    width: 100%; 
    overflow: hidden; 
    font-family: 'DM Sans', sans-serif; 
    background: #f8fafc; 
  }

  .app-shell {
    width: 100vw;
    height: 100vh;
    display: flex;
    background: #f8fafc;
  }

  /* ── SIDEBAR ── */
  .sidebar { width: 90px; background: #1a1c3a; display: flex; flex-direction: column; align-items: center; padding: 20px 0; flex-shrink: 0; }
  .logo-wrap { width: 46px; height: 46px; border-radius: 12px; background: #6366f1; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
  .nav-item { width: 100%; height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #6b7280; cursor: pointer; transition: 0.2s; text-decoration: none; }
  .nav-item.active { color: #818cf8; background: rgba(99,102,241,0.1); border-left: 3px solid #6366f1; }
  .nav-item span { font-size: 10px; font-weight: 500; }

  /* ── MAIN LAYOUT ── */
  .main { flex: 1; display: flex; flex-direction: column; background: #f8fafc; overflow: hidden; }
  .topbar { padding: 15px 25px; display: flex; align-items: center; background: white; border-bottom: 1px solid #e2e8f0; }
  .content { flex: 1; padding: 25px; overflow-y: auto; }

  /* ── MINI CARTES ── */
  .stats-header-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
  .stat-mini-card { background: white; padding: 20px; border-radius: 16px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .stat-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .stat-info { display: flex; flex-direction: column; }
  .stat-value { font-size: 20px; font-weight: 700; color: #1e293b; }
  .stat-label { font-size: 12px; color: #64748b; }
  .stat-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 4px; display: inline-block; font-weight: 600; }

  /* ── GRILLE DE GESTION ── */
  .management-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 25px; }
  .manage-section { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 10px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 5px; }
  .section-title { font-size: 14px; font-weight: 600; color: #334155; }
  .status-indicator { width: 8px; height: 8px; border-radius: 50%; }

  .data-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px; }
  .data-label { color: #64748b; }
  .data-value { font-weight: 500; color: #1e293b; }
  
  .action-link { font-size: 12px; color: #6366f1; font-weight: 600; cursor: pointer; text-decoration: none; margin-top: 5px; display: block; }
  .btn-small { padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
  .btn-primary { background: #6366f1; color: white; }

  /* ── LOGS ── */
  .logs-section { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-top: 5px; }
  .log-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
  .log-row:last-child { border-bottom: none; }
  .log-time { color: #94a3b8; font-family: 'DM Mono', monospace; min-width: 80px; }
  .log-msg { flex: 1; color: #334155; font-weight: 500; }
  .log-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-left: 10px; text-transform: uppercase; }

  .bg-blue { background: #eff6ff; color: #1d4ed8; }
  .bg-green { background: #f0fdf4; color: #166534; }
  .bg-red { background: #fef2f2; color: #991b1b; }
  .bg-amber { background: #fffbeb; color: #92400e; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const Icon = ({ type }) => {
  const icons = {
    vlan: <path d="M21 5H3a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1zM21 13H3a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1z" />,
    ports: <><circle cx="12" cy="12" r="3"/><path d="M2 12h3M19 12h3M12 2v3M12 19v3"/></>,
    alert: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
    monitor: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
  };
  return (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {icons[type]}
    </svg>
  );
};

const Dashboard = ({ setPage }) => {
  return (
    <>
      <div className="stats-header-grid">
        <div className="stat-mini-card">
          <div className="stat-icon bg-blue"><Icon type="vlan" /></div>
          <div className="stat-info">
            <span className="stat-value">3</span>
            <span className="stat-label">Total VLANs</span>
            <span className="stat-badge bg-green">All configured</span>
          </div>
        </div>
        <div className="stat-mini-card">
          <div className="stat-icon bg-green"><Icon type="ports" /></div>
          <div className="stat-info">
            <span className="stat-value">4/24</span>
            <span className="stat-label">Active Ports</span>
            <span className="stat-badge bg-blue">20 available</span>
          </div>
        </div>
        <div className="stat-mini-card">
          <div className="stat-icon bg-red" style={{background:'#fee2e2'}}><Icon type="alert" /></div>
          <div className="stat-info">
            <span className="stat-value" style={{color:'#ef4444'}}>2</span>
            <span className="stat-label">Snort Alerts</span>
            <span className="stat-badge bg-red">Needs review</span>
          </div>
        </div>
        <div className="stat-mini-card">
          <div className="stat-icon bg-amber"><Icon type="monitor" /></div>
          <div className="stat-info">
            <span className="stat-value">1</span>
            <span className="stat-label">Isolated Devices</span>
            <span className="stat-badge bg-amber">VLAN 99</span>
          </div>
        </div>
      </div>

      <div className="management-grid">
        {/* VLAN Management */}
        <div className="manage-section">
          <div className="section-header">
            <span className="section-title">VLAN Management</span>
            <div className="status-indicator" style={{background: '#22c55e'}}></div>
          </div>
          <div className="data-row"><span className="data-label">Total VLANs</span><span className="data-value" style={{color:'#6366f1'}}>3 configured</span></div>
          <div className="data-row"><span className="data-label">Last created</span><span className="data-value">VLAN 20 — Staff</span></div>
          <div className="data-row"><span className="data-label">Quarantine VLAN</span><span className="data-value" style={{color:'#f59e0b'}}>VLAN 99 active</span></div>
          <div style={{display:'flex', gap:'10px', marginTop:'5px'}}>
             <span className="action-link" onClick={() => setPage('vlan')}>View VLANs</span>
             <button className="btn-small btn-primary" onClick={() => setPage('vlan')}>Create VLAN</button>
          </div>
        </div>

        {/* Interfaces */}
        <div className="manage-section">
          <div className="section-header">
            <span className="section-title">Interfaces</span>
            <div className="status-indicator" style={{background: '#22c55e'}}></div>
          </div>
          <div className="data-row"><span className="data-label">Ports UP</span><span className="data-value" style={{color:'#22c55e'}}>4 active</span></div>
          <div className="data-row"><span className="data-label">Ports DOWN</span><span className="data-value">20 idle</span></div>
          <div className="data-row"><span className="data-label">Trunk links</span><span className="data-value" style={{color:'#6366f1'}}>2 configured</span></div>
          <span className="action-link">View Interfaces</span>
        </div>

        {/* Network Monitoring */}
        <div className="manage-section">
          <div className="section-header">
            <span className="section-title">Network Monitoring</span>
            <div className="status-indicator" style={{background: '#22c55e'}}></div>
          </div>
          <div className="data-row"><span className="data-label">Traffic status</span><span className="data-value" style={{color:'#22c55e'}}>Normal</span></div>
          <div className="data-row"><span className="data-label">Interface errors</span><span className="data-value">0 detected</span></div>
          <div className="data-row"><span className="data-label">Bandwidth use</span><span className="data-value">12% avg</span></div>
          <span className="action-link">View Details</span>
        </div>

        {/* Security Alerts (Snort) */}
        <div className="manage-section">
          <div className="section-header">
            <span className="section-title">Security Alerts (Snort)</span>
            <div className="status-indicator" style={{background: '#ef4444'}}></div>
          </div>
          <div className="data-row"><span className="data-label">Alerts today</span><span className="data-value" style={{color:'#ef4444'}}>2 triggered</span></div>
          <div className="data-row"><span className="data-label">Last attack type</span><span className="data-value" style={{color:'#ef4444'}}>Port Scan</span></div>
          <div className="data-row"><span className="data-label">Source IP</span><span className="data-value" style={{fontFamily:'monospace'}}>192.168.1.10</span></div>
          <span className="action-link" onClick={() => setPage('alerts')}>View Alerts</span>
        </div>

        {/* Automation */}
        <div className="manage-section">
          <div className="section-header">
            <span className="section-title">Automation</span>
            <div className="status-indicator" style={{background: '#3b82f6'}}></div>
          </div>
          <div className="data-row"><span className="data-label">Auto-isolate threats</span><span className="data-value">ON</span></div>
          <div className="data-row"><span className="data-label">Active rules</span><span className="data-value" style={{color:'#6366f1'}}>4 rules</span></div>
          <div className="data-row"><span className="data-label">Last triggered</span><span className="data-value">fa0/3 → VLAN 99</span></div>
          <button className="btn-small btn-primary" style={{marginTop:'5px', width:'fit-content'}}>Configure Rules</button>
        </div>

        {/* System Status */}
        <div className="manage-section">
          <div className="section-header">
            <span className="section-title">System Status</span>
            <div className="status-indicator" style={{background: '#22c55e'}}></div>
          </div>
          <div className="data-row"><span className="data-label">Switch uptime</span><span className="data-value">14d 6h</span></div>
          <div className="data-row"><span className="data-label">CPU load</span><span className="data-value">8%</span></div>
          <div className="data-row"><span className="data-label">Config backup</span><span className="data-value" style={{color:'#22c55e'}}>Up to date</span></div>
          <span className="action-link">View Details</span>
        </div>
      </div>

      <div className="logs-section">
        <div className="section-header"><span className="section-title">Recent Activity Logs</span></div>
        <div className="log-row">
          <span className="log-time">11:05:34</span>
          <span className="log-msg">User 'Admin' updated VLAN 20 (Staff) configuration</span>
          <span className="log-tag bg-blue">Config</span>
        </div>
        <div className="log-row">
          <span className="log-time">10:42:12</span>
          <span className="log-msg">Security: Port Scan detected from 192.168.1.10</span>
          <span className="log-tag bg-red">Alert</span>
        </div>
        <div className="log-row">
          <span className="log-time">09:15:00</span>
          <span className="log-msg">Automation: Port fa0/3 automatically moved to VLAN 99</span>
          <span className="log-tag bg-amber">Auto</span>
        </div>
      </div>
    </>
  );
}

const VLANPage = ({ setPage }) => (
  <div><button onClick={() => setPage('dashboard')} className="action-link" style={{marginBottom:20}}>← Retour</button><h2>Gestion des VLANs</h2></div>
);

const AlertsPage = ({ setPage }) => (
  <div><button onClick={() => setPage('dashboard')} className="action-link" style={{marginBottom:20}}>← Retour</button><h2>Alertes de Sécurité</h2></div>
);

// --- Dans ton composant App ---
function App() {
  const [page, setPage] = useState('dashboard');

  const handleNavigation = (targetPage) => {
    if (targetPage === 'vlan') {
      // Redirection vers le fichier externe
      window.location.href = 'vlan.html'; 
    } else {
      setPage(targetPage);
    }
  };

  return (
    <div className="app-shell">
      <div className="sidebar">
        <div className="logo-wrap" onClick={() => handleNavigation('dashboard')} style={{cursor:'pointer'}}>
          <Icon type="vlan" />
        </div>
        
        {/* Item Dashboard */}
        <div 
          className={`nav-item ${page === 'dashboard' ? 'active' : ''}`} 
          onClick={() => handleNavigation('dashboard')}
        >
          <Icon type="monitor" /><span>Dashboard</span>
        </div>

        {/* Item VLAN -> Redirige vers vlan.html */}
        <div 
          className="nav-item" 
          onClick={() => handleNavigation('vlan')}
        >
          <Icon type="vlan" /><span>VLAN</span>
        </div>

        <div className="nav-item" onClick={() => handleNavigation('alerts')}>
          <Icon type="alert" /><span>Alerts</span>
        </div>
      </div>

      <div className="main">
        {/* ... reste de la topbar ... */}
        <div className="content">
          {page === 'dashboard' && <Dashboard setPage={handleNavigation} />}
          {page === 'alerts' && <AlertsPage setPage={handleNavigation} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
