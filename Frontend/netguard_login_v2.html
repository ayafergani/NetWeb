<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGuard - Connexion</title>
  <script src="auth.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body { min-height: 100vh; background: #0f0c29; background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #0a0a1a 100%); }
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #0f0c29, #1a1a3e, #0a0a1a);position:relative;overflow:hidden;padding:2rem 1rem}
    .bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;display:block}
    .card{position:relative;z-index:10;width:100%;max-width:400px;background:rgba(10,10,30,0.85);border:0.5px solid rgba(100,108,255,0.3);border-radius:24px;padding:2.2rem 2.2rem;backdrop-filter:blur(12px);box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
    .logo-row{display:flex;align-items:center;justify-content:center;margin-bottom:1.4rem}
    .shield-wrap{position:relative;width:68px;height:68px}
    .pulse-ring{position:absolute;inset:-10px;border-radius:50%;border:1.5px solid rgba(100,108,255,0.4);animation:pr 2.4s ease-out infinite}
    .pulse-ring2{position:absolute;inset:-22px;border-radius:50%;border:0.5px solid rgba(100,108,255,0.15);animation:pr 2.4s ease-out infinite 0.8s}
    .pulse-ring3{position:absolute;inset:-34px;border-radius:50%;border:0.5px solid rgba(100,108,255,0.07);animation:pr 2.4s ease-out infinite 1.6s}
    @keyframes pr{0%{transform:scale(0.88);opacity:1}100%{transform:scale(1.4);opacity:0}}
    .shield-inner{width:68px;height:68px;background:rgba(30,30,80,0.8);border:1px solid rgba(100,108,255,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center}
    .title-block{text-align:center;margin-bottom:1.8rem}
    .app-name{font-size:30px;font-weight:700;color:#fff;font-family:'DM Sans',sans-serif;letter-spacing:-0.5px}
    .app-name span{background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    .app-sub{font-size:12px;color:rgba(160,170,255,0.6);font-weight:500;margin-top:4px;letter-spacing:0.5px}
    .ids-tag{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:rgba(100,108,255,0.1);border:0.5px solid rgba(100,108,255,0.25);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;color:rgba(160,170,255,0.9);letter-spacing:1.5px;text-transform:uppercase}
    .dot-live{width:6px;height:6px;border-radius:50%;background:#6366f1;animation:blink 1.8s ease-in-out infinite;box-shadow:0 0 6px #6366f1}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    label{display:block;font-size:9px;font-weight:700;color:rgba(160,170,255,0.5);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;font-family:'DM Sans',sans-serif}
    .field{margin-bottom:12px;position:relative}
    .field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none}
    input[type=text],input[type=password],input[type=email]{width:100%;background:rgba(20,20,50,0.6);border:0.5px solid rgba(100,108,255,0.2);border-radius:12px;padding:11px 14px 11px 38px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;font-family:'DM Sans',sans-serif}
    input:focus{border-color:rgba(100,108,255,0.7);box-shadow:0 0 0 3px rgba(100,108,255,0.1)}
    input::placeholder{color:rgba(160,170,255,0.25)}
    .strength-bar{height:2px;border-radius:2px;margin-top:5px;background:rgba(255,255,255,0.05);overflow:hidden}
    .strength-fill{height:100%;border-radius:2px;transition:width 0.4s,background 0.4s;width:0}
    .btn{width:100%;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:6px;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden}
    .btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.1);opacity:0;transition:opacity 0.2s}
    .btn:hover:not(:disabled)::after{opacity:1}
    .btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 10px 25px -5px rgba(99,102,241,0.3)}
    .btn:disabled{opacity:0.55;cursor:not-allowed}
    .err{background:rgba(239,68,68,0.1);border:0.5px solid rgba(239,68,68,0.3);border-radius:10px;padding:9px 13px;color:#fca5a5;font-size:12px;margin-bottom:10px;display:none;font-family:'DM Sans',sans-serif}
    .success-msg{background:rgba(34,197,94,0.1);border:0.5px solid rgba(34,197,94,0.3);border-radius:10px;padding:9px 13px;color:#86efac;font-size:12px;margin-bottom:10px;display:none;font-family:'DM Sans',sans-serif}
    .scan-bar{height:1px;background:rgba(100,108,255,0.0);position:relative;overflow:hidden;margin:1.2rem 0 0.8rem}
    .scan-line{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(100,108,255,0.6),transparent);width:40%;animation:scan 2.5s ease-in-out infinite}
    @keyframes scan{0%{left:-40%}100%{left:140%}}
    .status-row{display:flex;align-items:center;gap:8px;margin-top:10px}
    .status-indicator{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:rgba(160,170,255,0.6);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace}
    .status-dot{width:5px;height:5px;border-radius:50%;background:#6366f1;animation:blink 2s ease-in-out infinite}
    .traffic-mini{display:flex;gap:3px;align-items:flex-end;height:18px}
    .bar-mini{width:3px;background:rgba(100,108,255,0.4);border-radius:1px;animation:grow 1.5s ease-in-out infinite}
    @keyframes grow{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}
    
    .auth-links{display:flex;justify-content:flex-end;margin-top:12px}
    .auth-link{font-size:11px;color:#818cf8;text-decoration:none;cursor:pointer;transition:color 0.2s}
    .auth-link:hover{color:#c7d2fe;text-decoration:underline}
    
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center}
    .modal-card{background:rgba(10,10,30,0.95);border:1px solid rgba(100,108,255,0.3);border-radius:24px;padding:2rem;width:90%;max-width:380px;position:relative;backdrop-filter:blur(12px)}
    .modal-card h3{color:#fff;font-size:20px;margin-bottom:1rem;text-align:center}
    .close-modal{position:absolute;top:15px;right:20px;color:#818cf8;font-size:24px;cursor:pointer;transition:color 0.2s}
    .close-modal:hover{color:#fff}
    .modal-btn{width:100%;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}
    .modal-btn-secondary{background:rgba(100,108,255,0.2);border:1px solid rgba(100,108,255,0.3);margin-top:8px}
  </style>
</head>
<body>
<div class="wrap">
  <canvas class="bg-canvas" id="bgCanvas"></canvas>
  <div class="card">
    <div class="logo-row">
      <div class="shield-wrap">
        <div class="pulse-ring"></div>
        <div class="pulse-ring2"></div>
        <div class="pulse-ring3"></div>
        <div class="shield-inner">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <polyline points="9 12 11 14 15 10" stroke="#a78bfa" stroke-width="1.8"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="title-block">
      <div class="app-name">Net<span>Guard</span></div>
      <div class="app-sub">Segmentation &amp; Détection IDS</div>
      <div class="ids-tag"><div class="dot-live"></div>IDS · Surveillance · Réseau</div>
    </div>

    <div id="loginPanel">
      <div id="errBox" class="err">⚠ Identifiant ou mot de passe incorrect.</div>
      
      <div class="field">
        <label>Identifiant</label>
        <div class="field-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <input type="text" id="uIn" placeholder="Identifiant utilisateur" />
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="field-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <input type="password" id="pIn" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" oninput="updateStrength(this.value)" />
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>

      <button class="btn" id="loginBtn" onclick="doLogin()">Connexion →</button>
      
      <div class="auth-links">
        <a class="auth-link" onclick="openModal('forgot')">Mot de passe oublié</a>
      </div>
    </div>

    <div class="scan-bar"><div class="scan-line"></div></div>

    <div class="status-row">
      <div class="status-indicator"><div class="status-dot"></div>Système sécurisé</div>
      <div style="flex:1"></div>
      <div class="traffic-mini">
        <div class="bar-mini" style="height:10px;animation-delay:0s"></div>
        <div class="bar-mini" style="height:14px;animation-delay:0.3s"></div>
        <div class="bar-mini" style="height:8px;animation-delay:0.6s"></div>
        <div class="bar-mini" style="height:16px;animation-delay:0.9s"></div>
        <div class="bar-mini" style="height:11px;animation-delay:1.2s"></div>
      </div>
      <div style="font-size:10px;color:rgba(160,170,255,0.45);font-family:'DM Mono',monospace;letter-spacing:0.5px" id="ipDisplay">192.168.0.1</div>
    </div>
  </div>
</div>

<!-- Modal Mot de passe oublié (suppression du modal création de compte) -->
<div id="forgotModal" class="modal-overlay">
  <div class="modal-card">
    <span class="close-modal" onclick="closeModal('forgot')">&times;</span>
    <h3>Réinitialisation</h3>
    <div id="forgotErrBox" class="err"></div>
    <div id="forgotSuccessBox" class="success-msg"></div>
    
    <div class="field">
      <label>Email ou identifiant</label>
      <div class="field-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <input type="text" id="forgotIdentity" placeholder="Votre email ou identifiant" />
    </div>

    <button class="modal-btn" onclick="doForgotPassword()">Réinitialiser →</button>
    <button class="modal-btn modal-btn-secondary" onclick="closeModal('forgot')">Annuler</button>
  </div>
</div>

<script>
// Page de connexion - pas de redirection automatique
document.addEventListener('DOMContentLoaded', function() {
  console.log('Page de connexion - aucune redirection automatique');
  
  if (typeof window.NetGuardAuth !== 'undefined') {
    console.log('auth.js chargé');
  }
});

// Stockage utilisateurs (comptes prédéfinis uniquement, pas de création)
let users = {
  admin: { password: '123', role: 'ADMIN', name: 'Super Admin', email: 'admin@netguard.com' },
  net: { password: '123', role: 'NETWORK_ADMIN', name: 'Ingénieur Réseau', email: 'net@netguard.com' },
  sec: { password: '123', role: 'SECURITY_ADMIN', name: 'Analyste SOC', email: 'sec@netguard.com' },
  audit: { password: '123', role: 'AUDITOR', name: 'Auditeur Externe', email: 'audit@netguard.com' }
};

// Gestion des modals (uniquement mot de passe oublié)
function openModal(type) {
  if (type === 'forgot') {
    document.getElementById('forgotModal').style.display = 'flex';
    document.getElementById('forgotIdentity').value = '';
  }
  document.querySelectorAll('.err, .success-msg').forEach(el => el.style.display = 'none');
}

function closeModal(type) {
  if (type === 'forgot') {
    document.getElementById('forgotModal').style.display = 'none';
  }
}

window.onclick = function(event) {
  if (event.target.classList.contains('modal-overlay')) {
    event.target.style.display = 'none';
  }
}

function updateStrength(v) {
  const fill = document.getElementById('strengthFill');
  if (!v) { fill.style.width='0'; return; }
  const s = v.length >= 8 ? (v.length >= 12 ? 100 : 60) : 30;
  const c = s >= 100 ? '#22c55e' : s >= 60 ? '#f59e0b' : '#ef4444';
  fill.style.width = s + '%';
  fill.style.background = c;
}

function doLogin() {
  const u = document.getElementById('uIn').value.trim().toLowerCase();
  const p = document.getElementById('pIn').value;
  const err = document.getElementById('errBox');
  const btn = document.getElementById('loginBtn');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Authentification...';
  
  setTimeout(() => {
    const user = users[u];
    if (user && user.password === p) {
      // Stocker la session
      if (typeof window.NetGuardAuth !== 'undefined') {
        NetGuardAuth.setSession({
          username: u,
          name: user.name,
          role: user.role,
          email: user.email
        });
      } else {
        localStorage.setItem('netguard_session', JSON.stringify({
          username: u,
          name: user.name,
          role: user.role,
          email: user.email,
          timestamp: Date.now()
        }));
      }
      
      btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
      btn.textContent = '✓ Accès autorisé — ' + user.name;
      
      setTimeout(() => {
        // Redirection vers le tableau de bord UNIQUEMENT après connexion réussie
        if (typeof window.NetGuardAuth !== 'undefined') {
          window.location.href = NetGuardAuth.getDefaultPage(user.role);
        } else {
          const rolePages = {
            'ADMIN': 'dashboard.html',
            'NETWORK_ADMIN': 'network.html',
            'SECURITY_ADMIN': 'security.html',
            'AUDITOR': 'audit.html',
            'USER': 'user-dashboard.html'
          };
          window.location.href = rolePages[user.role] || 'dashboard.html';
        }
      }, 1000);
    } else {
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Connexion →';
      btn.style.background = 'linear-gradient(135deg,#6366f1,#8b5cf6)';
    }
  }, 900);
}

function doForgotPassword() {
  const identity = document.getElementById('forgotIdentity').value.trim().toLowerCase();
  const errBox = document.getElementById('forgotErrBox');
  const successBox = document.getElementById('forgotSuccessBox');
  const btn = document.querySelector('#forgotModal .modal-btn');
  
  errBox.style.display = 'none';
  successBox.style.display = 'none';
  
  if (!identity) {
    errBox.textContent = '⚠ Veuillez entrer votre email ou identifiant.';
    errBox.style.display = 'block';
    return;
  }
  
  let foundUser = null;
  let foundUsername = null;
  
  for (const [username, userData] of Object.entries(users)) {
    if (username === identity || (userData.email && userData.email === identity)) {
      foundUser = userData;
      foundUsername = username;
      break;
    }
  }
  
  if (!foundUser) {
    errBox.textContent = '⚠ Aucun compte trouvé avec ces informations.';
    errBox.style.display = 'block';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Envoi...';
  
  setTimeout(() => {
    const tempPassword = Math.random().toString(36).slice(-8);
    users[foundUsername].password = tempPassword;
    
    successBox.innerHTML = `✓ Nouveau mot de passe : <strong style="background:#1e1e40;padding:2px 6px;border-radius:6px;font-family:monospace">${tempPassword}</strong><br><small>Veuillez le changer après connexion.</small>`;
    successBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Réinitialiser →';
    
    setTimeout(() => {
      closeModal('forgot');
      document.getElementById('uIn').value = foundUsername;
      document.getElementById('pIn').value = tempPassword;
      document.getElementById('strengthFill').style.width = '100%';
    }, 3000);
  }, 1000);
}

// IP dynamique
const ip = document.getElementById('ipDisplay');
setInterval(() => { 
  ip.textContent = '192.168.' + Math.floor(Math.random()*5) + '.' + Math.floor(Math.random()*254)+1; 
}, 2200);

// Canvas background
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let nodes = [];
let packets = [];

function initNodes() {
  const count = Math.max(45, Math.floor(window.innerWidth * window.innerHeight / 18000));
  nodes = Array.from({length: count}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() < 0.12 ? 2.8 : 1.4
  }));
}

initNodes();

function spawnPacket() {
  if (nodes.length < 2) return;
  const a = Math.floor(Math.random() * nodes.length);
  let b = Math.floor(Math.random() * nodes.length);
  while (b === a && nodes.length > 1) b = Math.floor(Math.random() * nodes.length);
  const dx = nodes[b].x - nodes[a].x, dy = nodes[b].y - nodes[a].y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d < 60) return;
  packets.push({
    ax: nodes[a].x, ay: nodes[a].y,
    bx: nodes[b].x, by: nodes[b].y,
    t: 0, speed: 0.007 + Math.random() * 0.008
  });
}
setInterval(spawnPacket, 500);

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  
  ctx.strokeStyle = 'rgba(100,108,255,0.03)';
  ctx.lineWidth = 0.5;
  const step = 45;
  for (let x = 0; x < W; x += step) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += step) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  
  for (let i = 0; i < nodes.length; i++) {
    const p = nodes[i];
    p.x += p.vx;
    p.y += p.vy;
    
    if (p.x < -20) p.x = W + 20;
    if (p.x > W + 20) p.x = -20;
    if (p.y < -20) p.y = H + 20;
    if (p.y > H + 20) p.y = -20;
    
    for (let j = i + 1; j < nodes.length; j++) {
      const q = nodes[j];
      const dx = p.x - q.x, dy = p.y - q.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 110) {
        const opacity = 0.12 * (1 - d / 110);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `rgba(129,140,248,${opacity})`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
      }
    }
  }
  
  for (const p of nodes) {
    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
    gradient.addColorStop(0, `rgba(129,140,248,0.5)`);
    gradient.addColorStop(1, 'rgba(129,140,248,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 3.5, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(167,139,250,0.8)`;
    ctx.fill();
  }
  
  for (let i = packets.length - 1; i >= 0; i--) {
    const pk = packets[i];
    pk.t += pk.speed;
    if (pk.t >= 1) {
      packets.splice(i, 1);
      continue;
    }
    const x = pk.ax + (pk.bx - pk.ax) * pk.t;
    const y = pk.ay + (pk.by - pk.ay) * pk.t;
    
    for (let s = 0; s < 5; s++) {
      const tt = Math.max(0, pk.t - s * 0.025);
      const tx = pk.ax + (pk.bx - pk.ax) * tt;
      const ty = pk.ay + (pk.by - pk.ay) * tt;
      ctx.beginPath();
      ctx.arc(tx, ty, 1.6 - s * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(167,139,250,${0.45 - s * 0.07})`;
      ctx.fill();
    }
    
    ctx.beginPath();
    ctx.arc(x, y, 2.4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(196,181,253,0.95)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
  }
  
  const now = Date.now() / 1000;
  const angle = (now * 0.25) % (Math.PI * 2);
  const cx = W / 2, cy = H / 2;
  const maxR = Math.max(W, H) * 0.85;
  
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  const gradientBeam = ctx.createLinearGradient(0, 0, maxR, 0);
  gradientBeam.addColorStop(0, 'rgba(129,140,248,0.06)');
  gradientBeam.addColorStop(0.6, 'rgba(129,140,248,0.01)');
  gradientBeam.addColorStop(1, 'rgba(129,140,248,0)');
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, maxR, -0.25, 0.25);
  ctx.closePath();
  ctx.fillStyle = gradientBeam;
  ctx.fill();
  ctx.restore();
  
  if (Math.random() < 0.05) {
    const fx = Math.random() * W;
    const fy = Math.random() * H;
    ctx.beginPath();
    ctx.arc(fx, fy, Math.random() * 1.2 + 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(167,139,250,${Math.random() * 0.3})`;
    ctx.fill();
  }
  
  requestAnimationFrame(draw);
}

window.addEventListener('resize', () => {
  resizeCanvas();
  initNodes();
  packets = [];
});

draw();
</script>
</body>
</html>
