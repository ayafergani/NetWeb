    /* ─── Layout ─── */
    body{min-height:100vh}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:2rem 1rem}
    .bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;display:block}
    .card{position:relative;z-index:10;width:100%;max-width:400px;border-radius:24px;padding:2.2rem 2.2rem;backdrop-filter:blur(12px)}

    /* ─── Logo ─── */
    .logo-row{display:flex;align-items:center;justify-content:center;margin-bottom:1.4rem}
    .shield-wrap{position:relative;width:68px;height:68px}
    .pulse-ring{position:absolute;inset:-10px;border-radius:50%;border:1.5px solid rgba(100,108,255,0.4);animation:pr 2.4s ease-out infinite}
    .pulse-ring2{position:absolute;inset:-22px;border-radius:50%;border:0.5px solid rgba(100,108,255,0.15);animation:pr 2.4s ease-out infinite 0.8s}
    .pulse-ring3{position:absolute;inset:-34px;border-radius:50%;border:0.5px solid rgba(100,108,255,0.07);animation:pr 2.4s ease-out infinite 1.6s}
    @keyframes pr{0%{transform:scale(0.88);opacity:1}100%{transform:scale(1.4);opacity:0}}
    .shield-inner{width:68px;height:68px;background:rgba(30,30,80,0.8);border:1px solid rgba(100,108,255,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center}

    /* ─── Title ─── */
    .title-block{text-align:center;margin-bottom:1.8rem}
    .app-name{font-size:30px;font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:-0.5px}
    .app-name span{background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    .app-sub{font-size:12px;font-weight:500;margin-top:4px;letter-spacing:0.5px}
    .ids-tag{display:inline-flex;align-items:center;gap:6px;margin-top:8px;border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
    .dot-live{width:6px;height:6px;border-radius:50%;background:#818cf8;box-shadow:0 0 6px #818cf8;animation:blink 1.8s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

    /* ─── Form ─── */
    label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;font-family:'DM Sans',sans-serif}
    .field{margin-bottom:12px;position:relative}
    .field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none}
    input[type=text],input[type=password],input[type=email]{width:100%;border-radius:12px;padding:11px 14px 11px 38px;font-size:13px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;font-family:'DM Sans',sans-serif}
    .strength-bar{height:2px;border-radius:2px;margin-top:5px;overflow:hidden}
    .strength-fill{height:100%;border-radius:2px;transition:width 0.4s,background 0.4s;width:0}

    /* ─── Buttons ─── */
    .btn{width:100%;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:6px;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden}
    .btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.1);opacity:0;transition:opacity 0.2s}
    .btn:hover:not(:disabled)::after{opacity:1}
    .btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 10px 25px -5px rgba(99,102,241,0.3)}
    .btn:disabled{opacity:0.55;cursor:not-allowed}

    /* ─── Messages ─── */
    .err{border-radius:10px;padding:9px 13px;font-size:12px;margin-bottom:10px;display:none;font-family:'DM Sans',sans-serif}
    .success-msg{border-radius:10px;padding:9px 13px;font-size:12px;margin-bottom:10px;display:none;font-family:'DM Sans',sans-serif}

    /* ─── Scan bar ─── */
    .scan-bar{height:1px;background:rgba(100,108,255,0.0);position:relative;overflow:hidden;margin:1.2rem 0 0.8rem}
    .scan-line{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(100,108,255,0.6),transparent);width:40%;animation:scan 2.5s ease-in-out infinite}
    @keyframes scan{0%{left:-40%}100%{left:140%}}

    /* ─── Status ─── */
    .status-row{display:flex;align-items:center;gap:8px;margin-top:10px}
    .status-indicator{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace}
    .status-dot{width:5px;height:5px;border-radius:50%;background:#818cf8;animation:blink 2s ease-in-out infinite}
    .traffic-mini{display:flex;gap:3px;align-items:flex-end;height:18px}
    .bar-mini{width:3px;border-radius:1px;background:rgba(129,140,248,0.5);animation:grow 1.5s ease-in-out infinite}
    @keyframes grow{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}

    /* ─── Links ─── */
    .auth-links{display:flex;justify-content:flex-end;margin-top:12px}
    .auth-link{font-size:11px;text-decoration:none;cursor:pointer;transition:color 0.2s}

    /* ─── Modal ─── */
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center}
    .modal-card{border-radius:24px;padding:2rem;width:90%;max-width:400px;position:relative;backdrop-filter:blur(12px)}
    .modal-card h3{font-size:20px;margin-bottom:0.3rem;text-align:center;font-family:'DM Sans',sans-serif}
    .modal-sub{font-size:11px;text-align:center;margin-bottom:1rem;font-family:'DM Sans',sans-serif}
    .close-modal{position:absolute;top:15px;right:20px;font-size:24px;cursor:pointer;transition:color 0.2s;line-height:1}
    .modal-btn{width:100%;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;font-family:'DM Sans',sans-serif;transition:all 0.2s}
    .modal-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 20px -4px rgba(99,102,241,0.35)}
    .modal-btn:disabled{opacity:0.55;cursor:not-allowed}
    .modal-btn-secondary{margin-top:8px;font-weight:600}

    /* ─── Étapes ─── */
    .steps-row{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:1.2rem}
    .step-item{display:flex;flex-direction:column;align-items:center;gap:4px}
    .step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all 0.3s;font-family:'DM Mono',monospace}
    .step-circle.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,0.4)}
    .step-circle.done{background:rgba(34,197,94,0.2);color:#22c55e;border:1px solid rgba(34,197,94,0.4)}
    .step-circle.inactive{background:rgba(100,108,255,0.1);color:rgba(129,140,248,0.4);border:1px solid rgba(100,108,255,0.15)}
    .step-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'DM Sans',sans-serif}
    .step-line{width:40px;height:1px;background:rgba(100,108,255,0.2);margin-bottom:16px}

    /* ─── Cases du code ─── */
    .code-row{display:flex;gap:8px;justify-content:center;margin:12px 0}
    .code-digit-input{width:44px;height:52px;border-radius:10px;text-align:center;font-size:22px;font-weight:700;font-family:'DM Mono',monospace;outline:none;transition:all 0.2s;padding:0}

    /* ─── Info box ─── */
    .modal-info{border-radius:10px;padding:9px 13px;font-size:11px;margin-bottom:12px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px}

    /* ─── Timer ─── */
    .timer-box{text-align:center;font-size:11px;margin-bottom:8px;font-family:'DM Mono',monospace}

    /* ─── Renvoi ─── */
    .resend-row{text-align:center;margin-top:6px}
    .resend-link{font-size:11px;cursor:pointer;opacity:0.7;transition:opacity 0.2s}
    .resend-link:hover{opacity:1}

    /* ─── Theme switch ─── */
    .theme-switch{position:fixed;top:20px;right:20px;z-index:1000;backdrop-filter:blur(8px);border-radius:50px;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;transition:all 0.3s ease;font-family:'DM Sans',sans-serif}
    .theme-switch:hover{transform:scale(1.05)}
    .theme-icon{font-size:16px}

    /* ─── Spinner ─── */
    .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;margin-right:6px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  </style>
</head>

<script>
/* ══════════════════════════════════════════════
   ⚙️  CONFIGURATION EMAILJS
══════════════════════════════════════════════ */
const EMAILJS_PUBLIC_KEY  = 'SNUUUqcgK2d77Wp0z';
const EMAILJS_SERVICE_ID  = '123';
const EMAILJS_TEMPLATE_ID = '123';

/* ─── Init EmailJS ─── */
(function(){
  try{ emailjs.init(EMAILJS_PUBLIC_KEY); }
  catch(e){ console.warn('EmailJS non chargé:', e); }
})();

/* ══════════════════════════════════════════════
   UTILISATEURS — source unique : auth.js
   Le tableau users ici sert uniquement à la
   recherche locale (email/identifiant) et à
   l'envoi EmailJS. auth.js reste la référence
   pour la session et les rôles.
══════════════════════════════════════════════ */
let users = {
  admin: { password:'123', role: NetGuardAuth.ROLES.ADMIN,          name:'Super Admin',      email:'benainimeroua@gmail.com'   },
  net:   { password:'123', role: NetGuardAuth.ROLES.NETWORK_ADMIN,  name:'Ingénieur Réseau', email:'marwabenaini7@gmail.com'    },
  sec:   { password:'123', role: NetGuardAuth.ROLES.SECURITY_ADMIN, name:'Analyste SOC',     email:'benainimeroua72@gmail.com'  },
  audit: { password:'123', role: NetGuardAuth.ROLES.AUDITOR,        name:'Auditeur Externe', email:'audit@netguard.com'         }
};

/* ══════════════════════════════════════════════
   ✉️  buildEmailRecipients — NOUVELLE FONCTION
   ─────────────────────────────────────────────
   Construit automatiquement les champs EmailJS
   à partir du tableau users :
     • to_email  → email du destinataire principal
     • to_name   → nom du destinataire
     • cc_emails → tous les autres emails (séparés
                   par virgule) sauf le destinataire
     • all_emails_list → liste lisible de tous les
                   comptes pour le corps du mail
   Utilisation dans le template EmailJS :
     {{to_email}}        → destinataire principal
     {{cc_emails}}       → mettre en CC dans le template
     {{all_emails_list}} → afficher la liste complète
══════════════════════════════════════════════ */
function buildEmailRecipients(targetUsername) {
  const targetUser = users[targetUsername];
  if (!targetUser) return null;

  /* Tous les emails sauf le destinataire principal */
  const ccList = Object.entries(users)
    .filter(([username]) => username !== targetUsername)
    .map(([, data]) => data.email)
    .join(', ');

  /* Liste lisible de tous les comptes (pour le corps du mail) */
  const allEmailsList = Object.entries(users)
    .map(([username, data]) => username + ' <' + data.email + '>')
    .join('\n');

  return {
    to_name:        targetUser.name,
    to_email:       targetUser.email,
    cc_emails:      ccList,
    all_emails_list: allEmailsList
  };
}

/* ─── État réinitialisation ─── */
let resetState = { username:null, code:null, expiry:null, timerInterval:null };

/* ══════════════════════════════════════════════
   THÈME
══════════════════════════════════════════════ */
function toggleTheme(){
  const body=document.body;
  const icon=document.getElementById('themeIcon');
  const text=document.getElementById('themeText');
  if(body.classList.contains('dark-mode')){
    body.classList.replace('dark-mode','light-mode');
    icon.textContent='☀️'; text.textContent='Mode clair';
    localStorage.setItem('theme','light');
  } else {
    body.classList.replace('light-mode','dark-mode');
    icon.textContent='🌙'; text.textContent='Mode sombre';
    localStorage.setItem('theme','dark');
  }
}

function loadTheme(){
  if(localStorage.getItem('theme')==='light'){
    document.body.classList.replace('dark-mode','light-mode');
    document.getElementById('themeIcon').textContent='☀️';
    document.getElementById('themeText').textContent='Mode clair';
  }
}

/* ══════════════════════════════════════════════
   CONNEXION
══════════════════════════════════════════════ */
function updateStrength(v){
  const fill=document.getElementById('strengthFill');
  if(!v){fill.style.width='0';return;}
  const s=v.length>=12?100:v.length>=8?60:30;
  fill.style.width=s+'%';
  fill.style.background=s>=100?'#22c55e':s>=60?'#f59e0b':'#ef4444';
}

async function doLogin(){
  const u=document.getElementById('uIn').value.trim().toLowerCase();
  const p=document.getElementById('pIn').value;
  const err=document.getElementById('errBox');
  const btn=document.getElementById('loginBtn');
  err.style.display='none';
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Authentification…';

  // Blocage de sécurité : empêche l'utilisation via double-clic (file://)
  if (window.location.protocol === 'file:') {
    err.innerHTML = '⚠ <b>Erreur :</b> Vous avez ouvert ce fichier par un double-clic (file://).<br>La mémoire du navigateur est bloquée en mode fichier.<br><br>Tapez <b>http://localhost:8000/netguard_login_v2.html</b> dans la barre d\'adresse de votre navigateur pour que la redirection fonctionne.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Connexion →';
    btn.style.background = 'linear-gradient(135deg,#6366f1,#8b5cf6)';
    return;
  }

  try {
    // Vérification anti-cache : on s'assure que la nouvelle version de auth.js est bien chargée
    if (typeof NetGuardAuth.authenticate !== 'function') {
      throw new Error("CACHE_ERROR");
    }

    // On attend (await) la réponse du serveur backend
    const result = await NetGuardAuth.authenticate(u, p);

    if(result.success){
      NetGuardAuth.setSession(result.user);
      btn.style.background='linear-gradient(135deg,#22c55e,#16a34a)';
      const targetPage = NetGuardAuth.getDefaultPage(result.user.role);
      console.log("Connexion réussie ! Rôle:", result.user.role, "-> Redirection vers:", targetPage);
      btn.innerHTML='✓ Ouverture de <b>' + targetPage + '</b>';
      setTimeout(()=>{ window.location.href = targetPage; }, 1500);
    } else {
      err.innerHTML = '⚠ ' + result.error;
      err.style.display='block';
      btn.disabled=false;
      btn.textContent='Connexion →';
      btn.style.background='linear-gradient(135deg,#6366f1,#8b5cf6)';
    }
  } catch (error) {
    if (error.message === "CACHE_ERROR") {
      err.innerHTML = '⚠ <b>Erreur :</b> Votre navigateur a gardé l\'ancienne version en mémoire.<br>Appuyez sur <b>Ctrl + F5</b> pour mettre à jour.';
    } else {
      err.innerHTML = '⚠ <b>Erreur Serveur :</b> Impossible de joindre Flask.<br>Vérifiez que le backend tourne bien.';
    }
    err.style.display='block';
    btn.disabled=false;
    btn.textContent='Connexion →';
    btn.style.background='linear-gradient(135deg,#6366f1,#8b5cf6)';
  }
}

/* ══════════════════════════════════════════════
   MODAL — OUVERTURE / FERMETURE
══════════════════════════════════════════════ */
function openModal(type){
  if(type==='forgot'){
    document.getElementById('forgotModal').style.display='flex';
    resetToStep1();
  }
}

function closeModal(type){
  if(type==='forgot'){
    document.getElementById('forgotModal').style.display='none';
    clearResetTimer();
  }
}

window.onclick=e=>{
  if(e.target.classList.contains('modal-overlay')) closeModal('forgot');
};

function backToStep1(){ clearResetTimer(); resetToStep1(); }

function resetToStep1(){
  document.getElementById('forgotErrBox').style.display='none';
  document.getElementById('forgotSuccessBox').style.display='none';
  setStep(1);
  document.getElementById('step1Section').style.display='block';
  document.getElementById('step2Section').style.display='none';
  const btn=document.getElementById('step1Btn');
  btn.disabled=false; btn.textContent='Envoyer le code →';
  document.getElementById('forgotIdentity').value='';
  document.getElementById('modalTitle').textContent='Mot de passe oublié';
  document.getElementById('modalSub').textContent='Entrez votre identifiant ou email';
}

function setStep(step){
  for(let i=1;i<=3;i++){
    const c=document.getElementById('stepCircle'+i);
    if(i<step){c.className='step-circle done';c.textContent='✓';}
    else if(i===step){c.className='step-circle active';c.textContent=i===3?'✓':i;}
    else{c.className='step-circle inactive';c.textContent=i===3?'✓':i;}
  }
}

/* ══════════════════════════════════════════════
   ÉTAPE 1 — Vérification identité + envoi email
══════════════════════════════════════════════ */
function doForgotStep1(){
  const identity=document.getElementById('forgotIdentity').value.trim().toLowerCase();
  document.getElementById('forgotErrBox').style.display='none';
  document.getElementById('forgotSuccessBox').style.display='none';
  if(!identity){showForgotErr('⚠ Veuillez entrer votre email ou identifiant.');return;}

  let foundUser=null,foundUsername=null;
  for(const [username,userData] of Object.entries(users)){
    if(username===identity||userData.email===identity){foundUser=userData;foundUsername=username;break;}
  }
  if(!foundUser){showForgotErr('⚠ Aucun compte trouvé avec ces informations.');return;}

  const btn=document.getElementById('step1Btn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Envoi du code…';
  sendResetCode(foundUsername,foundUser,btn);
}

/* ══════════════════════════════════════════════
   sendResetCode — utilise buildEmailRecipients
   pour injecter automatiquement tous les emails
   dans les paramètres du template EmailJS
══════════════════════════════════════════════ */
function sendResetCode(username, userData, btn){
  const code = String(Math.floor(100000 + Math.random() * 900000));
  resetState.username = username;
  resetState.code = code;
  resetState.expiry = Date.now() + 10 * 60 * 1000;

  /* ── Envoi uniquement à l'email de l'utilisateur qui a saisi son identifiant ── */
  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    to_name:    userData.name,
    to_email:   userData.email,   // ← email de LA personne qui a demandé la réinitialisation
    reset_code: code,
    username:   username
  }).then(() => {
    if(btn){ btn.disabled=false; btn.textContent='Envoyer le code →'; }
    document.getElementById('step1Section').style.display = 'none';
    document.getElementById('step2Section').style.display = 'block';
    document.getElementById('modalTitle').textContent = 'Vérification';
    document.getElementById('modalSub').textContent = 'Code envoyé par email';
    document.getElementById('emailInfoText').textContent = 'Code envoyé à ' + maskEmail(userData.email);
    setStep(2);
    for(let i = 0; i < 6; i++) document.getElementById('d' + i).value = '';
    document.getElementById('d0').focus();
    startResetTimer();
  }).catch(err => {
    console.error('EmailJS error:', err);
    if(btn){ btn.disabled=false; btn.textContent='Envoyer le code →'; }
    showForgotErr('⚠ Échec d\'envoi. Vérifiez la configuration EmailJS.');
  });
}
function maskEmail(email){
  const[local,domain]=email.split('@');
  return local.slice(0,2)+'***@'+domain;
}

/* ══════════════════════════════════════════════
   ÉTAPE 2 — Vérification du code
══════════════════════════════════════════════ */
function doForgotStep2(){
  const code=[0,1,2,3,4,5].map(i=>document.getElementById('d'+i).value).join('');
  document.getElementById('forgotErrBox').style.display='none';
  document.getElementById('forgotSuccessBox').style.display='none';
  if(code.length!==6||isNaN(code)){showForgotErr('⚠ Entrez les 6 chiffres du code reçu.');return;}
  if(Date.now()>resetState.expiry){showForgotErr('⚠ Le code a expiré. Cliquez sur "Renvoyer le code".');return;}
  if(code!==resetState.code){
    showForgotErr('⚠ Code incorrect. Vérifiez votre email.');
    const cr=document.getElementById('codeRow');
    cr.style.animation='none';
    setTimeout(()=>{cr.style.animation='shake 0.4s ease';},10);
    return;
  }

  clearResetTimer();
  setStep(3);

  const tempPwd=Math.random().toString(36).slice(-8)+Math.random().toString(36).slice(-4).toUpperCase();
  users[resetState.username].password=tempPwd;

  const successBox=document.getElementById('forgotSuccessBox');
  successBox.innerHTML=`✅ Code validé ! Mot de passe temporaire :<br>
    <strong style="font-family:'DM Mono',monospace;font-size:15px;letter-spacing:2px;padding:2px 6px;border-radius:6px;background:rgba(100,108,255,0.15)">${tempPwd}</strong><br>
    <small style="opacity:0.7">Connexion automatique dans 3s…</small>`;
  successBox.style.display='block';
  document.getElementById('step2Btn').disabled=true;
  document.getElementById('step2Btn').textContent='✓ Validé';

  setTimeout(()=>{
    closeModal('forgot');
    document.getElementById('uIn').value=resetState.username;
    document.getElementById('pIn').value=tempPwd;
    updateStrength(tempPwd);
    resetState={username:null,code:null,expiry:null,timerInterval:null};
  },3000);
}

/* ══════════════════════════════════════════════
   RENVOI DU CODE
══════════════════════════════════════════════ */
function resendCode(){
  if(!resetState.username) return;
  clearResetTimer();
  const userData=users[resetState.username];
  document.getElementById('forgotErrBox').style.display='none';
  document.getElementById('forgotSuccessBox').style.display='none';
  const link=document.getElementById('resendLink');
  link.style.opacity='0.4';link.style.pointerEvents='none';
  sendResetCode(resetState.username,userData,null);
  setTimeout(()=>{link.style.opacity='0.7';link.style.pointerEvents='auto';},30000);
}

/* ══════════════════════════════════════════════
   TIMER 10 MINUTES
══════════════════════════════════════════════ */
function startResetTimer(){
  clearResetTimer();
  const box=document.getElementById('timerBox');
  box.style.color='';
  resetState.timerInterval=setInterval(()=>{
    const rem=Math.max(0,resetState.expiry-Date.now());
    const m=Math.floor(rem/60000);
    const s=Math.floor((rem%60000)/1000);
    box.textContent=`Expire dans ${m}:${String(s).padStart(2,'0')}`;
    if(rem<=0){clearResetTimer();box.textContent='Code expiré';box.style.color='#ef4444';}
  },1000);
}

function clearResetTimer(){
  if(resetState.timerInterval){clearInterval(resetState.timerInterval);resetState.timerInterval=null;}
}

/* ══════════════════════════════════════════════
   CASES CHIFFRES (clavier + paste)
══════════════════════════════════════════════ */
function digitInput(el, idx) {
  let val = el.value.replace(/[^0-9]/g, '');
  if (val.length > 1) val = val.slice(-1);
  el.value = val;
  if (val && idx < 5) document.getElementById('d' + (idx + 1)).focus();
  const code = [0,1,2,3,4,5].map(i => document.getElementById('d' + i).value).join('');
  if (code.length === 6) setTimeout(doForgotStep2, 150);
}

function digitKeyDown(e, idx) {
  const el = document.getElementById('d' + idx);
  if (e.key === 'Backspace') {
    if (el.value) { el.value = ''; }
    else if (idx > 0) { const prev=document.getElementById('d'+(idx-1)); prev.value=''; prev.focus(); }
    e.preventDefault(); return;
  }
  if (e.key === 'ArrowLeft' && idx > 0) { document.getElementById('d'+(idx-1)).focus(); e.preventDefault(); return; }
  if (e.key === 'ArrowRight' && idx < 5) { document.getElementById('d'+(idx+1)).focus(); e.preventDefault(); return; }
  if (e.key === 'Enter') { doForgotStep2(); return; }
  if (!/^[0-9]$/.test(e.key) && !['Tab','Delete'].includes(e.key)) e.preventDefault();
}

document.addEventListener('paste',e=>{
  const s2=document.getElementById('step2Section');
  if(!s2||s2.style.display==='none') return;
  const pasted=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
  if(pasted.length===6){
    for(let i=0;i<6;i++) document.getElementById('d'+i).value=pasted[i];
    document.getElementById('d5').focus();
    setTimeout(doForgotStep2,100);
    e.preventDefault();
  }
});

function showForgotErr(msg){
  const box=document.getElementById('forgotErrBox');
  box.textContent=msg;box.style.display='block';
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  loadTheme();
  if(typeof window.NetGuardAuth!=='undefined'){
    console.log('auth.js chargé ✓');
    
    // Si l'utilisateur a déjà une session valide, on le redirige tout de suite
    const session = NetGuardAuth.getSession();
    if (session && session.role) {
      const targetPage = NetGuardAuth.getDefaultPage(session.role);
      // On empêche la page de se recharger sur elle-même (boucle infinie)
      if (targetPage !== 'netguard_login_v2.html' && targetPage !== 'login.html') {
        window.location.replace(targetPage);
      } else {
        NetGuardAuth.clearSession(); // La session est corrompue, on la nettoie
      }
    }
  } else {
    console.log('auth.js non trouvé — mode standalone actif');
  }
});

/* ══════════════════════════════════════════════
   CANVAS BACKGROUND
══════════════════════════════════════════════ */
const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

let nodes=[],packets=[];

function initNodes(){
  const count=Math.max(45,Math.floor(window.innerWidth*window.innerHeight/18000));
  nodes=Array.from({length:count},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height,
    vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
    r:Math.random()<.12?2.8:1.4
  }));
}
initNodes();

setInterval(()=>{
  if(nodes.length<2) return;
  const a=Math.floor(Math.random()*nodes.length);
  let b=Math.floor(Math.random()*nodes.length);
  while(b===a) b=Math.floor(Math.random()*nodes.length);
  const dx=nodes[b].x-nodes[a].x,dy=nodes[b].y-nodes[a].y;
  if(Math.sqrt(dx*dx+dy*dy)<60) return;
  packets.push({ax:nodes[a].x,ay:nodes[a].y,bx:nodes[b].x,by:nodes[b].y,t:0,speed:.007+Math.random()*.008});
},500);

function draw(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(100,108,255,0.03)';ctx.lineWidth=.5;
  for(let x=0;x<W;x+=45){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=45){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let i=0;i<nodes.length;i++){
    const p=nodes[i];p.x+=p.vx;p.y+=p.vy;
    if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;
    if(p.y<-20)p.y=H+20;if(p.y>H+20)p.y=-20;
    for(let j=i+1;j<nodes.length;j++){
      const q=nodes[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<110){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle=`rgba(129,140,248,${.12*(1-d/110)})`;ctx.lineWidth=.6;ctx.stroke();}
    }
  }
  for(const p of nodes){
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);
    g.addColorStop(0,'rgba(129,140,248,0.5)');g.addColorStop(1,'rgba(129,140,248,0)');
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*3.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(167,139,250,0.8)';ctx.fill();
  }
  for(let i=packets.length-1;i>=0;i--){
    const pk=packets[i];pk.t+=pk.speed;
    if(pk.t>=1){packets.splice(i,1);continue;}
    const x=pk.ax+(pk.bx-pk.ax)*pk.t,y=pk.ay+(pk.by-pk.ay)*pk.t;
    for(let s=0;s<5;s++){const tt=Math.max(0,pk.t-s*.025),tx=pk.ax+(pk.bx-pk.ax)*tt,ty=pk.ay+(pk.by-pk.ay)*tt;ctx.beginPath();ctx.arc(tx,ty,1.6-s*.2,0,Math.PI*2);ctx.fillStyle=`rgba(167,139,250,${.45-s*.07})`;ctx.fill();}
    ctx.beginPath();ctx.arc(x,y,2.4,0,Math.PI*2);ctx.fillStyle='rgba(196,181,253,0.95)';ctx.fill();
    ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();
  }
  const now=Date.now()/1000,angle=(now*.25)%(Math.PI*2),cx=W/2,cy=H/2,maxR=Math.max(W,H)*.85;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
  const gb=ctx.createLinearGradient(0,0,maxR,0);
  gb.addColorStop(0,'rgba(129,140,248,0.06)');gb.addColorStop(.6,'rgba(129,140,248,0.01)');gb.addColorStop(1,'rgba(129,140,248,0)');
  ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,maxR,-.25,.25);ctx.closePath();ctx.fillStyle=gb;ctx.fill();ctx.restore();
  if(Math.random()<.05){const fx=Math.random()*W,fy=Math.random()*H;ctx.beginPath();ctx.arc(fx,fy,Math.random()*1.2+.5,0,Math.PI*2);ctx.fillStyle=`rgba(167,139,250,${Math.random()*.3})`;ctx.fill();}
  requestAnimationFrame(draw);
}

window.addEventListener('resize',()=>{resizeCanvas();initNodes();packets=[];});
draw();
</script>
</body>
</html>
