<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body { min-height: 100vh; background: #07091a; }
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#07091a;position:relative;overflow:hidden;padding:2rem 1rem}
  .bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;display:block}
  .card{position:relative;z-index:10;width:100%;max-width:400px;background:rgba(255,255,255,0.03);border:0.5px solid rgba(74,158,255,0.25);border-radius:24px;padding:2.2rem 2.2rem;backdrop-filter:blur(2px)}
  .logo-row{display:flex;align-items:center;justify-content:center;margin-bottom:1.4rem}
  .shield-wrap{position:relative;width:68px;height:68px}
  .pulse-ring{position:absolute;inset:-10px;border-radius:50%;border:1.5px solid rgba(74,158,255,0.35);animation:pr 2.4s ease-out infinite}
  .pulse-ring2{position:absolute;inset:-22px;border-radius:50%;border:0.5px solid rgba(74,158,255,0.12);animation:pr 2.4s ease-out infinite 0.8s}
  .pulse-ring3{position:absolute;inset:-34px;border-radius:50%;border:0.5px solid rgba(74,158,255,0.06);animation:pr 2.4s ease-out infinite 1.6s}
  @keyframes pr{0%{transform:scale(0.88);opacity:1}100%{transform:scale(1.4);opacity:0}}
  .shield-inner{width:68px;height:68px;background:rgba(20,50,100,0.75);border:1px solid rgba(74,158,255,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center}
  .title-block{text-align:center;margin-bottom:1.8rem}
  .app-name{font-size:30px;font-weight:700;color:#fff;font-family:'DM Sans',sans-serif;letter-spacing:-0.5px}
  .app-name span{color:#4a9eff}
  .app-sub{font-size:12px;color:rgba(100,160,255,0.6);font-weight:500;margin-top:4px;letter-spacing:0.5px}
  .ids-tag{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:rgba(74,158,255,0.07);border:0.5px solid rgba(74,158,255,0.2);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;color:rgba(74,158,255,0.75);letter-spacing:1.5px;text-transform:uppercase}
  .dot-live{width:6px;height:6px;border-radius:50%;background:#4a9eff;animation:blink 1.8s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  label{display:block;font-size:9px;font-weight:700;color:rgba(100,150,200,0.45);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;font-family:'DM Sans',sans-serif}
  .field{margin-bottom:12px;position:relative}
  .field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:0.3;pointer-events:none}
  input[type=text],input[type=password]{width:100%;background:rgba(255,255,255,0.03);border:0.5px solid rgba(74,158,255,0.18);border-radius:12px;padding:11px 14px 11px 38px;color:#fff;font-size:13px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;font-family:'DM Sans',sans-serif}
  input:focus{border-color:rgba(74,158,255,0.55);box-shadow:0 0 0 3px rgba(74,158,255,0.08)}
  input::placeholder{color:rgba(100,150,200,0.25)}
  .strength-bar{height:2px;border-radius:2px;margin-top:5px;transition:all 0.3s;background:transparent;overflow:hidden}
  .strength-fill{height:100%;border-radius:2px;transition:width 0.4s,background 0.4s;width:0}
  .btn{width:100%;padding:12px;background:linear-gradient(135deg,rgba(26,90,170,0.9),rgba(26,70,140,0.9));border:0.5px solid rgba(74,158,255,0.4);border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:6px;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden}
  .btn::after{content:'';position:absolute;inset:0;background:rgba(74,158,255,0.08);opacity:0;transition:opacity 0.2s}
  .btn:hover:not(:disabled)::after{opacity:1}
  .btn:hover:not(:disabled){transform:translateY(-1px);border-color:rgba(74,158,255,0.65)}
  .btn:disabled{opacity:0.55;cursor:not-allowed}
  .err{background:rgba(239,68,68,0.08);border:0.5px solid rgba(239,68,68,0.3);border-radius:10px;padding:9px 13px;color:rgba(252,165,165,0.9);font-size:12px;margin-bottom:10px;display:none;font-family:'DM Sans',sans-serif}
  .scan-bar{height:1px;background:rgba(74,158,255,0.0);position:relative;overflow:hidden;margin:1.2rem 0 0.8rem}
  .scan-line{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(74,158,255,0.5),transparent);width:40%;animation:scan 2.5s ease-in-out infinite}
  @keyframes scan{0%{left:-40%}100%{left:140%}}
  .status-row{display:flex;align-items:center;gap:8px;margin-top:10px}
  .status-indicator{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:rgba(74,158,255,0.5);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace}
  .status-dot{width:5px;height:5px;border-radius:50%;background:rgba(74,158,255,0.5);animation:blink 2s ease-in-out infinite}
  .traffic-mini{display:flex;gap:3px;align-items:flex-end;height:18px}
  .bar-mini{width:3px;background:rgba(74,158,255,0.25);border-radius:1px;animation:grow 1.5s ease-in-out infinite}
  @keyframes grow{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}
</style>

<div class="wrap">
  <canvas class="bg-canvas" id="bgCanvas"></canvas>
  <div class="card">
    <div class="logo-row">
      <div class="shield-wrap">
        <div class="pulse-ring"></div>
        <div class="pulse-ring2"></div>
        <div class="pulse-ring3"></div>
        <div class="shield-inner">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4a9eff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <polyline points="9 12 11 14 15 10" stroke="#4a9eff" stroke-width="1.8"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="title-block">
      <div class="app-name">Net<span>Guard</span></div>
      <div class="app-sub">Segmentation &amp; Détection IDS</div>
      <div class="ids-tag"><div class="dot-live"></div>IDS · Surveillance · Réseau</div>
    </div>

    <div id="errBox" class="err">⚠ Identifiant ou mot de passe incorrect.</div>

    <div class="field">
      <label>Identifiant</label>
      <div class="field-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4a9eff" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
      <input type="text" id="uIn" placeholder="Identifiant utilisateur" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <div class="field-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4a9eff" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <input type="password" id="pIn" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" oninput="updateStrength(this.value)" />
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <div class="scan-bar"><div class="scan-line"></div></div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Connexion →</button>

    <div class="status-row">
      <div class="status-indicator"><div class="status-dot"></div>Système sécurisé</div>
      <div style="flex:1"></div>
      <div class="traffic-mini">
        <div class="bar-mini" style="height:10px;animation-delay:0s"></div>
        <div class="bar-mini" style="height:14px;animation-delay:0.3s"></div>
        <div class="bar-mini" style="height:8px;animation-delay:0.6s"></div>
        <div class="bar-mini" style="height:16px;animation-delay:0.9s"></div>
        <div class="bar-mini" style="height:11px;animation-delay:1.2s"></div>
      </div>
      <div style="font-size:10px;color:rgba(74,158,255,0.35);font-family:'DM Mono',monospace;letter-spacing:0.5px" id="ipDisplay">192.168.0.1</div>
    </div>
  </div>
</div>

<script>
function updateStrength(v) {
  const fill = document.getElementById('strengthFill');
  if (!v) { fill.style.width='0'; return; }
  const s = v.length >= 8 ? (v.length >= 12 ? 100 : 60) : 30;
  const c = s >= 100 ? '#22c55e' : s >= 60 ? '#f59e0b' : '#ef4444';
  fill.style.width = s + '%';
  fill.style.background = c;
}

const users = {
  admin: {password:'123',role:'ADMIN',name:'Super Admin'},
  net:   {password:'123',role:'NETWORK',name:'Ingénieur Réseau'},
  sec:   {password:'123',role:'SECURITY',name:'Analyste SOC'},
  audit: {password:'123',role:'VIEWER',name:'Auditeur Externe'}
};

function doLogin() {
  const u = document.getElementById('uIn').value.trim().toLowerCase();
  const p = document.getElementById('pIn').value;
  const err = document.getElementById('errBox');
  const btn = document.getElementById('loginBtn');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Authentification...';
  setTimeout(() => {
    const user = users[u];
    if (user && user.password === p) {
      btn.style.background = 'rgba(22,101,52,0.9)';
      btn.style.borderColor = '#22c55e';
      btn.textContent = '✓ Accès autorisé — ' + user.name;
    } else {
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Connexion →';
    }
  }, 900);
}

// Animated IP display
const ip = document.getElementById('ipDisplay');
let octet = 1;
setInterval(() => { octet = Math.floor(Math.random()*254)+1; ip.textContent = '192.168.' + Math.floor(Math.random()*5) + '.' + octet; }, 2200);

// Background canvas — network topology with data packets (full page)
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Create nodes dynamically based on screen size
let nodes = [];
let packets = [];

function initNodes() {
  const count = Math.max(45, Math.floor(window.innerWidth * window.innerHeight / 18000));
  nodes = Array.from({length: count}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() < 0.12 ? 2.8 : 1.4
  }));
}

initNodes();

function spawnPacket() {
  if (nodes.length < 2) return;
  const a = Math.floor(Math.random() * nodes.length);
  let b = Math.floor(Math.random() * nodes.length);
  while (b === a && nodes.length > 1) b = Math.floor(Math.random() * nodes.length);
  const dx = nodes[b].x - nodes[a].x, dy = nodes[b].y - nodes[a].y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d < 60) return;
  packets.push({
    ax: nodes[a].x, ay: nodes[a].y,
    bx: nodes[b].x, by: nodes[b].y,
    t: 0, speed: 0.007 + Math.random() * 0.008
  });
}
setInterval(spawnPacket, 500);

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  
  // Draw subtle grid
  ctx.strokeStyle = 'rgba(74,158,255,0.03)';
  ctx.lineWidth = 0.5;
  const step = 45;
  for (let x = 0; x < W; x += step) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += step) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  
  // Update and draw connections
  for (let i = 0; i < nodes.length; i++) {
    const p = nodes[i];
    p.x += p.vx;
    p.y += p.vy;
    
    // Wrap around edges
    if (p.x < -20) p.x = W + 20;
    if (p.x > W + 20) p.x = -20;
    if (p.y < -20) p.y = H + 20;
    if (p.y > H + 20) p.y = -20;
    
    for (let j = i + 1; j < nodes.length; j++) {
      const q = nodes[j];
      const dx = p.x - q.x, dy = p.y - q.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 110) {
        const opacity = 0.12 * (1 - d / 110);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `rgba(74,158,255,${opacity})`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
      }
    }
  }
  
  // Draw nodes with glow
  for (const p of nodes) {
    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
    gradient.addColorStop(0, `rgba(74,158,255,0.5)`);
    gradient.addColorStop(1, 'rgba(74,158,255,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 3.5, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(74,158,255,0.8)`;
    ctx.fill();
  }
  
  // Draw packets
  for (let i = packets.length - 1; i >= 0; i--) {
    const pk = packets[i];
    pk.t += pk.speed;
    if (pk.t >= 1) {
      packets.splice(i, 1);
      continue;
    }
    const x = pk.ax + (pk.bx - pk.ax) * pk.t;
    const y = pk.ay + (pk.by - pk.ay) * pk.t;
    
    // Trail effect
    for (let s = 0; s < 5; s++) {
      const tt = Math.max(0, pk.t - s * 0.025);
      const tx = pk.ax + (pk.bx - pk.ax) * tt;
      const ty = pk.ay + (pk.by - pk.ay) * tt;
      ctx.beginPath();
      ctx.arc(tx, ty, 1.6 - s * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(100, 200, 255, ${0.45 - s * 0.07})`;
      ctx.fill();
    }
    
    // Packet core
    ctx.beginPath();
    ctx.arc(x, y, 2.4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(160, 210, 255, 0.95)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
  }
  
  // Rotating scan beam
  const now = Date.now() / 1000;
  const angle = (now * 0.25) % (Math.PI * 2);
  const cx = W / 2, cy = H / 2;
  const maxR = Math.max(W, H) * 0.85;
  
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  const gradientBeam = ctx.createLinearGradient(0, 0, maxR, 0);
  gradientBeam.addColorStop(0, 'rgba(74,158,255,0.05)');
  gradientBeam.addColorStop(0.6, 'rgba(74,158,255,0.01)');
  gradientBeam.addColorStop(1, 'rgba(74,158,255,0)');
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, maxR, -0.25, 0.25);
  ctx.closePath();
  ctx.fillStyle = gradientBeam;
  ctx.fill();
  ctx.restore();
  
  // Floating particles (extra life)
  if (Math.random() < 0.05) {
    const fx = Math.random() * W;
    const fy = Math.random() * H;
    ctx.beginPath();
    ctx.arc(fx, fy, Math.random() * 1.2 + 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100, 180, 255, ${Math.random() * 0.3})`;
    ctx.fill();
  }
  
  requestAnimationFrame(draw);
}

// Handle resize to regenerate nodes
window.addEventListener('resize', () => {
  resizeCanvas();
  initNodes();
  packets = [];
});

draw();
</script>
