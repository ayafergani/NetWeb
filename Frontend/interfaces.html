<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGuard - Interfaces Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="auth.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="topbar.css" />
  <link rel="stylesheet" href="dark-mode.css" />
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .topbar { animation: slideDown 0.4s ease; }
    .animate-in { animation: fadeInUp 0.4s ease backwards; animation-delay: 0.1s; }
    .table-row { animation: rowSlideIn 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) both; }
    .slide-in-right { animation: fadeInRight 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) backwards; }
    
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes rowSlideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .switch-toggle { position: relative; display: inline-block; width: 36px; height: 18px; }
    .switch-toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #6366f1; }
    input:checked + .slider:before { transform: translateX(18px); }
  </style>
</head>
<body class="bg-slate-50 min-h-screen app-body">
  <div class="app-shell">
    <aside id="sidebar-root" class="sidebar-host" data-page="interfaces"></aside>

    <main class="main">
      <div id="topbar-root" data-title="Interfaces Management" data-subtitle="Configuration visuelle des ports et sécurité L2." data-notifications="5"></div>

      <section class="content custom-scroll">
        <div id="interfaces-root" class="page-block"></div>
      </section>
    </main>
  </div>

  <script type="text/babel">
    const { useState } = React;

    // --- Génération de la base de données simulée ---
    const generateInitialPorts = () => {
      const ports = [];
      for (let i = 1; i <= 24; i++) {
        // Seuls les ports 1 à 4 et le port 24 sont considérés "déjà configurés"
        const isConfigured = i <= 4 || i === 24; 
        ports.push({
          id: `Gi1/0/${i}`,
          status: i <= 4 ? 'UP' : 'DOWN',
          vlan: i === 3 ? '20' : (isConfigured ? (i === 24 ? '30' : '10') : '1'), // VLAN 1 par défaut si non configuré
          mode: 'Access',
          speed: i <= 4 ? '1Gb' : '-',
          devices: i <= 4 ? 1 : 0,
          alert: i === 4,
          srcIp: i === 4 ? '192.168.1.10' : null,
          threat: i === 4 ? 'Port Scan Détecté' : null,
          portSecurity: i <= 3,
          securityViolation: 'shutdown',
          maxMac: 1,
          bpduGuard: true,
          configured: isConfigured // NOUVEAU FLAG !
        });
      }
      for (let i = 1; i <= 4; i++) {
        const isConfigured = i <= 2;
        ports.push({
          id: `Te1/1/${i}`,
          status: i === 1 ? 'UP' : 'DOWN',
          vlan: isConfigured ? 'All' : '1',
          mode: isConfigured ? 'Trunk' : 'Access',
          speed: i === 1 ? '10Gb' : '-',
          devices: 0,
          alert: false,
          portSecurity: false,
          securityViolation: 'shutdown',
          maxMac: 1,
          bpduGuard: false,
          configured: isConfigured // NOUVEAU FLAG !
        });
      }
      return ports;
    };

    const InterfacesPage = () => {
      const [ports, setPorts] = useState(generateInitialPorts());
      const [selectedPortId, setSelectedPortId] = useState(null);
      const [isApplying, setIsApplying] = useState(false);

      const selectedPort = ports.find(p => p.id === selectedPortId);
      
      // On filtre le tableau pour n'afficher QUE les ports configurés
      const configuredPorts = ports.filter(p => p.configured);

      // --- Actions ---
      const toggleStatus = (id) => {
        setPorts(ports.map(p => p.id === id ? { ...p, status: p.status === 'UP' ? 'DOWN' : 'UP', speed: p.status === 'UP' ? '-' : (p.id.startsWith('Te') ? '10Gb' : '1Gb') } : p));
      };

      const isolatePort = (id) => {
        setPorts(ports.map(p => p.id === id ? { ...p, vlan: '99', alert: false, status: 'DOWN', configured: true } : p));
        setSelectedPortId(null);
      };

      const updatePortParam = (id, param, value) => {
        setPorts(ports.map(p => p.id === id ? { ...p, [param]: value } : p));
      };

      // Bouton "Apply" : Sauvegarde la config et rend le port "Configured"
      const handleApplyChanges = (id) => {
        setIsApplying(true);
        // Simulation du temps de réponse du Backend (Nornir)
        setTimeout(() => {
          setPorts(ports.map(p => p.id === id ? { ...p, configured: true } : p));
          setIsApplying(false);
        }, 600);
      };

      // --- Composants UI ---
      const PhysicalSwitch = () => {
        return (
          <div className="bg-[#1a1c3a] p-6 rounded-2xl shadow-xl shadow-indigo-600/20 mb-8 border border-slate-200 flex flex-col items-center">
            <div className="w-full flex justify-between items-center mb-6">
              <span className="text-slate-400 font-mono text-xs tracking-widest font-bold">CISCO CATALYST 9200 SERIES</span>
              <span className="text-emerald-400 font-mono text-xs flex items-center gap-2">
                <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div> IOS-XE SECURE
              </span>
            </div>
            
            <div className="flex gap-8 items-center w-full justify-center overflow-x-auto pb-4">
              <div className="flex flex-col gap-2 p-3 bg-slate-800/50 rounded-xl border border-slate-700/50">
                <span className="text-[9px] font-mono text-slate-500 text-center uppercase tracking-widest mb-1">Access Ports (Cu)</span>
                <div className="grid grid-cols-12 gap-1.5">
                  {Array.from({ length: 24 }).map((_, i) => {
                    const portId = `Gi1/0/${i + 1}`;
                    const portData = ports.find(p => p.id === portId);
                    
                    let bgColor = 'bg-slate-700'; // Port non-configuré (Gris)
                    let borderColor = 'border-slate-800';
                    let animation = '';

                    if (portData) {
                      if (portData.alert) {
                        bgColor = 'bg-orange-500'; borderColor = 'border-orange-300'; animation = 'animate-pulse';
                      } else if (!portData.configured) {
                        bgColor = 'bg-slate-700'; borderColor = 'border-slate-600'; // Non configuré
                      } else if (portData.status === 'UP') {
                        bgColor = 'bg-emerald-500'; borderColor = 'border-emerald-300'; // Configuré et Actif
                      } else {
                        bgColor = 'bg-rose-500'; borderColor = 'border-rose-300'; // Configuré mais DOWN
                      }
                    }

                    return (
                      <div key={portId} onClick={() => portData && setSelectedPortId(portId)}
                        className={`w-8 h-8 rounded border-b-2 ${bgColor} ${borderColor} ${animation} flex items-center justify-center cursor-pointer hover:scale-110 transition-transform shadow-inner`}
                        title={`Interface ${portId} ${portData && !portData.configured ? '(Non Configuré)' : ''}`}>
                        <span className="text-[8px] font-mono text-white/90">{i + 1}</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="flex flex-col gap-2 p-3 bg-slate-800/80 rounded-xl border border-slate-700">
                <span className="text-[9px] font-mono text-cyan-500/70 text-center uppercase tracking-widest mb-1">Uplinks (SFP+)</span>
                <div className="grid grid-cols-2 gap-2">
                  {Array.from({ length: 4 }).map((_, i) => {
                    const portId = `Te1/1/${i + 1}`;
                    const portData = ports.find(p => p.id === portId);
                    
                    let bgColor = 'bg-slate-900';
                    let borderColor = 'border-slate-700';

                    if (portData) {
                      if (!portData.configured) {
                        bgColor = 'bg-slate-800'; borderColor = 'border-slate-700';
                      } else if (portData.status === 'UP') {
                        bgColor = 'bg-cyan-600'; borderColor = 'border-cyan-400';
                      } else {
                        bgColor = 'bg-rose-900'; borderColor = 'border-rose-700';
                      }
                    }

                    return (
                      <div key={portId} onClick={() => portData && setSelectedPortId(portId)}
                        className={`w-10 h-8 rounded border-2 ${bgColor} ${borderColor} flex items-center justify-center cursor-pointer hover:scale-105 transition-transform`}
                        title={`Uplink ${portId}`}>
                        <span className="text-[8px] font-mono text-white/60">T{i + 1}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="p-2 md:p-4 max-w-[1600px] mx-auto animate-in">
          <div className="flex flex-col md:flex-row md:justify-between md:items-end mb-8 gap-4">
            <div>
              <h1 className="page-title text-3xl font-bold text-slate-800 tracking-tight">Interfaces Management</h1>
              <p className="text-slate-500 mt-1">Cliquez sur n'importe quel port du switch pour le configurer.</p>
            </div>
          </div>

          <PhysicalSwitch />

          <div className="grid grid-cols-12 gap-8">
            <div className={`col-span-12 ${selectedPort ? 'lg:col-span-8' : 'lg:col-span-12'} transition-all duration-300`}>
              <div className="table-card bg-white rounded-[2rem] border border-slate-200 shadow-xl shadow-indigo-600/20 overflow-hidden">
                <div className="p-5 bg-slate-50/80 border-b border-slate-100 flex justify-between items-center">
                  <h3 className="font-bold text-slate-700">Ports configurés ({configuredPorts.length})</h3>
                </div>
                <div className="overflow-x-auto max-h-[600px] custom-scroll">
                  <table className="w-full text-left">
                    <thead className="bg-slate-50/80 border-b border-slate-100 sticky top-0 z-10">
                      <tr>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Port</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">VLAN</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Mode</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Securité</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {configuredPorts.map((port, idx) => (
                        <tr 
                          key={port.id} 
                          onClick={() => setSelectedPortId(port.id)}
                          className={`group cursor-pointer transition-colors table-row 
                            ${selectedPortId === port.id ? 'bg-indigo-50/40' : 'hover:bg-slate-50/80'}
                            ${port.alert ? 'bg-orange-50/30 hover:bg-orange-50/60' : ''}`}
                          style={{animationDelay: `${0.1 + (idx * 0.05)}s`}}
                        >
                          <td className="px-6 py-4 font-mono font-bold text-slate-700">{port.id}</td>
                          <td className="px-6 py-4">
                            <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-bold ${port.status === 'UP' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                              <span className={`w-1.5 h-1.5 rounded-full ${port.status === 'UP' ? 'bg-emerald-500' : 'bg-rose-500'}`}></span>
                              {port.status}
                            </span>
                          </td>
                          <td className="px-6 py-4 font-mono font-bold text-indigo-600">
                            {port.vlan !== 'All' ? `VLAN ${port.vlan}` : port.vlan}
                          </td>
                          <td className="px-6 py-4">
                            <span className={`px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-tighter ${port.mode === 'Trunk' ? 'bg-purple-50 text-purple-600' : 'bg-slate-100 text-slate-600'}`}>
                              {port.mode}
                            </span>
                          </td>
                          <td className="px-6 py-4">
                            {port.portSecurity ? (
                              <span className="text-emerald-600 text-xs font-bold" title="Port Security Enabled">🔒 Sec</span>
                            ) : (
                              <span className="text-slate-400 text-xs font-medium" title="Port Security Disabled">🔓 Off</span>
                            )}
                            {port.bpduGuard && (
                              <span className="ml-2 text-indigo-600 text-xs font-bold" title="BPDU Guard Enabled">🛡️ BPDU</span>
                            )}
                          </td>
                          <td className="px-6 py-4 text-right space-x-3">
                            {port.alert && (
                              <span className="text-orange-600 text-xs font-bold uppercase mr-2 animate-pulse">⚠️ Menace</span>
                            )}
                            <button className="text-slate-400 hover:text-indigo-600 font-semibold text-sm transition-colors">Config</button>
                          </td>
                        </tr>
                      ))}
                      {configuredPorts.length === 0 && (
                        <tr>
                          <td colSpan="6" className="px-6 py-10 text-center text-slate-400 text-sm">
                            Aucun port configuré. Cliquez sur le schéma du switch pour commencer.
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            {selectedPort && (
              <div className="col-span-12 lg:col-span-4 slide-in-right">
                <div className="detail-panel bg-white rounded-[2rem] border border-slate-200 p-6 shadow-xl shadow-indigo-600/15 sticky top-6">
                  
                  <div className="flex justify-between items-start mb-6">
                    <div>
                      <h2 className="text-xl font-bold text-slate-800">Configuration</h2>
                      <div className="flex items-center gap-2 mt-1">
                        <p className="text-sm font-mono text-indigo-600">Interface {selectedPort.id}</p>
                        {!selectedPort.configured && (
                          <span className="px-2 py-0.5 bg-slate-100 text-slate-500 text-[9px] font-bold uppercase rounded-md">Vierge</span>
                        )}
                      </div>
                    </div>
                    <button onClick={() => setSelectedPortId(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 transition-colors">✕</button>
                  </div>

                  {selectedPort.alert && (
                    <div className="mb-6 p-4 bg-orange-50 border border-orange-200 rounded-2xl shadow-sm">
                      <div className="flex items-center gap-2 mb-2">
                        <span className="w-2 h-2 rounded-full bg-orange-500 animate-ping"></span>
                        <h4 className="text-orange-800 font-bold text-xs uppercase tracking-wider">Activité Suspecte</h4>
                      </div>
                      <p className="text-orange-700 text-sm font-medium">{selectedPort.threat}</p>
                      <div className="mt-3 py-2 px-3 bg-white rounded-lg border border-orange-100 text-[11px] font-mono text-orange-600 font-bold">
                        Source IP: {selectedPort.srcIp}
                      </div>
                      <button onClick={() => isolatePort(selectedPort.id)} className="w-full mt-4 py-2.5 bg-orange-500 text-white text-xs font-bold rounded-xl hover:bg-orange-600 transition-all shadow-md shadow-indigo-600/15 flex items-center justify-center gap-2">
                        Isolate → VLAN 99
                      </button>
                    </div>
                  )}

                  <div className="space-y-5">
                    
                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-between">
                      <div>
                        <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Port Status</p>
                        <p className={`text-sm font-bold ${selectedPort.status === 'UP' ? 'text-emerald-600' : 'text-rose-600'}`}>
                          State: {selectedPort.status}
                        </p>
                      </div>
                      <button 
                        onClick={() => toggleStatus(selectedPort.id)}
                        className={`px-4 py-2 rounded-lg text-xs font-bold text-white transition-colors ${selectedPort.status === 'UP' ? 'bg-rose-500 hover:bg-rose-600' : 'bg-emerald-500 hover:bg-emerald-600'}`}
                      >
                        {selectedPort.status === 'UP' ? 'Shutdown' : 'No Shutdown'}
                      </button>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Mode</label>
                        <select 
                          value={selectedPort.mode}
                          onChange={(e) => updatePortParam(selectedPort.id, 'mode', e.target.value)}
                          className="w-full border border-slate-200 rounded-xl p-3 text-sm font-semibold text-slate-700 outline-none focus:border-indigo-500 bg-white"
                        >
                          <option value="Access">Access</option>
                          <option value="Trunk">Trunk</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">VLAN</label>
                        <input 
                          type="text" 
                          value={selectedPort.vlan}
                          onChange={(e) => updatePortParam(selectedPort.id, 'vlan', e.target.value)}
                          disabled={selectedPort.mode === 'Trunk'}
                          className="w-full border border-slate-200 rounded-xl p-3 text-sm font-mono font-bold text-indigo-600 outline-none focus:border-indigo-500 bg-white disabled:bg-slate-100 disabled:text-slate-400" 
                        />
                      </div>
                    </div>

                    <div className="p-4 bg-indigo-50/50 rounded-xl border border-indigo-100">
                      <h4 className="text-xs font-bold text-indigo-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <span>🔒</span> Port Security (L2)
                      </h4>
                      
                      <div className="flex justify-between items-center mb-4">
                        <span className="text-xs font-bold text-slate-600">Enable Port Security</span>
                        <label className="switch-toggle">
                          <input type="checkbox" checked={selectedPort.portSecurity} onChange={(e) => updatePortParam(selectedPort.id, 'portSecurity', e.target.checked)} />
                          <span className="slider"></span>
                        </label>
                      </div>

                      {selectedPort.portSecurity && (
                        <div className="space-y-3 animate-in">
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[10px] font-bold text-slate-500 mb-1">Max MAC</label>
                              <input type="number" min="1" max="10" value={selectedPort.maxMac} onChange={(e) => updatePortParam(selectedPort.id, 'maxMac', e.target.value)} className="w-full border border-slate-200 rounded-lg p-2 text-xs font-mono outline-none" />
                            </div>
                            <div>
                              <label className="block text-[10px] font-bold text-slate-500 mb-1">Violation</label>
                              <select value={selectedPort.securityViolation} onChange={(e) => updatePortParam(selectedPort.id, 'securityViolation', e.target.value)} className="w-full border border-slate-200 rounded-lg p-2 text-xs outline-none">
                                <option value="protect">Protect</option>
                                <option value="restrict">Restrict</option>
                                <option value="shutdown">Shutdown</option>
                              </select>
                            </div>
                          </div>
                        </div>
                      )}

                      <div className="flex justify-between items-center mt-4 pt-4 border-t border-indigo-100/50">
                        <span className="text-xs font-bold text-slate-600">Enable BPDU Guard</span>
                        <label className="switch-toggle">
                          <input type="checkbox" checked={selectedPort.bpduGuard} onChange={(e) => updatePortParam(selectedPort.id, 'bpduGuard', e.target.checked)} />
                          <span className="slider"></span>
                        </label>
                      </div>
                    </div>

                    <div className="pt-4 mt-2 flex gap-3">
                      <button onClick={() => setSelectedPortId(null)} className="flex-1 py-2.5 font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors">Cancel</button>
                      <button 
                        onClick={() => handleApplyChanges(selectedPort.id)} 
                        disabled={isApplying}
                        className="flex-1 py-2.5 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-600/15 hover:bg-indigo-700 transition-all disabled:opacity-75"
                      >
                        {isApplying ? 'Envoi...' : 'Apply Changes'}
                      </button>
                    </div>

                    <div className="mt-4 p-3 bg-slate-800 rounded-xl">
                      <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">CLI Preview</p>
                      <pre className="text-[10px] font-mono text-emerald-400 whitespace-pre-wrap">
{`interface ${selectedPort.id}
 switchport mode ${selectedPort.mode.toLowerCase()}
 ${selectedPort.mode === 'Access' ? `switchport access vlan ${selectedPort.vlan}` : `switchport trunk allowed vlan ${selectedPort.vlan}`}
 ${selectedPort.portSecurity ? `switchport port-security
 switchport port-security maximum ${selectedPort.maxMac}
 switchport port-security violation ${selectedPort.securityViolation}` : ''}
 ${selectedPort.bpduGuard ? 'spanning-tree bpduguard enable' : ''}
 ${selectedPort.status === 'UP' ? 'no shutdown' : 'shutdown'}`.replace(/^\s*[\r\n]/gm, '')}
                      </pre>
                    </div>

                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('interfaces-root'));
    root.render(<InterfacesPage />);
  </script>
  
  <script src="sidebar.js"></script>
  <script src="topbar.js"></script>
</body>
</html>
