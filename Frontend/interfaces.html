<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGuard - Interfaces Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="auth.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="topbar.css" />
  <link rel="stylesheet" href="dark-mode.css" />
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .topbar { animation: slideDown 0.4s ease; }
    .animate-in { animation: fadeInUp 0.4s ease backwards; animation-delay: 0.1s; }
    .table-row { animation: rowSlideIn 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) both; }
    .slide-in-right { animation: fadeInRight 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) backwards; }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes rowSlideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .switch-toggle { position: relative; display: inline-block; width: 36px; height: 18px; }
    .switch-toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #6366f1; }
    input:checked + .slider:before { transform: translateX(18px); }

    .type-badge-uplink { background: #fef3c7; color: #92400e; }
    .type-badge-access { background: #e0e7ff; color: #4338ca; }

    /* Deploy result log */
    .deploy-log { font-family: 'DM Mono', monospace; font-size: 10px; line-height: 1.6; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen app-body">
  <div class="app-shell">
    <aside id="sidebar-root" class="sidebar-host" data-page="interfaces"></aside>

    <main class="main">
      <div id="topbar-root" data-title="Interfaces Management" data-subtitle="Configuration visuelle des ports et déploiement SSH." data-notifications="5"></div>

      <section class="content custom-scroll">
        <div id="interfaces-root" class="page-block"></div>
      </section>
    </main>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const API_BASE_URL = window.location.port === '5000' ? '' : 'http://127.0.0.1:5000';
    const auth = window.NetGuardAuth;

    const pickDefaultAccessVlan = (availableVlans, preferredVlan) => {
      const normalizedVlans = (availableVlans || []).map((vlan) => String(vlan));
      if (normalizedVlans.includes(String(preferredVlan))) return String(preferredVlan);
      if (normalizedVlans.includes('1')) return '1';
      return normalizedVlans[0] || '';
    };

    const generateInitialPorts = (availableVlans = []) => {
      const ports = [];
      let interfaceId = 1;
      for (let i = 1; i <= 24; i++) {
        ports.push({
          id_interface: interfaceId++,
          id: `Gi1/0/${i}`,
          equipement_id: null,
          status: 'DOWN',
          vlan: pickDefaultAccessVlan(availableVlans, '1'),
          mode: 'access',
          type: 'access',
          speed: '-',
          devices: 0,
          alert: false,
          srcIp: '',
          threat: '',
          portSecurity: false,
          securityViolation: 'shutdown',
          maxMac: 1,
          staticMac: '',
          bpdu_guard: false,
          configured: false,
          allowedVlans: '',
          dbExists: false
        });
      }
      for (let i = 1; i <= 4; i++) {
        ports.push({
          id_interface: interfaceId++,
          id: `Te1/1/${i}`,
          equipement_id: null,
          status: 'DOWN',
          vlan: pickDefaultAccessVlan(availableVlans, '1'),
          mode: 'access',
          type: 'uplink',
          speed: '-',
          devices: 0,
          alert: false,
          srcIp: '',
          threat: '',
          portSecurity: false,
          securityViolation: 'shutdown',
          maxMac: 1,
          staticMac: '',
          bpdu_guard: false,
          configured: false,
          allowedVlans: '',
          dbExists: false
        });
      }
      return ports;
    };

    const mapDbInterfaceToUi = (row, fallbackPort) => ({
      ...(fallbackPort || {}),
      id_interface: row.id_interface,
      id: row.nom,
      equipement_id: row.equipement_id ?? fallbackPort?.equipement_id ?? null,
      status: (row.status || fallbackPort?.status || 'DOWN').toUpperCase(),
      vlan: row.mode === 'trunk' ? (row.allowed_vlans || 'All') : String(row.vlan_id ?? fallbackPort?.vlan ?? '1'),
      mode: row.mode || fallbackPort?.mode || 'access',
      type: row.type || fallbackPort?.type || 'access',
      speed: row.speed || fallbackPort?.speed || '-',
      devices: fallbackPort?.devices || 0,
      alert: fallbackPort?.alert || false,
      srcIp: row.ip || fallbackPort?.srcIp || '',
      threat: fallbackPort?.threat || '',
      portSecurity: Boolean(row.port_security),
      securityViolation: row.violation_mode || fallbackPort?.securityViolation || 'shutdown',
      maxMac: row.max_mac || fallbackPort?.maxMac || 1,
      bpdu_guard: Boolean(row.bpdu_guard),
      configured: true,
      allowedVlans: row.allowed_vlans || '',
      dbExists: true
    });

    const buildInterfacePayload = (port) => ({
      // id_interface est envoyé uniquement pour les mises à jour (PUT)
      ...(port.dbExists && { id_interface: port.id_interface }),
      nom: port.id,
      ip: port.srcIp || null,
      id_switch: selectedSwitchId, // Assurez-vous que l'id_switch est toujours envoyé
      vlan_id: port.mode === 'trunk' ? null : (port.vlan && port.vlan !== 'All' ? Number(port.vlan) : null),
      equipement_id: port.equipement_id ?? null,
      status: port.status,
      mode: port.mode,
      type: port.type,
      speed: port.speed === '-' ? null : port.speed,
      allowed_vlans: port.mode === 'trunk' ? (port.vlan || port.allowedVlans || 'All') : null,
      port_security: port.portSecurity,
      max_mac: Number(port.maxMac || 1),
      violation_mode: port.securityViolation || 'shutdown',
      bpdu_guard: port.bpdu_guard,
    });

    const InterfacesPage = () => {
      const [availableVlans, setAvailableVlans] = useState([]);
      const [isLoadingVlans, setIsLoadingVlans] = useState(false);
      const [ports, setPorts] = useState(generateInitialPorts());
      const [selectedPortId, setSelectedPortId] = useState(null);
      const [isApplying, setIsApplying] = useState(false);
      const [isDeploying, setIsDeploying] = useState(false);
      const [toast, setToast] = useState(null);
      const [deployResult, setDeployResult] = useState(null);

      // TFTP
      const [tftpServer, setTftpServer] = useState('');
      const [tftpFilename, setTftpFilename] = useState('running-config.cfg');
      const [tftpConfigType, setTftpConfigType] = useState('running'); // 'running' | 'startup'
      const [tftpResult, setTftpResult] = useState(null);
      const [isTftpRunning, setIsTftpRunning] = useState(false);
      const [tftpMode, setTftpMode] = useState('backup'); // 'backup' | 'restore'
      const [showTftp, setShowTftp] = useState(false);

      // Port Mirroring
      const [showMirroring, setShowMirroring] = useState(false);
      const [mirroringSessionId, setMirroringSessionId] = useState('1');
      const [mirroringSourceVlan, setMirroringSourceVlan] = useState('10');
      const [mirroringDestination, setMirroringDestination] = useState('Gi1/0/19');
      const [mirroringResult, setMirroringResult] = useState(null);
      const [isMirroringRunning, setIsMirroringRunning] = useState(false);
      const [isDeletingMirroring, setIsDeletingMirroring] = useState(false);
      const [mirroringDeleteResult, setMirroringDeleteResult] = useState(null);

      // Switch config (lue depuis hosts.yaml, comme dans vlan.html)
      const [switchCfg, setSwitchCfg] = useState({
        host_key: 'switch_cible',
        hostname: '',
        username: '',
        password: '',
        secret: '',
        port: 22,
      });
      const [switchCfgLoaded, setSwitchCfgLoaded] = useState(false);
      const [isSavingSwitch, setIsSavingSwitch] = useState(false);

      const [switches, setSwitches] = useState([]);
      const [selectedSwitchId, setSelectedSwitchId] = useState(null);
      const [isLoadingSwitches, setIsLoadingSwitches] = useState(true);

      const selectedPort = ports.find((p) => p.id === selectedPortId);
      const configuredPorts = ports.filter((p) => p.configured); // Cette variable est correcte pour la table

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        window.clearTimeout(window.__interfaceToastTimer);
        window.__interfaceToastTimer = window.setTimeout(() => setToast(null), 4000);
      };

      // ── Charger la liste des switches depuis la BDD ───────────────────────
      const loadSwitches = async () => {
        setIsLoadingSwitches(true);
        console.log('[loadSwitches] Début du chargement des switches...');
        setSwitches([]); // Clear switches before loading
        try {
          const res = await fetch(`${API_BASE_URL}/api/switchs`, {
            headers: auth.getAuthHeaders()
          });
          const data = await res.json();
          console.log('[loadSwitches]', data);
          if (data.success && data.switchs && data.switchs.length > 0) {
            console.log('[loadSwitches] Switches chargés:', data.switchs, 'Premier ID:', data.switchs[0].id);
            setSwitches(data.switchs);
            setSelectedSwitchId(Number(data.switchs[0].id)); // Ensure ID is a number
          }
        } catch (e) {
          console.error('[loadSwitches] Erreur lors du chargement des switches:', e);
          console.error('Impossible de charger les switches:', e);
        } finally {
          setIsLoadingSwitches(false);
        }
      };

      // ── Charger switch config depuis hosts.yaml (comme vlan.html) ────────
      const loadSwitchConfig = async () => {
        try {
          const res = await fetch(`${API_BASE_URL}/api/network/switch-config`, {
            headers: auth.getAuthHeaders()
          });
          const data = await res.json();
          if (data.success && data.switches && data.switches.length > 0) {
            const sw = data.switches[0];
            setSwitchCfg({
              host_key: sw.host_key || 'switch_cible',
              hostname:  sw.hostname  || '',
              username:  sw.username  || '',
              password:  sw.password  || '',
              secret:    sw.secret    || '',
              port:      sw.port      || 22,
            });
          }
        } catch (e) {
          console.warn('Impossible de charger hosts.yaml:', e);
        } finally {
          setSwitchCfgLoaded(true);
        }
      };

      const saveSwitchConfig = async () => {
        setIsSavingSwitch(true);
        try {
          const res = await fetch(`${API_BASE_URL}/api/network/switch-config`, {
            method: 'POST',
            headers: auth.getAuthHeaders(),
            body: JSON.stringify(switchCfg),
          });
          const data = await res.json();
          if (data.success) {
            showToast('✅ Configuration switch sauvegardée dans hosts.yaml');
          } else {
            showToast(data.error || 'Erreur lors de la sauvegarde', 'error');
          }
        } catch (e) {
          showToast('Erreur réseau', 'error');
        } finally {
          setIsSavingSwitch(false);
        }
      };

      const loadInterfaces = async (swId) => {
        setIsLoadingVlans(true);
        console.log(`[loadInterfaces] Début du chargement des interfaces pour switch_id=${swId}`);
        setPorts(generateInitialPorts(availableVlans)); // Reset ports to initial state before fetching
        try {
          const [intRes, vlanRes] = await Promise.all([
            fetch(`${API_BASE_URL}/api/interface?switch_id=${swId}`, { headers: auth.getAuthHeaders() }),
            fetch(`${API_BASE_URL}/api/vlan?switch_id=${swId}`,      { headers: auth.getAuthHeaders() })
          ]);
          const [intData, vlanData] = await Promise.all([intRes.json(), vlanRes.json()]);
          
          console.log(`[loadInterfaces] API call: ${API_BASE_URL}/api/interface?switch_id=${swId}`); // Log the actual API call
          console.log('[loadInterfaces] Réponse API interfaces:', intData);
          console.log('[loadInterfaces] Réponse API VLANs:', vlanData);
          let currentVlans = [];
          if (vlanData.success) {
            currentVlans = vlanData.vlans.map(v => String(v.id_vlan ?? v.id));
            setAvailableVlans(currentVlans);
          }

          if (intData.success && intData.interfaces) {
            const basePorts = generateInitialPorts(currentVlans);
            const mergedPorts = basePorts.map(p => {
              const dbMatch = intData.interfaces.find(i => i.nom === p.id);
              return dbMatch ? mapDbInterfaceToUi(dbMatch, p) : p;
            });
            console.log('[loadInterfaces] Interfaces fusionnées:', mergedPorts);
            setPorts(mergedPorts);
            if (intData.interfaces.length === 0) {
                console.warn(`[loadInterfaces] Aucune interface configurée trouvée pour switch_id=${swId}.`);
            }
          } else {
            console.log('[loadInterfaces] Aucune interface trouvée dans la BDD, initialisation des ports par défaut.');
            setPorts(generateInitialPorts(currentVlans));
          }
        } catch (error) {
          console.error('[loadInterfaces] Erreur chargement interfaces:', error);
          setPorts(generateInitialPorts(availableVlans));
        } finally {
          setIsLoadingVlans(false);
        }
      };

      useEffect(() => {
        loadSwitchConfig();
        loadSwitches();
      }, []);

      useEffect(() => {
        if (selectedSwitchId !== null && switches.length > 0) {
          loadInterfaces(selectedSwitchId);
        } else {
          setPorts(generateInitialPorts([]));
          setAvailableVlans([]);
        }
      }, [selectedSwitchId, switches.length]);

      const persistPort = async (port, successMessage) => {
        const payload = buildInterfacePayload(port);
        const method = port.dbExists && port.id_interface ? 'PUT' : 'POST'; // Ensure id_interface exists for PUT
        const url = port.dbExists
          ? `${API_BASE_URL}/api/interface/${port.id_interface}`
          : `${API_BASE_URL}/api/interface`;

        const response = await fetch(url, {
          method,
          headers: auth.getAuthHeaders(),
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok || !data.success) {
          throw new Error(data.error || 'Enregistrement impossible');
        }
        console.log('[persistPort] Saved port data:', data);
        const savedPort = mapDbInterfaceToUi(data.interface || payload, port);
        setPorts((currentPorts) =>
          currentPorts.map((item) => item.id === port.id ? { ...savedPort, configured: true, dbExists: true } : item)
        );
        window.dispatchEvent(new CustomEvent('netguard:interface-updated'));
        showToast(successMessage);
      };

      const updatePortLocally = (id, updates) => {
        setPorts((currentPorts) => currentPorts.map((port) => (
          port.id === id ? { ...port, ...updates } : port
        )));
      };

      const getPort = (id) => ports.find((port) => port.id === id);

      const toggleStatus = (id) => {
        const currentPort = getPort(id);
        if (!currentPort) return;
        const nextStatus = currentPort.status === 'UP' ? 'DOWN' : 'UP';
        const nextSpeed  = nextStatus === 'UP' ? (currentPort.type === 'uplink' ? '10Gb' : '1Gb') : '-';
        updatePortLocally(id, { status: nextStatus, speed: nextSpeed });
      };

      const isolatePort = (id) => {
        updatePortLocally(id, { vlan: '99', alert: false, status: 'DOWN', mode: 'access', threat: '', allowedVlans: '' });
        setSelectedPortId(id);
      };

      const updatePortParam = (id, param, value) => {
        const currentPort = getPort(id);
        if (!currentPort) return;
        let updates = { [param]: value };
        if (param === 'mode' && value === 'trunk') {
          updates = { ...updates, vlan: currentPort.allowedVlans || 'All' };
        } else if (param === 'mode' && value === 'access') {
          updates = { ...updates, vlan: currentPort.vlan === 'All' ? '1' : currentPort.vlan };
        } else if (param === 'vlan') {
          updates = { ...updates, allowedVlans: currentPort.mode === 'trunk' ? value : currentPort.allowedVlans };
        }
        updatePortLocally(id, updates);
      };

      // ── Un seul bouton : Sauvegarde BDD + Déploiement SSH ──────────────────
      const handleApplyAndDeploy = async (id) => {
        const currentPort = getPort(id);
        if (!currentPort) return;

        // Validation VLAN
        if (currentPort.mode === 'access') {
          if (!currentPort.vlan) {
            showToast('Sélectionnez un VLAN valide avant d\'appliquer.', 'error');
            return;
          }
          if (!availableVlans.includes(String(currentPort.vlan))) {
            showToast(`Le VLAN ${currentPort.vlan} n'existe pas. Créez-le d'abord dans la page VLAN.`, 'error');
            return;
          }
        }

        setIsApplying(true);
        setDeployResult(null);

        // ── Étape 1 : Sauvegarde en BDD ────────────────────────────────────
        console.log('[handleApplyAndDeploy] Attempting to persist port to DB:', currentPort);
        try {
          await persistPort({ ...currentPort, configured: true }, null);
        } catch (error) {
          showToast(`❌ Erreur BDD : ${error.message}`, 'error');
          setIsApplying(false);
          return;
        }

        // ── Étape 2 : Déploiement SSH sur le switch ─────────────────────────
        setIsDeploying(true);
        console.log('[handleApplyAndDeploy] Attempting SSH deployment for port:', currentPort.id);
        try {
          const deployPayload = {
            interface_name: currentPort.id,
            mode:           currentPort.mode,
            vlan_id:        currentPort.mode === 'trunk' ? null : Number(currentPort.vlan),
            status:         currentPort.status,
            port_security:  currentPort.portSecurity,
            max_mac:        Number(currentPort.maxMac || 1),
            violation_mode: currentPort.securityViolation || 'shutdown',
            bpdu_guard:     currentPort.bpdu_guard,
            allowed_vlans:  currentPort.mode === 'trunk' ? (currentPort.vlan || 'All') : null,
            description:    currentPort.type === 'uplink' ? 'Uplink Port' : 'Access Port',
            static_mac:     currentPort.staticMac || null,
            remove_port_security: !currentPort.portSecurity,  // ← annule si décoché
          };

          console.log('[handleApplyAndDeploy] Deploy payload:', deployPayload);
          const res = await fetch(`${API_BASE_URL}/api/network/deploy-interface`, {
            method: 'POST',
            headers: auth.getAuthHeaders(),
            body: JSON.stringify(deployPayload),
          });
          const data = await res.json();
          setDeployResult(data);

          if (data.success) {
            showToast(`🎉 Interface ${id} enregistrée en BDD et déployée sur le switch !`);
          } else {
            showToast(`⚠️ BDD OK — mais déploiement SSH échoué : ${data.error || 'Erreur inconnue'}`, 'error');
          }
        } catch (e) {
          showToast(`❌ Erreur réseau SSH : ${e.message}`, 'error');
          setDeployResult({ success: false, error: e.message });
        } finally {
          setIsApplying(false);
          setIsDeploying(false);
        }
      };

      const getModeDisplay = (mode)  => mode === 'trunk' ? 'Trunk' : 'Access';
      const getTypeDisplay = (type)  => type === 'uplink' ? 'Uplink' : 'Access';

      // ── TFTP Backup / Restore ─────────────────────────────────────────────
      const handleTftp = async () => {
        if (!tftpServer.trim()) { showToast('Entrez l\'adresse IP du serveur TFTP.', 'error'); return; }
        if (!tftpFilename.trim()) { showToast('Entrez un nom de fichier.', 'error'); return; }
        setIsTftpRunning(true);
        setTftpResult(null);
        try {
          const endpoint = tftpMode === 'backup'
            ? `${API_BASE_URL}/api/network/tftp-backup`
            : `${API_BASE_URL}/api/network/tftp-restore`;
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: auth.getAuthHeaders(),
            body: JSON.stringify({ 
              tftp_server: tftpServer, 
              filename: tftpFilename,
              config_type: tftpConfigType  // Ajouter le paramètre config_type
            }),
          });
          const data = await res.json();
          setTftpResult(data);
          if (data.success) {
            showToast(tftpMode === 'backup' ? `✅ ${data.config_type}-config sauvegardée sur ${tftpServer}` : `✅ ${data.config_type}-config restaurée depuis ${tftpServer}`);
          } else {
            showToast(`❌ TFTP échoué : ${data.error || 'Erreur inconnue'}`, 'error');
          }
        } catch (e) {
          showToast(`❌ Erreur réseau : ${e.message}`, 'error');
          setTftpResult({ success: false, error: e.message });
        } finally {
          setIsTftpRunning(false);
        }
      };

      // ── Port Mirroring (SPAN) ─────────────────────────────────────────────
      const handlePortMirroring = async () => {
        if (!mirroringSessionId.trim() || Number.isNaN(Number(mirroringSessionId))) {
          showToast('Entrez un identifiant de session valide.', 'error');
          return;
        }
        if (!mirroringSourceVlan.trim() || Number.isNaN(Number(mirroringSourceVlan))) {
          showToast('Entrez un VLAN source valide.', 'error');
          return;
        }
        if (!mirroringDestination.trim()) {
          showToast('Entrez l\'interface de destination SPAN.', 'error');
          return;
        }
        setIsMirroringRunning(true);
        setMirroringResult(null);
        try {
          const res = await fetch(`${API_BASE_URL}/api/network/port-mirroring`, {
            method: 'POST',
            headers: auth.getAuthHeaders(),
            body: JSON.stringify({
              session_id: Number(mirroringSessionId),
              source_vlan: mirroringSourceVlan.trim(),
              destination_interface: mirroringDestination.trim(),
            }),
          });
          const data = await res.json();
          setMirroringResult(data);
          if (data.success) {
            showToast(`✅ Port mirroring déployé : VLAN ${mirroringSourceVlan} → ${mirroringDestination}`);
          } else {
            showToast(`❌ Échec port mirroring : ${data.error || 'Erreur inconnue'}`, 'error');
          }
        } catch (e) {
          setMirroringResult({ success: false, error: e.message });
          showToast(`❌ Erreur réseau : ${e.message}`, 'error');
        } finally {
          setIsMirroringRunning(false);
        }
      };

      const handleDeletePortMirroring = async () => {
        if (!mirroringSessionId.trim() || Number.isNaN(Number(mirroringSessionId))) {
          showToast('Entrez un identifiant de session valide.', 'error');
          return;
        }
        setIsDeletingMirroring(true);
        setMirroringDeleteResult(null);
        try {
          const res = await fetch(`${API_BASE_URL}/api/network/port-mirroring/delete`, {
            method: 'POST',
            headers: auth.getAuthHeaders(),
            body: JSON.stringify({ session_id: Number(mirroringSessionId) }),
          });
          const data = await res.json();
          setMirroringDeleteResult(data);
          setMirroringResult(null);
          if (data.success) {
            showToast(`✅ Session SPAN ${mirroringSessionId} supprimée du switch`);
          } else {
            showToast(`❌ Échec suppression SPAN : ${data.error || 'Erreur inconnue'}`, 'error');

            await fetch(`${API_BASE_URL}/api/interface/${port.id_interface}`, {
              method: 'DELETE',
              headers: auth.getAuthHeaders(),
            });

            console.warn('Erreur suppression BDD:', err);
          }
        }

        // 2. Reset sur le switch via SSH
        let result = null;
        try {
          const res = await fetch(`${API_BASE_URL}/api/network/reset-interface`, {
            method: 'POST',
            headers: auth.getAuthHeaders(),
            body: JSON.stringify({ interface_name: portId }),

          result = await res.json();
          setDeleteResult(result);
        } catch (err) {
          setDeleteResult({ success: false, error: err.message });

        setIsDeleting(false);

        if (result && result.success) {

          setPorts(prev => prev.map(p =>
            p.id === portId ? { ...p, configured: false, dbExists: false, id_interface: null } : p

          if (selectedPortId === portId) { setSelectedPortId(null); setDeployResult(null); }

          )}

          {toast && (
            <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-xl shadow-2xl font-bold text-sm text-white z-50 animate-in ${toast.type === 'error' ? 'bg-rose-600' : 'bg-emerald-600'}`}>
              {toast.message}
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('interfaces-root'));
    root.render(<InterfacesPage />);
  </script>

  <script src="sidebar.js"></script>
  <script src="topbar.js"></script>
</body>
</html>
