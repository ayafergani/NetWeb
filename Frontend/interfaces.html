<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGuard - Interfaces Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="auth.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="topbar.css" />
  <link rel="stylesheet" href="dark-mode.css" />
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .topbar { animation: slideDown 0.4s ease; }
    .animate-in { animation: fadeInUp 0.4s ease backwards; animation-delay: 0.1s; }
    .table-row { animation: rowSlideIn 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) both; }
    .slide-in-right { animation: fadeInRight 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) backwards; }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes rowSlideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .switch-toggle { position: relative; display: inline-block; width: 36px; height: 18px; }
    .switch-toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #6366f1; }
    input:checked + .slider:before { transform: translateX(18px); }

    .type-badge-uplink { background: #fef3c7; color: #92400e; }
    .type-badge-access { background: #e0e7ff; color: #4338ca; }

    /* Deploy result log */
    .deploy-log { font-family: 'DM Mono', monospace; font-size: 10px; line-height: 1.6; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen app-body">
  <div class="app-shell">
    <aside id="sidebar-root" class="sidebar-host" data-page="interfaces"></aside>

    <main class="main">
      <div id="topbar-root" data-title="Interfaces Management" data-subtitle="Configuration visuelle des ports et déploiement SSH." data-notifications="5"></div>

      <section class="content custom-scroll">
        <div id="interfaces-root" class="page-block"></div>
      </section>
    </main>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const API_BASE_URL = window.location.port === '5000' ? '' : 'http://127.0.0.1:5000';
    const auth = window.NetGuardAuth;

    const pickDefaultAccessVlan = (availableVlans, preferredVlan) => {
      const normalizedVlans = (availableVlans || []).map((vlan) => String(vlan));
      if (normalizedVlans.includes(String(preferredVlan))) return String(preferredVlan);
      if (normalizedVlans.includes('1')) return '1';
      return normalizedVlans[0] || '';
    };

    const generateInitialPorts = (availableVlans = []) => {
      const ports = [];
      let interfaceId = 1;
      for (let i = 1; i <= 24; i++) {
        const isConfigured = i <= 4 || i === 24;
        const preferredVlan = i === 3 ? '20' : (i === 24 ? '30' : (isConfigured ? '10' : '1'));
        ports.push({
          id_interface: interfaceId++,
          id: `Gi1/0/${i}`,
          equipement_id: null,
          status: i <= 4 ? 'UP' : 'DOWN',
          vlan: pickDefaultAccessVlan(availableVlans, preferredVlan),
          mode: 'access',
          type: 'access',
          speed: i <= 4 ? '1Gb' : '-',
          devices: i <= 4 ? 1 : 0,
          alert: i === 4,
          srcIp: i === 4 ? '192.168.1.10' : '',
          threat: i === 4 ? 'Port Scan Détecté' : '',
          portSecurity: i <= 3,
          securityViolation: 'shutdown',
          maxMac: 1,
          staticMac: '',
          bpdu_guard: true,
          configured: isConfigured,
          allowedVlans: '',
          dbExists: false
        });
      }
      for (let i = 1; i <= 4; i++) {
        const isConfigured = i <= 2;
        ports.push({
          id_interface: interfaceId++,
          id: `Te1/1/${i}`,
          equipement_id: null,
          status: i === 1 ? 'UP' : 'DOWN',
          vlan: isConfigured ? 'All' : pickDefaultAccessVlan(availableVlans, '1'),
          mode: isConfigured ? 'trunk' : 'access',
          type: 'uplink',
          speed: i === 1 ? '10Gb' : '-',
          devices: 0,
          alert: false,
          srcIp: '',
          threat: '',
          portSecurity: false,
          securityViolation: 'shutdown',
          maxMac: 1,
          staticMac: '',
          bpdu_guard: false,
          configured: isConfigured,
          allowedVlans: isConfigured ? 'All' : '',
          dbExists: false
        });
      }
      return ports;
    };

    const mapDbInterfaceToUi = (row, fallbackPort) => ({
      ...(fallbackPort || {}),
      id_interface: row.id_interface,
      id: row.nom,
      equipement_id: row.equipement_id ?? fallbackPort?.equipement_id ?? null,
      status: (row.status || fallbackPort?.status || 'DOWN').toUpperCase(),
      vlan: row.mode === 'trunk' ? (row.allowed_vlans || 'All') : String(row.vlan_id ?? fallbackPort?.vlan ?? '1'),
      mode: row.mode || fallbackPort?.mode || 'access',
      type: row.type || fallbackPort?.type || 'access',
      speed: row.speed || fallbackPort?.speed || '-',
      devices: fallbackPort?.devices || 0,
      alert: fallbackPort?.alert || false,
      srcIp: row.ip || fallbackPort?.srcIp || '',
      threat: fallbackPort?.threat || '',
      portSecurity: Boolean(row.port_security),
      securityViolation: row.violation_mode || fallbackPort?.securityViolation || 'shutdown',
      maxMac: row.max_mac || fallbackPort?.maxMac || 1,
      staticMac: row.static_mac || '',
      bpdu_guard: Boolean(row.bpdu_guard),
      configured: true,
      allowedVlans: row.allowed_vlans || '',
      dbExists: true
    });

    const buildInterfacePayload = (port) => ({
      id_interface: port.id_interface,
      nom: port.id,
      ip: port.srcIp || null,
      vlan_id: port.mode === 'trunk' ? null : (port.vlan && port.vlan !== 'All' ? Number(port.vlan) : null),
      equipement_id: port.equipement_id ?? null,
      status: port.status,
      mode: port.mode,
      type: port.type,
      speed: port.speed === '-' ? null : port.speed,
      allowed_vlans: port.mode === 'trunk' ? (port.vlan || port.allowedVlans || 'All') : null,
      port_security: port.portSecurity,
      max_mac: Number(port.maxMac || 1),
      static_mac: port.staticMac || null,
      violation_mode: port.securityViolation || 'shutdown',
      bpdu_guard: port.bpdu_guard,
    });

    const InterfacesPage = () => {
      const [availableVlans, setAvailableVlans] = useState([]);
      const [ports, setPorts] = useState(generateInitialPorts());
      const [selectedPortId, setSelectedPortId] = useState(null);
      const [isApplying, setIsApplying] = useState(false);
      const [isDeploying, setIsDeploying] = useState(false);
      const [toast, setToast] = useState(null);
      const [deployResult, setDeployResult] = useState(null);

      // Switch config (lue depuis hosts.yaml, comme dans vlan.html)
      const [switchCfg, setSwitchCfg] = useState({
        host_key: 'switch_cible',
        hostname: '',
        username: '',
        password: '',
        secret: '',
        port: 22,
      });
      const [switchCfgLoaded, setSwitchCfgLoaded] = useState(false);
      const [isSavingSwitch, setIsSavingSwitch] = useState(false);

      const [switches, setSwitches] = useState([
        { id: 1, nom: 'Core-SW', ip: '10.10.10.50' },
        { id: 2, nom: 'Access-SW-1', ip: '10.10.10.51' }
      ]);
      const [selectedSwitchId, setSelectedSwitchId] = useState(1);

      const selectedPort = ports.find((p) => p.id === selectedPortId);
      const configuredPorts = ports.filter((p) => p.configured);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        window.clearTimeout(window.__interfaceToastTimer);
        window.__interfaceToastTimer = window.setTimeout(() => setToast(null), 4000);
      };

      // ── Charger switch config depuis hosts.yaml (comme vlan.html) ────────
      const loadSwitchConfig = async () => {
        try {
          const res = await fetch(`${API_BASE_URL}/api/network/switch-config`, {
            headers: auth.getAuthHeaders()
          });
          const data = await res.json();
          if (data.success && data.switches && data.switches.length > 0) {
            const sw = data.switches[0];
            setSwitchCfg({
              host_key: sw.host_key || 'switch_cible',
              hostname:  sw.hostname  || '',
              username:  sw.username  || '',
              password:  sw.password  || '',
              secret:    sw.secret    || '',
              port:      sw.port      || 22,
            });
          }
        } catch (e) {
          console.warn('Impossible de charger hosts.yaml:', e);
        } finally {
          setSwitchCfgLoaded(true);
        }
      };

      const saveSwitchConfig = async () => {
        setIsSavingSwitch(true);
        try {
          const res = await fetch(`${API_BASE_URL}/api/network/switch-config`, {
            method: 'POST',
            headers: auth.getAuthHeaders(),
            body: JSON.stringify(switchCfg),
          });
          const data = await res.json();
          if (data.success) {
            showToast('✅ Configuration switch sauvegardée dans hosts.yaml');
          } else {
            showToast(data.error || 'Erreur lors de la sauvegarde', 'error');
          }
        } catch (e) {
          showToast('Erreur réseau', 'error');
        } finally {
          setIsSavingSwitch(false);
        }
      };

      const loadInterfaces = async (swId) => {
        try {
          const [intRes, vlanRes] = await Promise.all([
            fetch(`${API_BASE_URL}/api/interface?switch_id=${swId}`, { headers: auth.getAuthHeaders() }),
            fetch(`${API_BASE_URL}/api/vlan?switch_id=${swId}`,      { headers: auth.getAuthHeaders() })
          ]);
          const [intData, vlanData] = await Promise.all([intRes.json(), vlanRes.json()]);
          if (vlanData.success) {
            setAvailableVlans(vlanData.vlans.map(v => String(v.id_vlan ?? v.id)));
          }
          if (intData.success && intData.interfaces) {
            setPorts(intData.interfaces.map(i => ({
              ...i,
              id: i.nom,
              configured: true,
              dbExists: true,
              portSecurity: Boolean(i.port_security),
              securityViolation: i.violation_mode || 'shutdown',
              maxMac: i.max_mac || 1,
              staticMac: i.static_mac || '',
              vlan: i.mode === 'trunk' ? (i.allowed_vlans || 'All') : String(i.vlan_id ?? '1'),
              allowedVlans: i.allowed_vlans || '',
              alert: false,
              srcIp: i.ip || '',
              threat: '',
              devices: 0,
            })));
          }
        } catch (error) {
          console.error('Erreur chargement interfaces:', error);
        }
      };

      useEffect(() => {
        loadSwitchConfig();
        loadInterfaces(selectedSwitchId);
      }, [selectedSwitchId]);

      const persistPort = async (port, successMessage) => {
        const payload = buildInterfacePayload(port);
        const method = port.dbExists ? 'PUT' : 'POST';
        const url = port.dbExists
          ? `${API_BASE_URL}/api/interface/${port.id_interface}`
          : `${API_BASE_URL}/api/interface`;

        const response = await fetch(url, {
          method,
          headers: auth.getAuthHeaders(),
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok || !data.success) {
          throw new Error(data.error || 'Enregistrement impossible');
        }
        const savedPort = mapDbInterfaceToUi(data.interface || payload, port);
        setPorts((currentPorts) =>
          currentPorts.map((item) => item.id === port.id ? { ...savedPort, configured: true, dbExists: true } : item)
        );
        window.dispatchEvent(new CustomEvent('netguard:interface-updated'));
        showToast(successMessage);
      };

      const updatePortLocally = (id, updates) => {
        setPorts((currentPorts) => currentPorts.map((port) => (
          port.id === id ? { ...port, ...updates } : port
        )));
      };

      const getPort = (id) => ports.find((port) => port.id === id);

      const toggleStatus = (id) => {
        const currentPort = getPort(id);
        if (!currentPort) return;
        const nextStatus = currentPort.status === 'UP' ? 'DOWN' : 'UP';
        const nextSpeed  = nextStatus === 'UP' ? (currentPort.type === 'uplink' ? '10Gb' : '1Gb') : '-';
        updatePortLocally(id, { status: nextStatus, speed: nextSpeed });
      };

      const isolatePort = (id) => {
        updatePortLocally(id, { vlan: '99', alert: false, status: 'DOWN', mode: 'access', threat: '', allowedVlans: '' });
        setSelectedPortId(id);
      };

      const updatePortParam = (id, param, value) => {
        const currentPort = getPort(id);
        if (!currentPort) return;
        let updates = { [param]: value };
        if (param === 'mode' && value === 'trunk') {
          updates = { ...updates, vlan: currentPort.allowedVlans || 'All' };
        } else if (param === 'mode' && value === 'access') {
          updates = { ...updates, vlan: currentPort.vlan === 'All' ? '1' : currentPort.vlan };
        } else if (param === 'vlan') {
          updates = { ...updates, allowedVlans: currentPort.mode === 'trunk' ? value : currentPort.allowedVlans };
        }
        updatePortLocally(id, updates);
      };

      // ── Un seul bouton : Sauvegarde BDD + Déploiement SSH ──────────────────
      const handleApplyAndDeploy = async (id) => {
        const currentPort = getPort(id);
        if (!currentPort) return;

        // Validation VLAN
        if (currentPort.mode === 'access') {
          if (!currentPort.vlan) {
            showToast('Sélectionnez un VLAN valide avant d\'appliquer.', 'error');
            return;
          }
          if (!availableVlans.includes(String(currentPort.vlan))) {
            showToast(`Le VLAN ${currentPort.vlan} n'existe pas. Créez-le d'abord dans la page VLAN.`, 'error');
            return;
          }
        }

        setIsApplying(true);
        setDeployResult(null);

        // ── Étape 1 : Sauvegarde en BDD ────────────────────────────────────
        try {
          await persistPort({ ...currentPort, configured: true }, null);
        } catch (error) {
          showToast(`❌ Erreur BDD : ${error.message}`, 'error');
          setIsApplying(false);
          return;
        }

        // ── Étape 2 : Déploiement SSH sur le switch ─────────────────────────
        setIsDeploying(true);
        try {
          const deployPayload = {
            interface_name: currentPort.id,
            mode:           currentPort.mode,
            vlan_id:        currentPort.mode === 'trunk' ? null : Number(currentPort.vlan),
            status:         currentPort.status,
            port_security:  currentPort.portSecurity,
            max_mac:        Number(currentPort.maxMac || 1),
            violation_mode: currentPort.securityViolation || 'shutdown',
            bpdu_guard:     currentPort.bpdu_guard,
            allowed_vlans:  currentPort.mode === 'trunk' ? (currentPort.vlan || 'All') : null,
            description:    currentPort.type === 'uplink' ? 'Uplink Port' : 'Access Port',
            static_mac:     currentPort.staticMac || null,
          };

          const res = await fetch(`${API_BASE_URL}/api/network/deploy-interface`, {
            method: 'POST',
            headers: auth.getAuthHeaders(),
            body: JSON.stringify(deployPayload),
          });
          const data = await res.json();
          setDeployResult(data);

          if (data.success) {
            showToast(`🎉 Interface ${id} enregistrée en BDD et déployée sur le switch !`);
          } else {
            showToast(`⚠️ BDD OK — mais déploiement SSH échoué : ${data.error || 'Erreur inconnue'}`, 'error');
          }
        } catch (e) {
          showToast(`❌ Erreur réseau SSH : ${e.message}`, 'error');
          setDeployResult({ success: false, error: e.message });
        } finally {
          setIsApplying(false);
          setIsDeploying(false);
        }
      };

      const getModeDisplay = (mode)  => mode === 'trunk' ? 'Trunk' : 'Access';
      const getTypeDisplay = (type)  => type === 'uplink' ? 'Uplink' : 'Access';

      // ── Suppression config interface ──────────────────────────────────────
      const handleDeleteInterface = async (portId, e) => {
        e.stopPropagation();
        if (!window.confirm(`Supprimer la configuration de l'interface ${portId} ?\nCela va réinitialiser le port sur le switch (shutdown, VLAN 1, sans sécurité).`)) return;

        showToast(`🔄 Suppression de ${portId} en cours...`);

        // 1. Supprimer en BDD si existant
        const port = getPort(portId);
        if (port && port.dbExists && port.id_interface) {
          try {
            await fetch(`${API_BASE_URL}/api/interface/${port.id_interface}`, {
              method: 'DELETE',
              headers: auth.getAuthHeaders(),
            });
          } catch (err) {
            console.warn('Erreur suppression BDD:', err);
          }
        }

        // 2. Reset sur le switch via SSH
        try {
          const res = await fetch(`${API_BASE_URL}/api/network/reset-interface`, {
            method: 'POST',
            headers: auth.getAuthHeaders(),
            body: JSON.stringify({ interface_name: portId }),
          });
          const data = await res.json();
          if (data.success) {
            showToast(`✅ Interface ${portId} supprimée et réinitialisée sur le switch`);
          } else {
            showToast(`⚠️ BDD supprimée — Reset SSH échoué : ${data.error || 'Erreur inconnue'}`, 'error');
          }
        } catch (err) {
          showToast(`❌ Erreur réseau lors du reset SSH : ${err.message}`, 'error');
        }

        // 3. Retirer localement du tableau
        setPorts(prev => prev.map(p =>
          p.id === portId
            ? { ...p, configured: false, dbExists: false, id_interface: null }
            : p
        ));
        if (selectedPortId === portId) {
          setSelectedPortId(null);
          setDeployResult(null);
        }
      };

      const PhysicalSwitch = () => (
        <div className="bg-[#1a1c3a] p-6 rounded-2xl shadow-xl shadow-indigo-600/20 mb-8 border border-slate-200 flex flex-col items-center">
          <div className="w-full flex justify-between items-center mb-6">
            <span className="text-slate-400 font-mono text-xs tracking-widest font-bold">CISCO CATALYST 9200 SERIES</span>
            <span className="text-emerald-400 font-mono text-xs flex items-center gap-2">
              <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div> IOS-XE SECURE
            </span>
          </div>
          <div className="flex gap-8 items-center w-full justify-center overflow-x-auto pb-4">
            <div className="flex flex-col gap-2 p-3 bg-slate-800/50 rounded-xl border border-slate-700/50">
              <span className="text-[9px] font-mono text-slate-500 text-center uppercase tracking-widest mb-1">Access Ports</span>
              <div className="grid grid-cols-12 gap-1.5">
                {Array.from({ length: 24 }).map((_, i) => {
                  const portId = `Gi1/0/${i + 1}`;
                  const portData = ports.find((p) => p.id === portId);
                  let bgColor = 'bg-slate-700', borderColor = 'border-slate-800', animation = '';
                  if (portData) {
                    if (portData.alert) { bgColor = 'bg-orange-500'; borderColor = 'border-orange-300'; animation = 'animate-pulse'; }
                    else if (!portData.configured) { bgColor = 'bg-slate-700'; borderColor = 'border-slate-600'; }
                    else if (portData.status === 'UP') { bgColor = 'bg-emerald-500'; borderColor = 'border-emerald-300'; }
                    else { bgColor = 'bg-rose-500'; borderColor = 'border-rose-300'; }
                  }
                  return (
                    <div key={portId} onClick={() => portData && setSelectedPortId(portId)}
                      className={`w-8 h-8 rounded border-b-2 ${bgColor} ${borderColor} ${animation} flex items-center justify-center cursor-pointer hover:scale-110 transition-transform shadow-inner`}
                      title={`Interface ${portId}`}>
                      <span className="text-[8px] font-mono text-white/90">{i + 1}</span>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="flex flex-col gap-2 p-3 bg-slate-800/80 rounded-xl border border-slate-700">
              <span className="text-[9px] font-mono text-cyan-500/70 text-center uppercase tracking-widest mb-1">Uplink Ports</span>
              <div className="grid grid-cols-2 gap-2">
                {Array.from({ length: 4 }).map((_, i) => {
                  const portId = `Te1/1/${i + 1}`;
                  const portData = ports.find((p) => p.id === portId);
                  let bgColor = 'bg-slate-900', borderColor = 'border-slate-700';
                  if (portData) {
                    if (!portData.configured) { bgColor = 'bg-slate-800'; borderColor = 'border-slate-700'; }
                    else if (portData.status === 'UP') { bgColor = 'bg-cyan-600'; borderColor = 'border-cyan-400'; }
                    else { bgColor = 'bg-rose-900'; borderColor = 'border-rose-700'; }
                  }
                  return (
                    <div key={portId} onClick={() => portData && setSelectedPortId(portId)}
                      className={`w-10 h-8 rounded border-2 ${bgColor} ${borderColor} flex items-center justify-center cursor-pointer hover:scale-105 transition-transform`}
                      title={`Uplink Port ${portId}`}>
                      <span className="text-[8px] font-mono text-white/60">T{i + 1}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="p-2 md:p-4 max-w-[1600px] mx-auto animate-in">

          {/* Sélecteur de switch actif */}
          <div className="mb-6 flex items-center gap-4 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm animate-in">
            <div className="p-2 bg-indigo-50 rounded-lg text-indigo-600 text-xl">📡</div>
            <label className="text-sm font-bold text-slate-500 uppercase tracking-wider">Switch Actif :</label>
            <select
              value={selectedSwitchId}
              onChange={(e) => setSelectedSwitchId(e.target.value)}
              className="bg-transparent border-none font-bold text-indigo-600 outline-none cursor-pointer text-lg"
            >
              {switches.map(sw => (
                <option key={sw.id} value={sw.id}>{sw.nom} ({sw.ip})</option>
              ))}
            </select>
          </div>

          <div className="flex flex-col md:flex-row md:justify-between md:items-end mb-8 gap-4">
            <div>
              <h1 className="page-title text-3xl font-bold text-slate-800 tracking-tight">Interfaces Management</h1>
              <p className="text-slate-500 mt-1">Cliquez sur un port du switch pour le configurer et le déployer via SSH.</p>
            </div>
          </div>

          <PhysicalSwitch />

          <div className="grid grid-cols-12 gap-8">
            {/* ── TABLE ── */}
            <div className={`col-span-12 ${selectedPort ? 'lg:col-span-8' : 'lg:col-span-12'} transition-all duration-300`}>
              <div className="table-card bg-white rounded-[2rem] border border-slate-200 shadow-xl shadow-indigo-600/20 overflow-hidden">
                <div className="p-5 bg-slate-50/80 border-b border-slate-100 flex justify-between items-center">
                  <h3 className="font-bold text-slate-700">Ports configurés ({configuredPorts.length})</h3>
                </div>
                <div className="overflow-x-auto max-h-[600px] custom-scroll">
                  <table className="w-full text-left">
                    <thead className="bg-slate-50/80 border-b border-slate-100 sticky top-0 z-10">
                      <tr>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Port</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Type</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">VLAN</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Mode</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Sécurité</th>
                        <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {configuredPorts.map((port, idx) => (
                        <tr
                          key={port.id}
                          onClick={() => setSelectedPortId(port.id)}
                          className={`group cursor-pointer transition-colors table-row ${selectedPortId === port.id ? 'bg-indigo-50/40' : 'hover:bg-slate-50/80'} ${port.alert ? 'bg-orange-50/30 hover:bg-orange-50/60' : ''}`}
                          style={{ animationDelay: `${0.1 + (idx * 0.05)}s` }}
                        >
                          <td className="px-6 py-4 font-mono font-bold text-slate-700">{port.id}</td>
                          <td className="px-6 py-4">
                            <span className={`px-2 py-1 rounded-lg text-[10px] font-bold ${port.type === 'uplink' ? 'type-badge-uplink' : 'type-badge-access'}`}>
                              {getTypeDisplay(port.type)}
                            </span>
                          </td>
                          <td className="px-6 py-4">
                            <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-bold ${port.status === 'UP' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                              <span className={`w-1.5 h-1.5 rounded-full ${port.status === 'UP' ? 'bg-emerald-500' : 'bg-rose-500'}`}></span>
                              {port.status}
                            </span>
                          </td>
                          <td className="px-6 py-4 font-mono font-bold text-indigo-600">
                            {port.vlan !== 'All' ? `VLAN ${port.vlan}` : port.vlan}
                          </td>
                          <td className="px-6 py-4">
                            <span className={`px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-tighter ${port.mode === 'trunk' ? 'bg-purple-50 text-purple-600' : 'bg-slate-100 text-slate-600'}`}>
                              {getModeDisplay(port.mode)}
                            </span>
                          </td>
                          <td className="px-6 py-4">
                            {port.portSecurity
                              ? <span className="text-emerald-600 text-xs font-bold">🔒 Sec</span>
                              : <span className="text-slate-400 text-xs font-medium">🔓 Off</span>
                            }
                            {port.bpdu_guard && <span className="ml-2 text-indigo-600 text-xs font-bold">🛡️ BPDU</span>}
                          </td>
                          <td className="px-6 py-4 text-right space-x-3">
                            {port.alert && <span className="text-orange-600 text-xs font-bold uppercase mr-2 animate-pulse">⚠️ Menace</span>}
                            <button className="text-slate-400 hover:text-indigo-600 font-semibold text-sm transition-colors">Config</button>
                            <button
                              onClick={(e) => handleDeleteInterface(port.id, e)}
                              title="Supprimer la configuration"
                              className="inline-flex items-center justify-center w-7 h-7 rounded-lg bg-rose-50 hover:bg-rose-100 text-rose-400 hover:text-rose-600 transition-colors"
                            >
                              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4">
                                <path fillRule="evenodd" d="M8.75 1A2.75 2.75 0 006 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 10.23 1.482l.149-.022.841 10.518A2.75 2.75 0 007.596 19h4.807a2.75 2.75 0 002.742-2.53l.841-10.52.149.023a.75.75 0 00.23-1.482A41.03 41.03 0 0014 4.193V3.75A2.75 2.75 0 0011.25 1h-2.5zM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4zM8.58 7.72a.75.75 0 00-1.5.06l.3 7.5a.75.75 0 101.5-.06l-.3-7.5zm4.34.06a.75.75 0 10-1.5-.06l-.3 7.5a.75.75 0 101.5.06l.3-7.5z" clipRule="evenodd" />
                              </svg>
                            </button>
                          </td>
                        </tr>
                      ))}
                      {configuredPorts.length === 0 && (
                        <tr>
                          <td colSpan="7" className="px-6 py-10 text-center text-slate-400 text-sm">
                            Aucun port configuré. Cliquez sur le schéma du switch pour commencer.
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            {/* ── PANNEAU DE CONFIG ── */}
            {selectedPort && (
              <div className="col-span-12 lg:col-span-4 slide-in-right">
                <div className="detail-panel bg-white rounded-[2rem] border border-slate-200 p-6 shadow-xl shadow-indigo-600/15 sticky top-6">
                  <div className="flex justify-between items-start mb-6">
                    <div>
                      <h2 className="text-xl font-bold text-slate-800">Configuration</h2>
                      <div className="flex items-center gap-2 mt-1">
                        <p className="text-sm font-mono text-indigo-600">Interface {selectedPort.id}</p>
                        <span className={`px-2 py-0.5 rounded-md text-[9px] font-bold ${selectedPort.type === 'uplink' ? 'type-badge-uplink' : 'type-badge-access'}`}>
                          {getTypeDisplay(selectedPort.type)}
                        </span>
                      </div>
                    </div>
                    <button onClick={() => { setSelectedPortId(null); setDeployResult(null); }}
                      className="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 transition-colors">✕</button>
                  </div>

                  {selectedPort.alert && (
                    <div className="mb-6 p-4 bg-orange-50 border border-orange-200 rounded-2xl shadow-sm">
                      <div className="flex items-center gap-2 mb-2">
                        <span className="w-2 h-2 rounded-full bg-orange-500 animate-ping"></span>
                        <h4 className="text-orange-800 font-bold text-xs uppercase tracking-wider">Activité suspecte</h4>
                      </div>
                      <p className="text-orange-700 text-sm font-medium">{selectedPort.threat}</p>
                      <div className="mt-3 py-2 px-3 bg-white rounded-lg border border-orange-100 text-[11px] font-mono text-orange-600 font-bold">
                        Source IP: {selectedPort.srcIp}
                      </div>
                      <button onClick={() => isolatePort(selectedPort.id)}
                        className="w-full mt-4 py-2.5 bg-orange-500 text-white text-xs font-bold rounded-xl hover:bg-orange-600 transition-all shadow-md flex items-center justify-center gap-2">
                        Isoler → VLAN 99
                      </button>
                    </div>
                  )}

                  <div className="space-y-5">

                    {/* ── SECTION SWITCH CIBLE (hosts.yaml) ── */}
                    <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200 mb-2">
                      <div className="flex items-center justify-between mb-3">
                        <div className="flex items-center gap-2">
                          <span className="text-base">🔒</span>
                          <h3 className="text-xs font-bold text-indigo-600 uppercase tracking-wider">Switch Cible (hosts.yaml)</h3>
                        </div>
                        <button onClick={saveSwitchConfig} disabled={isSavingSwitch}
                          className="text-[10px] font-bold px-3 py-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 transition-all">
                          {isSavingSwitch ? 'Sauvegarde...' : '💾 Sauvegarder'}
                        </button>
                      </div>
                      {!switchCfgLoaded ? (
                        <p className="text-[11px] text-slate-400 italic">Chargement depuis hosts.yaml...</p>
                      ) : (
                        <div className="grid grid-cols-2 gap-2">
                          <div>
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">IP du Switch</label>
                            <input type="text" value={switchCfg.hostname}
                              onChange={(e) => setSwitchCfg({...switchCfg, hostname: e.target.value})}
                              className="w-full border border-slate-200 rounded-lg p-2 text-sm font-mono outline-none focus:border-indigo-500"
                              placeholder="10.10.10.50" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">Utilisateur SSH</label>
                            <input type="text" value={switchCfg.username}
                              onChange={(e) => setSwitchCfg({...switchCfg, username: e.target.value})}
                              className="w-full border border-slate-200 rounded-lg p-2 text-sm outline-none focus:border-indigo-500"
                              placeholder="admin" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">Mot de passe SSH</label>
                            <input type="password" value={switchCfg.password}
                              onChange={(e) => setSwitchCfg({...switchCfg, password: e.target.value})}
                              className="w-full border border-slate-200 rounded-lg p-2 text-sm outline-none focus:border-indigo-500"
                              placeholder="••••••" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">Enable Secret</label>
                            <input type="password" value={switchCfg.secret}
                              onChange={(e) => setSwitchCfg({...switchCfg, secret: e.target.value})}
                              className="w-full border border-slate-200 rounded-lg p-2 text-sm outline-none focus:border-indigo-500"
                              placeholder="enable secret" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">Port SSH</label>
                            <input type="number" value={switchCfg.port}
                              onChange={(e) => setSwitchCfg({...switchCfg, port: parseInt(e.target.value)||22})}
                              className="w-full border border-slate-200 rounded-lg p-2 text-sm font-mono outline-none focus:border-indigo-500"
                              placeholder="22" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">Nom inventaire</label>
                            <input type="text" value={switchCfg.host_key}
                              onChange={(e) => setSwitchCfg({...switchCfg, host_key: e.target.value})}
                              className="w-full border border-slate-200 rounded-lg p-2 text-sm font-mono outline-none focus:border-indigo-500"
                              placeholder="switch_cible" />
                          </div>
                        </div>
                      )}
                    </div>

                    {/* ── PORT STATUS ── */}
                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-between">
                      <div>
                        <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Port Status</p>
                        <p className={`text-sm font-bold ${selectedPort.status === 'UP' ? 'text-emerald-600' : 'text-rose-600'}`}>
                          State: {selectedPort.status}
                        </p>
                      </div>
                      <button onClick={() => toggleStatus(selectedPort.id)}
                        className={`px-4 py-2 rounded-lg text-xs font-bold text-white transition-colors ${selectedPort.status === 'UP' ? 'bg-rose-500 hover:bg-rose-600' : 'bg-emerald-500 hover:bg-emerald-600'}`}>
                        {selectedPort.status === 'UP' ? 'Shutdown' : 'No Shutdown'}
                      </button>
                    </div>

                    {/* ── MODE + VLAN ── */}
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Mode</label>
                        <select value={selectedPort.mode} onChange={(e) => updatePortParam(selectedPort.id, 'mode', e.target.value)}
                          className="w-full border border-slate-200 rounded-xl p-3 text-sm font-semibold text-slate-700 outline-none focus:border-indigo-500 bg-white">
                          <option value="access">Access</option>
                          <option value="trunk">Trunk</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">VLAN</label>
                        {selectedPort.mode === 'trunk' ? (
                          <input type="text" value={selectedPort.vlan}
                            onChange={(e) => updatePortParam(selectedPort.id, 'vlan', e.target.value)}
                            className="w-full border border-slate-200 rounded-xl p-3 text-sm font-mono font-bold text-indigo-600 outline-none focus:border-indigo-500 bg-white"
                            placeholder="All, 10,20,30..." />
                        ) : (
                          <select value={selectedPort.vlan} onChange={(e) => updatePortParam(selectedPort.id, 'vlan', e.target.value)}
                            className="w-full border border-slate-200 rounded-xl p-3 text-sm font-mono font-bold text-indigo-600 outline-none focus:border-indigo-500 bg-white">
                            <option value="">-- Choisir --</option>
                            {availableVlans.map((vlanId) => (
                              <option key={vlanId} value={vlanId}>VLAN {vlanId}</option>
                            ))}
                          </select>
                        )}
                        {selectedPort.mode === 'access' && availableVlans.length === 0 && (
                          <p className="mt-2 text-[11px] text-rose-600 font-medium">
                            Aucun VLAN disponible. Créez-en un d'abord.
                          </p>
                        )}
                      </div>
                    </div>

                    {/* ── PORT SECURITY ── */}
                    <div className="p-4 bg-indigo-50/50 rounded-xl border border-indigo-100">
                      <h4 className="text-xs font-bold text-indigo-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <span>🔒</span> Port Security (L2)
                      </h4>
                      <div className="flex justify-between items-center mb-4">
                        <span className="text-xs font-bold text-slate-600">Enable Port Security</span>
                        <label className="switch-toggle">
                          <input type="checkbox" checked={selectedPort.portSecurity}
                            onChange={(e) => updatePortParam(selectedPort.id, 'portSecurity', e.target.checked)} />
                          <span className="slider"></span>
                        </label>
                      </div>
                      {selectedPort.portSecurity && (
                        <div className="space-y-3 animate-in">
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[10px] font-bold text-slate-500 mb-1">Max MAC</label>
                              <input type="number" min="1" max="10" value={selectedPort.maxMac}
                                onChange={(e) => updatePortParam(selectedPort.id, 'maxMac', e.target.value)}
                                className="w-full border border-slate-200 rounded-lg p-2 text-xs font-mono outline-none" />
                            </div>
                            <div>
                              <label className="block text-[10px] font-bold text-slate-500 mb-1">Violation</label>
                              <select value={selectedPort.securityViolation}
                                onChange={(e) => updatePortParam(selectedPort.id, 'securityViolation', e.target.value)}
                                className="w-full border border-slate-200 rounded-lg p-2 text-xs outline-none">
                                <option value="protect">Protect</option>
                                <option value="restrict">Restrict</option>
                                <option value="shutdown">Shutdown</option>
                              </select>
                            </div>
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">
                              MAC Statique <span className="text-slate-400 font-normal">(optionnel — sinon sticky)</span>
                            </label>
                            <input
                              type="text"
                              value={selectedPort.staticMac || ''}
                              onChange={(e) => updatePortParam(selectedPort.id, 'staticMac', e.target.value)}
                              placeholder="ex. 00:1A:2B:3C:4D:5E"
                              className="w-full border border-slate-200 rounded-lg p-2 text-xs font-mono outline-none focus:border-indigo-400 placeholder:text-slate-300"
                            />
                            {selectedPort.staticMac && !/^([0-9A-Fa-f]{2}[:\-.]){5}[0-9A-Fa-f]{2}$/.test(selectedPort.staticMac) && (
                              <p className="mt-1 text-[10px] text-rose-500 font-medium">Format invalide. Ex : 00:1A:2B:3C:4D:5E</p>
                            )}
                          </div>
                        </div>
                      )}
                      <div className="flex justify-between items-center mt-4 pt-4 border-t border-indigo-100/50">
                        <span className="text-xs font-bold text-slate-600">Enable BPDU Guard</span>
                        <label className="switch-toggle">
                          <input type="checkbox" checked={selectedPort.bpdu_guard}
                            onChange={(e) => updatePortParam(selectedPort.id, 'bpdu_guard', e.target.checked)} />
                          <span className="slider"></span>
                        </label>
                      </div>
                    </div>

                    {/* ── CLI PREVIEW ── */}
                    <div className="p-3 bg-slate-800 rounded-xl">
                      <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">CLI Preview</p>
                      <pre className="text-[10px] font-mono text-emerald-400 whitespace-pre-wrap">
{`interface ${selectedPort.id}
 description ${selectedPort.type === 'uplink' ? 'Uplink Port' : 'Access Port'}
 switchport mode ${selectedPort.mode}
 ${selectedPort.mode === 'access'
   ? `switchport access vlan ${selectedPort.vlan}`
   : `switchport trunk allowed vlan ${selectedPort.vlan || 'all'}`}
${selectedPort.portSecurity && selectedPort.mode === 'access'
   ? ` switchport port-security\n switchport port-security maximum ${selectedPort.maxMac}\n switchport port-security violation ${selectedPort.securityViolation}\n switchport port-security mac-address ${selectedPort.staticMac ? selectedPort.staticMac : 'sticky'}`
   : ''}
 ${selectedPort.bpdu_guard ? 'spanning-tree bpduguard enable' : 'no spanning-tree bpduguard enable'}
 ${selectedPort.status === 'UP' ? 'no shutdown' : 'shutdown'}
 exit`.replace(/^\s*[\r\n]/gm, '')}
                      </pre>
                    </div>

                    {/* ── BOUTON UNIQUE : BDD + SSH ── */}
                    <button onClick={() => handleApplyAndDeploy(selectedPort.id)} disabled={isApplying || isDeploying}
                      className="w-full py-3.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-50 text-sm shadow-lg shadow-indigo-600/25 flex items-center justify-center gap-2">
                      {(isApplying || isDeploying)
                        ? <>{isApplying ? '💾 Enregistrement BDD...' : '🔌 Déploiement SSH...'}</>
                        : <>🚀 Appliquer &amp; Déployer sur le Switch</>
                      }
                    </button>

                    {/* ── RÉSULTAT ── */}
                    {deployResult && (
                      <div className={`p-4 rounded-xl border animate-in ${deployResult.success ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                        <div className="flex items-center gap-2 mb-2">
                          <span>{deployResult.success ? '✅' : '⚠️'}</span>
                          <p className={`text-xs font-bold uppercase tracking-wider ${deployResult.success ? 'text-emerald-700' : 'text-rose-700'}`}>
                            {deployResult.success ? 'BDD enregistrée + Switch déployé' : 'BDD OK — Déploiement SSH échoué'}
                          </p>
                        </div>
                        <p className={`text-[11px] font-medium ${deployResult.success ? 'text-emerald-600' : 'text-rose-600'}`}>
                          {deployResult.message || deployResult.error}
                        </p>
                        {deployResult.commands && deployResult.commands.length > 0 && (
                          <div className="mt-3 p-3 bg-slate-800 rounded-lg">
                            <p className="text-[9px] font-bold text-slate-400 uppercase mb-1">Commandes envoyées :</p>
                            <pre className="deploy-log text-emerald-400 whitespace-pre-wrap">{deployResult.commands.join('\n')}</pre>
                          </div>
                        )}
                      </div>
                    )}

                  </div>
                </div>
              </div>
            )}
          </div>

          {toast && (
            <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-xl shadow-2xl font-bold text-sm text-white z-50 animate-in ${toast.type === 'error' ? 'bg-rose-600' : 'bg-emerald-600'}`}>
              {toast.message}
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('interfaces-root'));
    root.render(<InterfacesPage />);
  </script>

  <script src="sidebar.js"></script>
  <script src="topbar.js"></script>
</body>
</html>
