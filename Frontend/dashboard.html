<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGuard - Network Security Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="auth.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="topbar.css" />
  <link rel="stylesheet" href="dark-mode.css" />
  <style>
    .stats-header-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-mini-card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 4px 6px -1px rgba(100, 108, 255, 0.15);
      transition: all 0.2s ease;
    }

    .stat-icon {
      width: 45px;
      height: 45px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-info {
      display: flex;
      flex-direction: column;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
    }

    .stat-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 4px;
      display: inline-block;
      font-weight: 600;
    }

    .management-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      margin-bottom: 25px;
    }

    .manage-section {
      background: white;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.2s ease;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 10px;
      margin-bottom: 5px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transition: background 0.2s ease;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
      gap: 12px;
    }

    .data-label {
      color: #64748b;
    }

    .data-value {
      font-weight: 500;
      color: #1e293b;
      text-align: right;
    }

    .btn-small {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-primary {
      background: #6366f1;
      color: white;
    }

    .btn-disabled {
      background: #cbd5e1;
      color: #475569;
      cursor: not-allowed;
    }

    .logs-section {
      background: white;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      margin-top: 5px;
    }

    .log-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 12px;
    }

    .log-row:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #94a3b8;
      font-family: 'DM Mono', monospace;
      min-width: 130px;
    }

    .log-msg {
      flex: 1;
      color: #334155;
      font-weight: 500;
    }

    .log-tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 10px;
      text-transform: uppercase;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .bg-blue { background: #eff6ff; color: #1d4ed8; }
    .bg-green { background: #f0fdf4; color: #166534; }
    .bg-red { background: #fef2f2; color: #991b1b; }
    .bg-amber { background: #fffbeb; color: #92400e; }
    .bg-purple { background: #faf5ff; color: #6b21a5; }

    @media (max-width: 1200px) {
      .stats-header-grid,
      .management-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 900px) {
      .stats-header-grid,
      .management-grid {
        grid-template-columns: 1fr;
      }

      .log-row {
        flex-direction: column;
      }
    }

    .topbar { animation: slideDown 0.4s ease; }
    .stats-header-grid { animation: fadeInUp 0.4s ease backwards; animation-delay: 0.1s; }
    .management-grid { animation: fadeInUp 0.4s ease backwards; animation-delay: 0.4s; }
    .logs-section { animation: fadeInUp 0.4s ease backwards; animation-delay: 0.5s; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="app-body">
  <div class="app-shell">
    <aside id="sidebar-root" class="sidebar-host" data-page="dashboard"></aside>

    <main class="main">
      <div id="topbar-root" data-title="Network Security Dashboard" data-subtitle="Vue d ensemble du reseau, des VLANs et des alertes." data-notifications="4"></div>

      <section class="content">
        <div id="root" class="page-block"></div>
      </section>
    </main>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icon = ({ type }) => {
      const icons = {
        vlan: <path d="M21 5H3a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1zM21 13H3a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1z" />,
        ports: <><circle cx="12" cy="12" r="3" /><path d="M2 12h3M19 12h3M12 2v3M12 19v3" /></>,
        alert: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></>,
        monitor: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
      };
      return (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {icons[type]}
        </svg>
      );
    };

    const auth = window.NetGuardAuth;
    const session = auth.getSession();
    auth.requirePageAccess('dashboard');

    const canAccess = (page) => auth.canAccessPage(page, session?.role);
    const getButtonClass = (active) => `btn-small ${active ? 'btn-primary' : 'btn-disabled'}`;

    const goTo = (page) => {
      const routes = {
        dashboard: 'dashboard.html',
        vlan: 'vlan.html',
        interfaces: 'interfaces.html',
        alerts: 'alerts.html',
        traffic: 'traffic.html',
        configuration: 'Configuration.html',
        users: 'users.html',
        logs: 'logs.html'
      };
      if (!canAccess(page)) return;
      window.location.href = routes[page] || routes.dashboard;
    };

    const renderActionButton = (page, label) => {
      const allowed = canAccess(page);
      return (
        <button
          type="button"
          onClick={() => allowed && goTo(page)}
          disabled={!allowed}
          className={getButtonClass(allowed)}
          style={!allowed ? { opacity: 0.45, cursor: 'not-allowed', pointerEvents: 'none' } : {}}
        >
          {label}
        </button>
      );
    };

    const API_BASE_URL = window.location.port === '5000' ? '' : 'http://127.0.0.1:5000';

    const analyzeTrafficStatus = (alerts) => {
      if (!alerts || alerts.length === 0) {
        return { status: 'Normal', color: '#22c55e', bg: 'bg-green' };
      }

      const oneDayAgo = new Date();
      oneDayAgo.setHours(oneDayAgo.getHours() - 24);

      const criticalAlertsLast24h = alerts.filter((alert) => {
        const alertDate = new Date(alert.timestamp);
        return alert.severity === 'critical' && alertDate > oneDayAgo;
      }).length;

      if (criticalAlertsLast24h === 0) {
        return { status: 'Normal', color: '#22c55e', bg: 'bg-green' };
      }
      if (criticalAlertsLast24h <= 5) {
        return { status: 'Attention', color: '#f59e0b', bg: 'bg-amber' };
      }
      return { status: 'Critique', color: '#ef4444', bg: 'bg-red' };
    };

    function Dashboard() {
      const [stats, setStats] = useState({
        total: 0,
        critical: 0,
        medium: 0,
        low: 0,
        unique_sources: 0,
        rate_per_minute: 0
      });
      const [recentAlerts, setRecentAlerts] = useState([]);
      const [rulesCount, setRulesCount] = useState(0);
      const [vlanStats, setVlanStats] = useState({ count: 0, lastCreated: null, quarantine: null });
      const [interfaceStats, setInterfaceStats] = useState({ 
        total: 0, up: 0, down: 0, trunk: 0, access: 0, uplink: 0, securePorts: 0, hasAlert: false 
      });
      const [loading, setLoading] = useState(true);
      const [trafficStatus, setTrafficStatus] = useState({ status: 'Normal', color: '#22c55e', bg: 'bg-green' });
      const [lastTriggeredRule, setLastTriggeredRule] = useState(null);
      const [userActivities, setUserActivities] = useState([]);

      const loadStats = async () => {
        try {
          const response = await fetch(`${API_BASE_URL}/api/stats`);
          const data = await response.json();
          if (data.success && data.stats) {
            setStats(data.stats);
          }
        } catch (error) {
          console.error('Erreur chargement stats:', error);
        }
      };

      const loadRecentAlerts = async () => {
        try {
          const response = await fetch(`${API_BASE_URL}/api/alerts?limit=5&sort=newest`);
          const data = await response.json();
          if (data.success && data.alerts) {
            setRecentAlerts(data.alerts.slice(0, 5));
          }
        } catch (error) {
          console.error('Erreur chargement alertes:', error);
        }
      };

      const loadAllAlerts = async () => {
        try {
          const response = await fetch(`${API_BASE_URL}/api/alerts?limit=200&sort=newest`);
          const data = await response.json();
          if (data.success && data.alerts) {
            setTrafficStatus(analyzeTrafficStatus(data.alerts));
          }
        } catch (error) {
          console.error('Erreur chargement toutes alertes:', error);
        }
      };

      const loadRulesCount = async () => {
        try {
          const response = await fetch(`${API_BASE_URL}/api/regles`);
          const data = await response.json();
          if (data.success) {
            setRulesCount(data.count || 0);
          }
        } catch (error) {
          console.error('Erreur chargement regles:', error);
        }
      };

      const loadVlans = async () => {
        try {
          const response = await fetch(`${API_BASE_URL}/api/vlan`, {
            headers: auth.getAuthHeaders()
          });
          const data = await response.json();
          if (response.ok && data.success) {
            const items = (data.vlans || []).slice().sort((a, b) => Number(b.id_vlan ?? b.id) - Number(a.id_vlan ?? a.id));
            setVlanStats({
              count: data.count || items.length,
              lastCreated: items[0] || null,
              quarantine: items.find((item) => String(item.status).toLowerCase() === 'alert') || null
            });
          }
        } catch (error) {
          console.error('Erreur chargement VLANs:', error);
        }
      };

      const loadInterfaces = async () => {
        try {
          const response = await fetch(`${API_BASE_URL}/api/interface`, {
            headers: auth.getAuthHeaders()
          });
          const data = await response.json();
          if (response.ok && data.success) {
            const items = data.interfaces || [];
            const up = items.filter((item) => String(item.status).toUpperCase() === 'UP').length;
            const down = items.filter((item) => String(item.status).toUpperCase() !== 'UP').length;
            const trunk = items.filter((item) => String(item.mode).toLowerCase() === 'trunk').length;
            const access = items.filter((item) => String(item.mode).toLowerCase() === 'access').length;
            const uplink = items.filter((item) => String(item.type).toLowerCase() === 'uplink').length;
            const securePorts = items.filter((item) => Boolean(item.port_security) === true).length;
            const hasAlert = items.some((item) => Boolean(item.port_security) === false && String(item.status).toUpperCase() === 'UP');
            setInterfaceStats({ total: items.length, up, down, trunk, access, uplink, securePorts, hasAlert });
          }
        } catch (error) {
          console.error('Erreur chargement interfaces:', error);
        }
      };

      const loadLastTriggeredRule = async () => {
        try {
          const response = await fetch(`${API_BASE_URL}/api/last-triggered-rule`);
          const data = await response.json();
          if (data.success && data.has_alert && data.rule) {
            setLastTriggeredRule(data.rule);
          } else {
            setLastTriggeredRule(null);
          }
        } catch (error) {
          console.error('Erreur chargement derniere regle:', error);
          setLastTriggeredRule(null);
        }
      };

      const loadUserActivities = async () => {
        try {
          const token = localStorage.getItem('jwtToken');
          const response = await fetch(`${API_BASE_URL}/api/users/activity`, {
            headers: {
              'Authorization': token ? `Bearer ${token}` : '',
              'Content-Type': 'application/json'
            }
          });
          const data = await response.json();
          if (data.success && data.logs) {
            setUserActivities(data.logs);
          }
        } catch (error) {
          console.error('Erreur chargement activites:', error);
        }
      };

      const formatDateTime = (timestamp) => {
        if (!timestamp) return '--/--/---- --:--';
        const date = new Date(timestamp);
        return date.toLocaleDateString('fr-FR', {
          day: '2-digit',
          month: 'short',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        }).replace('.', '');
      };

      const loadAllData = async () => {
        setLoading(true);
        await Promise.all([
          loadStats(),
          loadRecentAlerts(),
          loadRulesCount(),
          loadVlans(),
          loadInterfaces(),
          loadAllAlerts(),
          loadLastTriggeredRule(),
          loadUserActivities()
        ]);
        setLoading(false);
      };

      useEffect(() => {
        loadAllData();

        const refreshData = () => {
          loadVlans();
          loadInterfaces();
        };

        const handleStorage = (event) => {
          if (event.key === 'netguard-vlan-updated-at') {
            loadVlans();
          }
        };

        window.addEventListener('storage', handleStorage);
        window.addEventListener('focus', refreshData);
        window.addEventListener('netguard:vlan-updated', loadVlans);
        window.addEventListener('netguard:interface-updated', loadInterfaces);

        const intervalId = window.setInterval(refreshData, 30000);

        return () => {
          window.removeEventListener('storage', handleStorage);
          window.removeEventListener('focus', refreshData);
          window.removeEventListener('netguard:vlan-updated', loadVlans);
          window.removeEventListener('netguard:interface-updated', loadInterfaces);
          window.clearInterval(intervalId);
        };
      }, []);

      const getSeverityClass = (severity) => {
        switch (severity) {
          case 'critical': return 'bg-red';
          case 'medium': return 'bg-amber';
          default: return 'bg-blue';
        }
      };

      const getSeverityLabel = (severity) => {
        switch (severity) {
          case 'critical': return 'Critique';
          case 'medium': return 'Moyen';
          default: return 'Faible';
        }
      };

      if (loading) {
        return (
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '400px' }}>
            <div className="loading-spinner"></div>
            <span style={{ marginLeft: '10px' }}>Chargement du tableau de bord...</span>
          </div>
        );
      }

      return (
        <>
          <div className="stats-header-grid">
            <div className="stat-mini-card">
              <div className="stat-icon bg-blue"><Icon type="vlan" /></div>
              <div className="stat-info">
                <span className="stat-value">{vlanStats.count}</span>
                <span className="stat-label">Total VLANs</span>
                <span className="stat-badge bg-green">Base reseau</span>
              </div>
            </div>
            <div className="stat-mini-card">
              <div className="stat-icon bg-green"><Icon type="ports" /></div>
              <div className="stat-info">
                <span className="stat-value">{interfaceStats.up}</span>
                <span className="stat-label">Ports UP</span>
                <span className="stat-badge bg-blue">{interfaceStats.down} down</span>
              </div>
            </div>
            <div className="stat-mini-card">
              <div className="stat-icon bg-red"><Icon type="alert" /></div>
              <div className="stat-info">
                <span className="stat-value" style={{ color: '#ef4444' }}>{stats.critical || 0}</span>
                <span className="stat-label">Alertes critiques</span>
                <span className="stat-badge bg-red">{stats.rate_per_minute || 0}/min</span>
              </div>
            </div>
            <div className="stat-mini-card">
              <div className="stat-icon bg-amber"><Icon type="monitor" /></div>
              <div className="stat-info">
                <span className="stat-value">{stats.total || 0}</span>
                <span className="stat-label">Total alertes</span>
                <span className="stat-badge bg-amber">Historique</span>
              </div>
            </div>
          </div>

          <div className="management-grid">
            <div className="manage-section">
              <div className="section-header">
                <span className="section-title">VLAN Management</span>
                <div className="status-indicator" style={{ background: '#22c55e' }}></div>
              </div>
              <div className="data-row"><span className="data-label">Total VLANs</span><span className="data-value" style={{ color: '#6366f1' }}>{vlanStats.count} configured</span></div>
              <div className="data-row">
                <span className="data-label">Last created</span>
                <span className="data-value">{vlanStats.lastCreated ? `VLAN ${vlanStats.lastCreated.id_vlan ?? vlanStats.lastCreated.id} - ${vlanStats.lastCreated.nom ?? vlanStats.lastCreated.name}` : 'Aucun VLAN'}</span>
              </div>
              <div className="data-row">
                <span className="data-label">Quarantine VLAN</span>
                <span className="data-value" style={{ color: '#f59e0b' }}>{vlanStats.quarantine ? `VLAN ${vlanStats.quarantine.id_vlan ?? vlanStats.quarantine.id} ${vlanStats.quarantine.status}` : 'Aucune isolation active'}</span>
              </div>
              <div className="data-row">
                <span className="data-label">Réseau</span>
                <span className="data-value">{vlanStats.lastCreated ? (vlanStats.lastCreated.reseau ?? vlanStats.lastCreated.vlanIp ?? '--') : '--'}</span>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '10px', marginTop: '5px' }}>
                {renderActionButton('vlan', 'View VLANs')}
                {renderActionButton('interfaces', 'View Interfaces')}
              </div>
            </div>

            <div className="manage-section">
              <div className="section-header">
                <span className="section-title">Interfaces</span>
                <div className="status-indicator" style={{ background: interfaceStats.hasAlert ? '#f59e0b' : '#22c55e' }}></div>
              </div>
              <div className="data-row">
                <span className="data-label">Total interfaces</span>
                <span className="data-value" style={{ color: '#6366f1' }}>{interfaceStats.total}</span>
              </div>
              <div className="data-row">
                <span className="data-label">Ports UP</span>
                <span className="data-value" style={{ color: '#22c55e' }}>{interfaceStats.up}</span>
              </div>
              <div className="data-row">
                <span className="data-label">Ports DOWN</span>
                <span className="data-value">{interfaceStats.down}</span>
              </div>
              <div className="data-row">
                <span className="data-label">Mode Trunk</span>
                <span className="data-value" style={{ color: '#8b5cf6' }}>{interfaceStats.trunk}</span>
              </div>
              <div className="data-row">
                <span className="data-label">Mode Access</span>
                <span className="data-value" style={{ color: '#3b82f6' }}>{interfaceStats.access}</span>
              </div>
              <div className="data-row">
                <span className="data-label">Ports physiques</span>
                <div className="data-value" style={{ display: 'flex', gap: '8px', justifyContent: 'flex-end' }}>
                  <span style={{ color: '#0891b2' }}>🔌 {interfaceStats.total - interfaceStats.uplink}</span>
                  <span style={{ color: '#d97706' }}>🔗 {interfaceStats.uplink}</span>
                </div>
              </div>
              <div className="data-row">
                <span className="data-label">Port security active</span>
                <span className="data-value" style={{ color: interfaceStats.securePorts > 0 ? '#22c55e' : '#94a3b8' }}>{interfaceStats.securePorts}</span>
              </div>
              <div style={{ marginTop: '5px' }}>
                {renderActionButton('interfaces', 'View Interfaces')}
              </div>
            </div>

            <div className="manage-section">
              <div className="section-header">
                <span className="section-title">Network Monitoring</span>
                <div className="status-indicator" style={{ background: trafficStatus.color }}></div>
              </div>
              <div className="data-row">
                <span className="data-label">Traffic status</span>
                <span className="data-value" style={{ color: trafficStatus.color, fontWeight: 'bold' }}>
                  {trafficStatus.status}
                </span>
              </div>
              <div className="data-row">
                <span className="data-label">Interface errors</span>
                <span className="data-value">{interfaceStats.down}</span>
              </div>
              <div className="data-row">
                <span className="data-label">Bandwidth use</span>
                <span className="data-value">12% avg</span>
              </div>
              <div style={{ marginTop: '5px' }}>
                {renderActionButton('traffic', 'View Details')}
              </div>
            </div>

            <div className="manage-section">
              <div className="section-header">
                <span className="section-title">Security Alerts (Snort)</span>
                <div className="status-indicator" style={{ background: stats.critical > 0 ? '#ef4444' : '#22c55e' }}></div>
              </div>
              <div className="data-row"><span className="data-label">Alerts total</span><span className="data-value" style={{ color: stats.critical > 0 ? '#ef4444' : '#6366f1' }}>{stats.total || 0}</span></div>
              <div className="data-row"><span className="data-label">Critiques</span><span className="data-value" style={{ color: '#ef4444' }}>{stats.critical || 0}</span></div>
              <div className="data-row"><span className="data-label">Moyennes/Faibles</span><span className="data-value">{(stats.medium || 0) + (stats.low || 0)}</span></div>
              <div style={{ marginTop: '5px' }}>
                {renderActionButton('alerts', 'View Alerts')}
              </div>
            </div>

            <div className="manage-section">
              <div className="section-header">
                <span className="section-title">Automation</span>
                <div className="status-indicator" style={{ background: '#3b82f6' }}></div>
              </div>
              <div className="data-row">
                <span className="data-label">Auto-isolate threats</span>
                <span className="data-value">ON</span>
              </div>
              <div className="data-row">
                <span className="data-label">Active rules</span>
                <span className="data-value" style={{ color: '#6366f1' }}>{rulesCount} rules</span>
              </div>
              <div className="data-row">
                <span className="data-label">Last triggered</span>
                <span className="data-value" style={{ fontSize: '13px', textAlign: 'right', maxWidth: '180px' }}>
                  {lastTriggeredRule ? (
                    <div style={{ textAlign: 'right' }}>
                      <strong style={{ color: '#ef4444' }}>{lastTriggeredRule.name}</strong>
                      <br />
                      <span style={{ fontSize: '12px', color: '#64748b' }}>Action: {lastTriggeredRule.action}</span>
                      <br />
                      <span style={{ fontSize: '12px', color: '#94a3b8' }}>{lastTriggeredRule.description}</span>
                    </div>
                  ) : (
                    <span style={{ color: '#94a3b8' }}>Aucune alerte</span>
                  )}
                </span>
              </div>
              <div style={{ marginTop: '5px' }}>
                {renderActionButton('configuration', 'Configure Rules')}
              </div>
            </div>

            <div className="manage-section">
              <div className="section-header">
                <span className="section-title">System Status</span>
                <div className="status-indicator" style={{ background: '#22c55e' }}></div>
              </div>
              <div className="data-row"><span className="data-label">Interfaces tracked</span><span className="data-value">{interfaceStats.total}</span></div>
              <div className="data-row"><span className="data-label">Uplink ports</span><span className="data-value" style={{ color: '#d97706' }}>{interfaceStats.uplink}</span></div>
              <div className="data-row"><span className="data-label">Access ports</span><span className="data-value" style={{ color: '#0891b2' }}>{interfaceStats.total - interfaceStats.uplink}</span></div>
              <div className="data-row"><span className="data-label">Config backup</span><span className="data-value" style={{ color: '#22c55e' }}>Up to date</span></div>
              <div style={{ marginTop: '5px', display: 'flex', flexWrap: 'wrap', gap: '10px' }}>
                {renderActionButton('users', 'Manage Users')}
                {renderActionButton('logs', 'Open Audit Logs')}
              </div>
            </div>
          </div>

          <div className="logs-section">
            <div className="section-header">
              <span className="section-title">Logs Recents</span>
            </div>

            <div style={{ marginBottom: '8px', marginTop: '4px' }}>
              <span style={{ fontSize: '11px', fontWeight: '600', color: '#6366f1', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                Activites utilisateur ({userActivities.length})
              </span>
            </div>

            {userActivities.length > 0 ? (
              userActivities.map((activity, index) => (
                <div className="log-row" key={`user-${index}`}>
                  <span className="log-time">{formatDateTime(activity.timestamp)}</span>
                  <span className="log-msg">
                    <strong>{activity.username}</strong> - {activity.action === 'login' ? 'connexion' : 'deconnexion'}
                  </span>
                  <span className={`log-tag ${activity.action === 'login' ? 'bg-green' : 'bg-red'}`}>
                    {activity.action === 'login' ? 'Connexion' : 'Deconnexion'}
                  </span>
                </div>
              ))
            ) : (
              <div className="log-row">
                <span className="log-time">--/--/---- --:--</span>
                <span className="log-msg">Aucune activite utilisateur recente</span>
                <span className="log-tag bg-blue">Inactif</span>
              </div>
            )}

            <div style={{ margin: '12px 0 8px 0', height: '1px', background: 'linear-gradient(90deg, transparent, var(--border), transparent)' }}></div>

            <div style={{ marginBottom: '8px' }}>
              <span style={{ fontSize: '11px', fontWeight: '600', color: '#ef4444', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                Alertes recentes ({recentAlerts.length})
              </span>
            </div>

            {recentAlerts.length > 0 ? (
              recentAlerts.map((alert, index) => (
                <div className="log-row" key={`alert-${index}`}>
                  <span className="log-time">{formatDateTime(alert.timestamp)}</span>
                  <span className="log-msg">
                    <strong>{alert.name}</strong> - {alert.src} -> {alert.dst}
                  </span>
                  <span className={`log-tag ${getSeverityClass(alert.severity)}`}>
                    {getSeverityLabel(alert.severity)}
                  </span>
                </div>
              ))
            ) : (
              <div className="log-row">
                <span className="log-time">--/--/---- --:--</span>
                <span className="log-msg">Aucune alerte recente</span>
                <span className="log-tag bg-blue">Inactif</span>
              </div>
            )}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
  <script src="sidebar.js"></script>
  <script src="topbar.js"></script>
</body>
</html>
