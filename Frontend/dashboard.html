<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGuard - Network Security Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="auth.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="topbar.css" />
  <link rel="stylesheet" href="dark-mode.css" />
  <style>
    .stats-header-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-mini-card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 4px 6px -1px rgba(100, 108, 255, 0.15);
    }

    .stat-icon {
      width: 45px;
      height: 45px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-info {
      display: flex;
      flex-direction: column;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
    }

    .stat-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 4px;
      display: inline-block;
      font-weight: 600;
    }

    .management-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      margin-bottom: 25px;
    }

    .manage-section {
      background: white;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 10px;
      margin-bottom: 5px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
      gap: 12px;
    }

    .data-label {
      color: #64748b;
    }

    .data-value {
      font-weight: 500;
      color: #1e293b;
      text-align: right;
    }

    .action-link {
      font-size: 12px;
      color: #6366f1;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      margin-top: 5px;
      display: block;
    }

    .btn-small {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-primary {
      background: #6366f1;
      color: white;
    }

    .btn-disabled {
      background: #cbd5e1;
      color: #475569;
      cursor: not-allowed;
    }

    .logs-section {
      background: white;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      margin-top: 5px;
    }

    .log-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 12px;
    }

    .log-row:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #94a3b8;
      font-family: 'DM Mono', monospace;
      min-width: 80px;
    }

    .log-msg {
      flex: 1;
      color: #334155;
      font-weight: 500;
    }

    .log-tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 10px;
      text-transform: uppercase;
    }

    .bg-blue {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .bg-green {
      background: #f0fdf4;
      color: #166534;
    }

    .bg-red {
      background: #fef2f2;
      color: #991b1b;
    }

    .bg-amber {
      background: #fffbeb;
      color: #92400e;
    }

    @media (max-width: 1200px) {
      .stats-header-grid,
      .management-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 900px) {
      .stats-header-grid,
      .management-grid {
        grid-template-columns: 1fr;
      }

      .log-row {
        flex-direction: column;
      }
    }

    .topbar {
      animation: slideDown 0.4s ease;
    }

    .stats-header-grid {
      animation: fadeInUp 0.4s ease backwards;
      animation-delay: 0.1s;
    }

    .stat-mini-card {
      animation: fadeInUp 0.4s ease backwards;
    }

    .stat-mini-card:nth-child(1) { animation-delay: 0.2s; }
    .stat-mini-card:nth-child(2) { animation-delay: 0.25s; }
    .stat-mini-card:nth-child(3) { animation-delay: 0.3s; }
    .stat-mini-card:nth-child(4) { animation-delay: 0.35s; }

    .management-grid {
      animation: fadeInUp 0.4s ease backwards;
      animation-delay: 0.4s;
    }

    .manage-section {
      animation: fadeInUp 0.4s ease backwards;
    }

    .manage-section:nth-child(1) { animation-delay: 0.5s; }
    .manage-section:nth-child(2) { animation-delay: 0.55s; }
    .manage-section:nth-child(3) { animation-delay: 0.6s; }
    .manage-section:nth-child(4) { animation-delay: 0.65s; }
    .manage-section:nth-child(5) { animation-delay: 0.7s; }
    .manage-section:nth-child(6) { animation-delay: 0.75s; }

    .logs-section {
      animation: fadeInUp 0.4s ease backwards;
      animation-delay: 0.8s;
    }

    .log-row {
      animation: rowSlideIn 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) both;
    }

    .log-row:nth-child(1) { animation-delay: 0.9s; }
    .log-row:nth-child(2) { animation-delay: 0.95s; }
    .log-row:nth-child(3) { animation-delay: 1.0s; }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rowSlideIn {
      from {
        opacity: 0;
        transform: translateX(-12px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>
</head>
<body class="app-body">
  <div class="app-shell">
    <aside id="sidebar-root" class="sidebar-host" data-page="dashboard"></aside>

    <main class="main">
      <div id="topbar-root" data-title="Network Security Dashboard" data-subtitle="Vue d ensemble du reseau, des VLANs et des alertes." data-notifications="4"></div>

      <section class="content">
        <div id="root" class="page-block"></div>
      </section>
    </main>
  </div>

  <script type="text/babel">
    const Icon = ({ type }) => {
      const icons = {
        vlan: <path d="M21 5H3a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1zM21 13H3a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1z" />,
        ports: <><circle cx="12" cy="12" r="3" /><path d="M2 12h3M19 12h3M12 2v3M12 19v3" /></>,
        alert: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></>,
        monitor: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
      };

      return (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {icons[type]}
        </svg>
      );
    };

    const auth = window.NetGuardAuth;
    const session = auth.getSession();

    auth.requirePageAccess('dashboard');

    const canAccess = (page) => auth.canAccessPage(page, session?.role);
    const getButtonClass = (active) => `btn-small ${active ? 'btn-primary' : 'btn-disabled'}`;

    const goTo = (page) => {
      const routes = {
        dashboard: 'dashboard.html',
        vlan: 'vlan.html',
        interfaces: 'interfaces.html',
        alerts: 'snort_alerts_dashboard.html',
        traffic: 'nettraffic-analyzer.html',
        configuration: 'Configuration.html',
        users: 'users.html',
        logs: 'logs.html'
      };

      if (!canAccess(page)) {
        return;
      }

      window.location.href = routes[page] || routes.dashboard;
    };

    const renderActionButton = (page, label) => {
      const allowed = canAccess(page);

      return (
        <button
          type="button"
          onClick={() => allowed && goTo(page)}
          disabled={!allowed}
          className={getButtonClass(allowed)}
          style={!allowed ? { opacity: 0.45, cursor: 'not-allowed', pointerEvents: 'none' } : {}}
        >
          {label}
        </button>
      );
    };

    const Dashboard = () => (
      <>
        <div className="stats-header-grid">
          <div className="stat-mini-card">
            <div className="stat-icon bg-blue"><Icon type="vlan" /></div>
            <div className="stat-info">
              <span className="stat-value">3</span>
              <span className="stat-label">Total VLANs</span>
              <span className="stat-badge bg-green">All configured</span>
            </div>
          </div>
          <div className="stat-mini-card">
            <div className="stat-icon bg-green"><Icon type="ports" /></div>
            <div className="stat-info">
              <span className="stat-value">4/24</span>
              <span className="stat-label">Active Ports</span>
              <span className="stat-badge bg-blue">20 available</span>
            </div>
          </div>
          <div className="stat-mini-card">
            <div className="stat-icon bg-red" style={{ background: '#fee2e2' }}><Icon type="alert" /></div>
            <div className="stat-info">
              <span className="stat-value" style={{ color: '#ef4444' }}>2</span>
              <span className="stat-label">Snort Alerts</span>
              <span className="stat-badge bg-red">Needs review</span>
            </div>
          </div>
          <div className="stat-mini-card">
            <div className="stat-icon bg-amber"><Icon type="monitor" /></div>
            <div className="stat-info">
              <span className="stat-value">1</span>
              <span className="stat-label">{canAccess('configuration') ? 'Isolated Devices' : 'Protected Assets'}</span>
              <span className="stat-badge bg-amber">{canAccess('configuration') ? 'VLAN 99' : 'Role scoped'}</span>
            </div>
          </div>
        </div>

        <div className="management-grid">
          <div className="manage-section">
            <div className="section-header">
              <span className="section-title">VLAN Management</span>
              <div className="status-indicator" style={{ background: '#22c55e' }}></div>
            </div>
            <div className="data-row"><span className="data-label">Total VLANs</span><span className="data-value" style={{ color: '#6366f1' }}>3 configured</span></div>
            <div className="data-row"><span className="data-label">Last created</span><span className="data-value">VLAN 20 - Staff</span></div>
            <div className="data-row"><span className="data-label">Quarantine VLAN</span><span className="data-value" style={{ color: '#f59e0b' }}>VLAN 99 active</span></div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '10px', marginTop: '5px' }}>
              {renderActionButton('vlan', 'View VLANs')}
              {renderActionButton('interfaces', 'View Interfaces')}
            </div>
          </div>

          <div className="manage-section">
            <div className="section-header">
              <span className="section-title">Interfaces</span>
              <div className="status-indicator" style={{ background: '#22c55e' }}></div>
            </div>
            <div className="data-row"><span className="data-label">Ports UP</span><span className="data-value" style={{ color: '#22c55e' }}>4 active</span></div>
            <div className="data-row"><span className="data-label">Ports DOWN</span><span className="data-value">20 idle</span></div>
            <div className="data-row"><span className="data-label">Trunk links</span><span className="data-value" style={{ color: '#6366f1' }}>2 configured</span></div>
            <div style={{ marginTop: '5px' }}>
              {renderActionButton('interfaces', 'View Interfaces')}
            </div>
          </div>

          <div className="manage-section">
            <div className="section-header">
              <span className="section-title">Network Monitoring</span>
              <div className="status-indicator" style={{ background: '#22c55e' }}></div>
            </div>
            <div className="data-row"><span className="data-label">Traffic status</span><span className="data-value" style={{ color: '#22c55e' }}>Normal</span></div>
            <div className="data-row"><span className="data-label">Interface errors</span><span className="data-value">0 detected</span></div>
            <div className="data-row"><span className="data-label">Bandwidth use</span><span className="data-value">12% avg</span></div>
            <div style={{ marginTop: '5px' }}>
              {renderActionButton('traffic', 'View Details')}
            </div>
          </div>

          <div className="manage-section">
            <div className="section-header">
              <span className="section-title">Security Alerts (Snort)</span>
              <div className="status-indicator" style={{ background: '#ef4444' }}></div>
            </div>
            <div className="data-row"><span className="data-label">Alerts today</span><span className="data-value" style={{ color: '#ef4444' }}>2 triggered</span></div>
            <div className="data-row"><span className="data-label">Last attack type</span><span className="data-value" style={{ color: '#ef4444' }}>Port Scan</span></div>
            <div className="data-row"><span className="data-label">Source IP</span><span className="data-value" style={{ fontFamily: 'monospace' }}>192.168.1.10</span></div>
            <div style={{ marginTop: '5px' }}>
              {renderActionButton('alerts', 'View Alerts')}
            </div>
          </div>

          <div className="manage-section">
            <div className="section-header">
              <span className="section-title">Automation</span>
              <div className="status-indicator" style={{ background: '#3b82f6' }}></div>
            </div>
            <div className="data-row"><span className="data-label">Auto-isolate threats</span><span className="data-value">ON</span></div>
            <div className="data-row"><span className="data-label">Active rules</span><span className="data-value" style={{ color: '#6366f1' }}>4 rules</span></div>
            <div className="data-row"><span className="data-label">Last triggered</span><span className="data-value">fa0/3 - VLAN 99</span></div>
            <div style={{ marginTop: '5px' }}>
              {renderActionButton('configuration', 'Configure Rules')}
            </div>
          </div>

          <div className="manage-section">
            <div className="section-header">
              <span className="section-title">System Status</span>
              <div className="status-indicator" style={{ background: '#22c55e' }}></div>
            </div>
            <div className="data-row"><span className="data-label">Switch uptime</span><span className="data-value">14d 6h</span></div>
            <div className="data-row"><span className="data-label">CPU load</span><span className="data-value">8%</span></div>
            <div className="data-row"><span className="data-label">Config backup</span><span className="data-value" style={{ color: '#22c55e' }}>Up to date</span></div>
            <div style={{ marginTop: '5px', display: 'flex', flexWrap: 'wrap', gap: '10px' }}>
              {renderActionButton('users', 'Manage Users')}
              {renderActionButton('logs', 'Open Audit Logs')}
            </div>
          </div>
        </div>

        <div className="logs-section">
          <div className="section-header"><span className="section-title">{canAccess('logs') ? 'Recent Audit Logs' : 'Recent Activity Logs'}</span></div>
          <div className="log-row">
            <span className="log-time">11:05:34</span>
            <span className="log-msg">User Admin updated VLAN 20 (Staff) configuration</span>
            <span className="log-tag bg-blue">Config</span>
          </div>
          <div className="log-row">
            <span className="log-time">10:42:12</span>
            <span className="log-msg">Security: Port Scan detected from 192.168.1.10</span>
            <span className="log-tag bg-red">Alert</span>
          </div>
          <div className="log-row">
            <span className="log-time">09:15:00</span>
            <span className="log-msg">Automation: Port fa0/3 automatically moved to VLAN 99</span>
            <span className="log-tag bg-amber">Auto</span>
          </div>
        </div>
      </>
    );

    function App() {
      return <Dashboard />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="sidebar.js"></script>
  <script src="topbar.js"></script>
</body>
</html>
