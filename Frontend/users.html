<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGuard - User Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="auth.js"></script>
  <!-- ✅ Bibliothèque audit localStorage -->
  <script src="netguard-audit.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="topbar.css" />
  <link rel="stylesheet" href="dark-mode.css" />
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .topbar { animation: slideDown 0.4s ease; }
    .animate-in { animation: fadeInUp 0.4s ease backwards; animation-delay: 0.1s; }
    .table-row { animation: rowSlideIn 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) both; }
    
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes rowSlideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .modal-enter { animation: fadeInScale 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen app-body">
  <div class="app-shell">
    <aside id="sidebar-root" class="sidebar-host" data-page="users"></aside>

    <main class="main relative">
      <div id="topbar-root" data-title="User Management" data-subtitle="Gérez les accès, les rôles et les permissions." data-notifications="3"></div>

      <section class="content custom-scroll relative">
        <div id="users-root" class="page-block min-h-full flex flex-col"></div>
      </section>
    </main>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ✅ Validation mot de passe fort (même règles que le backend)
    const validatePassword = (password) => {
      const rules = [
        { id: 'length',   label: '8 caractères minimum',     ok: password.length >= 8 },
        { id: 'upper',    label: 'Une majuscule (A-Z)',       ok: /[A-Z]/.test(password) },
        { id: 'digit',    label: 'Un chiffre (0-9)',          ok: /[0-9]/.test(password) },
        { id: 'special',  label: 'Un caractère spécial (!@#$…)', ok: /[!@#$%^&*(),.?":{}|<>_\-+=\[\]\/\\]/.test(password) },
      ];
      return rules;
    };

    // ✅ Composant checklist toujours visible sous le champ
    const PasswordStrengthIndicator = ({ password }) => {
      const rules = validatePassword(password);
      return (
        <ul className="mt-2 space-y-1">
          {rules.map(rule => (
            <li key={rule.id} className={`flex items-center gap-1.5 text-xs font-medium transition-colors ${rule.ok ? 'text-emerald-600' : 'text-slate-400'}`}>
              <span>{rule.ok ? '✅' : '○'}</span>
              {rule.label}
            </li>
          ))}
        </ul>
      );
    };

    const UsersPage = () => {
      const [users, setUsers] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [toast, setToast] = useState(null);
      const [loading, setLoading] = useState(true);
      const [currentUser, setCurrentUser] = useState(null);
      const [sessionChecked, setSessionChecked] = useState(false);

      const [isFormModalOpen, setIsFormModalOpen] = useState(false);
      const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
      const [editingUser, setEditingUser] = useState(null);
      const [targetUser, setTargetUser] = useState(null);

      // ✅ État du mot de passe pour la validation en temps réel
      const [passwordValue, setPasswordValue] = useState('');

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const fetchUsers = async () => {
        setLoading(true);
        try {
          const response = await fetch('http://127.0.0.1:5000/users', { 
            headers: window.NetGuardAuth.getAuthHeaders() 
          });
          if (response.ok) {
            const data = await response.json();
            const list = Array.isArray(data) ? data : (data.users || []);
            setUsers(list.map(u => ({
              ...u, 
              status: "Active",
              lastLogin:  u.last_login  ? new Date(u.last_login).toLocaleString('fr-FR')  : 'Jamais',
              lastLogout: u.last_logout ? new Date(u.last_logout).toLocaleString('fr-FR') : 'Jamais'
            })));
          } else if (response.status === 401) {
            window.NetGuardAuth.clearSession();
            showToast('Session expirée. Redirection...', 'error');
            setTimeout(() => window.location.replace('login.html'), 2000);
          } else {
            const err = await response.json().catch(() => ({}));
            showToast(`Erreur ${response.status}: ${err.error || 'Chargement impossible'}`, 'error');
          }
        } catch (error) {
          showToast(`Erreur réseau: ${error.message}`, 'error');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        const session = window.NetGuardAuth.getSession();
        if (session) {
          setCurrentUser({ id: session.username, username: session.username, role: session.role });
        }
        setSessionChecked(true);
      }, []);

      useEffect(() => {
        if (!sessionChecked) return;
        if (currentUser && currentUser.role === window.NetGuardAuth.ROLES.ADMIN) {
          fetchUsers();
        } else {
          setLoading(false);
        }
      }, [sessionChecked, currentUser]);

      // ✅ Réinitialiser le mot de passe à l'ouverture/fermeture du modal
      const openCreateModal = () => {
        setEditingUser(null);
        setPasswordValue('');
        setIsFormModalOpen(true);
      };

      const closeFormModal = () => {
        setIsFormModalOpen(false);
        setPasswordValue('');
      };

      if (!currentUser || currentUser.role !== window.NetGuardAuth.ROLES.ADMIN) {
        return (
          <div className="flex-1 flex items-center justify-center animate-in">
            <div className="panel-card bg-white p-10 rounded-[2rem] shadow-xl text-center max-w-md border border-slate-200">
              <div className="w-20 h-20 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <span className="text-4xl">⛔</span>
              </div>
              <h2 className="text-2xl font-bold text-slate-800 mb-2">Accès Refusé</h2>
              <p className="text-slate-500 mb-8">Les privilèges Administrateur sont requis pour accéder à la gestion des utilisateurs.</p>
              <button 
                onClick={() => window.location.href = window.NetGuardAuth.getDefaultPage(currentUser?.role)}
                className="w-full py-3 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-900 transition-colors"
              >
                Retour au Dashboard
              </button>
            </div>
          </div>
        );
      }

      const getRoleBadge = (role) => {
        const styles = {
          'ADMIN':          'bg-rose-100 text-rose-700 border-rose-200',
          'NETWORK_ADMIN':  'bg-blue-100 text-blue-700 border-blue-200',
          'SECURITY_ADMIN': 'bg-orange-100 text-orange-700 border-orange-200',
          'AUDITOR':        'bg-slate-100 text-slate-600 border-slate-200'
        };
        return (
          <span className={`px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border ${styles[role] || styles['AUDITOR']}`}>
            {role}
          </span>
        );
      };

      const getStatusBadge = (status) => (
        <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-bold ${status === 'Active' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-500'}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${status === 'Active' ? 'bg-emerald-500' : 'bg-slate-400'}`}></span>
          {status}
        </span>
      );

      const filteredUsers = users.filter(u => 
        u.username.toLowerCase().includes(searchQuery.toLowerCase()) || 
        u.email.toLowerCase().includes(searchQuery.toLowerCase())
      );

      // ✅ Vérifier si le mot de passe est valide avant de soumettre
      const isPasswordValid = (pwd) => validatePassword(pwd).every(r => r.ok);

      if (loading) {
        return (
          <div className="flex-1 flex items-center justify-center">
            <div className="text-center">
              <div className="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-500">Chargement des utilisateurs...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="p-2 md:p-4 max-w-[1400px] mx-auto animate-in w-full">
          <div className="flex flex-col md:flex-row md:justify-between md:items-end mb-8 gap-4">
            <div>
              <h1 className="page-title text-3xl font-bold text-slate-800 tracking-tight">Utilisateurs</h1>
              <p className="text-slate-500 mt-1">Gérez les accès de l'équipe SOC &amp; NOC.</p>
            </div>
            <div className="flex flex-wrap gap-3 items-center">
              <div className="relative">
                <span className="absolute inset-y-0 left-3 flex items-center text-slate-400">🔍</span>
                <input 
                  type="text" 
                  placeholder="Rechercher..." 
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="pl-9 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 text-sm font-medium w-64 shadow-sm"
                />
              </div>
              <button 
                onClick={openCreateModal}
                className="px-5 py-2.5 bg-indigo-600 text-white rounded-xl font-bold shadow-md shadow-indigo-600/15 hover:bg-indigo-700 transition-all flex items-center gap-2"
              >
                <span>+</span> Ajouter un Utilisateur
              </button>
            </div>
          </div>

          <div className="table-card bg-white rounded-[2rem] border border-slate-200 shadow-xl shadow-indigo-600/20 overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-left">
                <thead className="bg-slate-50/80 border-b border-slate-100">
                  <tr>
                    <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Utilisateur</th>
                    <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Email</th>
                    <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Rôle</th>
                    <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Statut</th>
                    <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Dernière Connexion</th>
                    <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Dernière Déconnexion</th>
                    <th className="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {filteredUsers.map((user, idx) => (
                    <tr key={user.id} className="group hover:bg-slate-50/80 transition-colors table-row" style={{ animationDelay: `${0.1 * idx}s` }}>
                      <td className="px-6 py-4">
                        <div className="flex items-center gap-3">
                          <div className="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-600 text-sm">
                            {user.username.charAt(0).toUpperCase()}
                          </div>
                          <div>
                            <span className="font-bold text-slate-700 flex items-center gap-2">
                              {user.username}
                              {user.username === currentUser.username && (
                                <span className="bg-indigo-100 text-indigo-700 text-[9px] px-1.5 py-0.5 rounded font-black uppercase">Vous</span>
                              )}
                            </span>
                          </div>
                        </div>
                      </td>
                      <td className="px-6 py-4 text-sm font-medium text-slate-500">{user.email}</td>
                      <td className="px-6 py-4">{getRoleBadge(user.role)}</td>
                      <td className="px-6 py-4">{getStatusBadge(user.status)}</td>
                      <td className="px-6 py-4 text-sm text-slate-400">{user.lastLogin}</td>
                      <td className="px-6 py-4 text-sm text-slate-400">{user.lastLogout}</td>
                      <td className="px-6 py-4 text-right space-x-2">
                        <button 
                          onClick={() => { setEditingUser(user); setPasswordValue(''); setIsFormModalOpen(true); }}
                          className="text-slate-400 hover:text-indigo-600 font-semibold text-sm transition-colors px-2"
                        >
                          Éditer
                        </button>
                        <button 
                          onClick={() => { setTargetUser(user); setIsDeleteModalOpen(true); }}
                          disabled={user.username === currentUser.username}
                          className={`font-semibold text-sm transition-colors px-2 ${user.username === currentUser.username ? 'text-slate-300 cursor-not-allowed' : 'text-slate-400 hover:text-rose-600'}`}
                        >
                          Supprimer
                        </button>
                      </td>
                    </tr>
                  ))}
                  {filteredUsers.length === 0 && (
                    <tr>
                      <td colSpan="7" className="px-6 py-12 text-center text-slate-400 font-medium">Aucun utilisateur trouvé.</td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* ── Modal Création / Édition ──────────────────────────────────── */}
          {isFormModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="modal-card bg-white rounded-[2rem] w-full max-w-md p-8 shadow-2xl modal-enter">
                <h2 className="text-2xl font-bold text-slate-800 mb-6">
                  {editingUser ? 'Modifier' : 'Créer'} un Utilisateur
                </h2>
                <form className="space-y-4" onSubmit={async (e) => {
                  e.preventDefault();

                  // ✅ Bloquer la soumission si le mot de passe est faible (création seulement)
                  if (!editingUser && !isPasswordValid(passwordValue)) {
                    showToast('Le mot de passe ne respecte pas les critères de sécurité', 'error');
                    return;
                  }

                  const userData = {
                    username: e.target.username.value.trim(),
                    email:    e.target.email.value.trim(),
                    password: !editingUser ? passwordValue : undefined,
                    role:     e.target.role.value,
                  };

                  try {
                    const response = await fetch('http://127.0.0.1:5000/users', {
                      method:  'POST',
                      headers: window.NetGuardAuth.getAuthHeaders(),
                      body:    JSON.stringify(userData),
                    });
                    const result = await response.json();

                    if (response.ok) {
                      closeFormModal();
                      showToast('Utilisateur créé avec succès');
                      fetchUsers();

                      // ✅ Audit : enregistre qui a créé quel utilisateur
                      window.NetGuardAudit.userCreated({
                        username: userData.username,
                        role:     userData.role,
                      });

                    } else {
                      showToast(result.error || 'Erreur', 'error');

                      // ✅ Audit : tentative échouée
                      window.NetGuardAudit.log({
                        action:   'Tentative création utilisateur',
                        target:   `${userData.username} — ${result.error || 'erreur inconnue'}`,
                        severity: 'Medium',
                        success:  false,
                      });
                    }
                  } catch (err) {
                    showToast('Erreur serveur', 'error');
                  }
                }}>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Nom d'utilisateur</label>
                    <input type="text" name="username" defaultValue={editingUser?.username} required
                      className="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 bg-slate-50 font-medium" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Email</label>
                    <input type="email" name="email" defaultValue={editingUser?.email} required
                      className="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 bg-slate-50 font-medium" />
                  </div>

                  {/* ✅ Champ mot de passe avec validation temps réel (création uniquement) */}
                  {!editingUser && (
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1">Mot de passe</label>
                      <input
                        key="pw-field"
                        type="password"
                        name="password"
                        defaultValue=""
                        autoComplete="new-password"
                        onChange={(e) => setPasswordValue(e.target.value)}
                        required
                        className={`w-full border rounded-xl p-3 outline-none focus:border-indigo-500 bg-slate-50 transition-colors ${
                          passwordValue.length > 0
                            ? isPasswordValid(passwordValue)
                              ? 'border-emerald-400'
                              : 'border-rose-300'
                            : 'border-slate-200'
                        }`}
                      />
                      {/* Indicateur de force */}
                      <PasswordStrengthIndicator password={passwordValue} />
                    </div>
                  )}

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Rôle</label>
                    <select name="role" defaultValue={editingUser?.role || 'AUDITOR'}
                      className="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 font-bold text-slate-700 bg-slate-50">
                      <option value="ADMIN">ADMIN</option>
                      <option value="NETWORK_ADMIN">NETWORK_ADMIN</option>
                      <option value="SECURITY_ADMIN">SECURITY_ADMIN</option>
                      <option value="AUDITOR">AUDITOR</option>
                    </select>
                  </div>

                  <div className="p-3 bg-amber-50 border border-amber-200 rounded-xl mt-4 flex items-start gap-2">
                    <span className="text-amber-500 mt-0.5">⚠️</span>
                    <p className="text-xs font-medium text-amber-800">
                      Toute modification de rôle affectera les permissions de l'utilisateur immédiatement.
                    </p>
                  </div>

                  <div className="flex gap-3 mt-8 pt-4 border-t border-slate-100">
                    <button type="button" onClick={closeFormModal}
                      className="flex-1 py-3 font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all">
                      Annuler
                    </button>
                    {/* ✅ Bouton désactivé si mot de passe invalide (création seulement) */}
                    <button
                      type="submit"
                      disabled={!editingUser && !isPasswordValid(passwordValue)}
                      className={`flex-1 py-3 text-white font-bold rounded-xl shadow-lg transition-all ${
                        !editingUser && !isPasswordValid(passwordValue)
                          ? 'bg-slate-300 cursor-not-allowed shadow-none'
                          : 'bg-indigo-600 shadow-indigo-600/15 hover:bg-indigo-700'
                      }`}
                    >
                      {editingUser ? 'Mettre à jour' : 'Créer'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ── Modal Suppression ─────────────────────────────────────────── */}
          {isDeleteModalOpen && targetUser && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="modal-card bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl modal-enter text-center">
                <div className="w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <span className="text-2xl">🗑️</span>
                </div>
                <h2 className="text-xl font-bold text-slate-800 mb-2">Supprimer l'utilisateur ?</h2>
                <p className="text-sm text-slate-500 mb-6">
                  Êtes-vous sûr de vouloir supprimer définitivement <strong>{targetUser.username}</strong> ?
                  Cette action est irréversible.
                </p>
                <div className="flex gap-3">
                  <button onClick={() => setIsDeleteModalOpen(false)}
                    className="flex-1 py-2.5 font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all">
                    Annuler
                  </button>
                  <button 
                    onClick={async () => {
                      try {
                        const resp = await fetch(`http://127.0.0.1:5000/users/${targetUser.id}`, {
                          method:  'DELETE', 
                          headers: window.NetGuardAuth.getAuthHeaders(),
                        });

                        if (resp.ok) {
                          setUsers(users.filter(u => u.id !== targetUser.id));
                          setIsDeleteModalOpen(false);
                          showToast('Utilisateur supprimé', 'error');

                          // ✅ Audit : suppression réelle enregistrée
                          window.NetGuardAudit.userDeleted({
                            username: targetUser.username,
                            id:       targetUser.id,
                          });
                        } else {
                          showToast('Erreur lors de la suppression', 'error');
                        }
                      } catch (e) {
                        showToast('Erreur réseau', 'error');
                      }
                    }} 
                    className="flex-1 py-2.5 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 transition-all"
                  >
                    Supprimer
                  </button>
                </div>
              </div>
            </div>
          )}

          {toast && (
            <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-xl shadow-2xl font-bold text-sm text-white modal-enter z-50 flex items-center gap-3 ${toast.type === 'error' ? 'bg-slate-800' : 'bg-emerald-600'}`}>
              <span>{toast.type === 'error' ? '🗑️' : '✅'}</span>
              {toast.message}
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('users-root'));
    root.render(<UsersPage />);
  </script>
  
  <script src="sidebar.js"></script>
  <script src="topbar.js"></script>
</body>
</html>
