<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGuard - Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', sans-serif; background-color: #f8fafc; }
    
    /* Animation de fond (subtile) */
    .bg-grid {
      background-size: 40px 40px;
      background-image: linear-gradient(to right, rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
  
  <div class="bg-grid"></div>
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-500/20 rounded-full blur-3xl"></div>

  <div id="login-root" class="w-full max-w-md z-10 p-4"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- BASE DE DONNÉES FICTIVE ---
    const mockUsers = {
      'admin': { password: '123', role: 'ADMIN', name: 'Super Admin' },
      'net': { password: '123', role: 'NETWORK', name: 'Ingénieur Réseau' },
      'sec': { password: '123', role: 'SECURITY', name: 'Analyste SOC' },
      'audit': { password: '123', role: 'VIEWER', name: 'Auditeur Externe' }
    };

    const LoginPage = () => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      // Si l'utilisateur est déjà connecté, on le redirige direct
      useEffect(() => {
        if (localStorage.getItem('userRole')) {
          window.location.href = 'network-dashboard (1).html';
        }
      }, []);

      const handleLogin = (e) => {
        e.preventDefault();
        setError('');
        setIsLoading(true);

        // Simulation d'un appel API (délai de 800ms)
        setTimeout(() => {
          const user = mockUsers[username.toLowerCase()];
          
          if (user && user.password === password) {
            // 1. Succès : On sauvegarde le rôle et le nom dans le navigateur
            localStorage.setItem('userRole', user.role);
            localStorage.setItem('userName', user.name);
            localStorage.setItem('userId', username.toLowerCase());
            
            // 2. Redirection vers le tableau de bord
            window.location.href = 'network-dashboard (1).html';
          } else {
            // Échec
            setError('Identifiant ou mot de passe incorrect.');
            setIsLoading(false);
          }
        }, 800);
      };

      return (
        <div className="glass-card p-10 rounded-[2.5rem] shadow-2xl shadow-indigo-900/10 border border-white animate-in relative">
          
          {/* Logo */}
          <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mb-8 shadow-lg shadow-indigo-600/30">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>

          <h1 className="text-3xl font-bold text-slate-800 mb-2 tracking-tight">NetGuard</h1>
          <p className="text-slate-500 mb-8 font-medium">Connectez-vous pour accéder à l'infrastructure.</p>

          <form onSubmit={handleLogin} className="space-y-5">
            {error && (
              <div className="p-4 bg-rose-50 text-rose-600 border border-rose-200 rounded-xl text-sm font-bold flex items-center gap-2">
                <span>⚠️</span> {error}
              </div>
            )}

            <div>
              <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Identifiant</label>
              <input 
                type="text" 
                value={username}
                onChange={(e) => setUsername(e.target.value)}
                required
                className="w-full border border-slate-200 rounded-xl p-3.5 text-slate-800 font-medium outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all bg-slate-50/50" 
                placeholder="Ex: admin"
              />
            </div>

            <div>
              <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Mot de passe</label>
              <input 
                type="password" 
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                required
                className="w-full border border-slate-200 rounded-xl p-3.5 text-slate-800 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all bg-slate-50/50" 
                placeholder="••••••"
              />
            </div>

            <button 
              type="submit" 
              disabled={isLoading}
              className={`w-full py-3.5 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-600/20 transition-all flex items-center justify-center gap-2 ${isLoading ? 'opacity-75 cursor-not-allowed' : 'hover:bg-indigo-700 hover:-translate-y-0.5'}`}
            >
              {isLoading ? (
                <span className="animate-pulse">Authentification...</span>
              ) : (
                <>Connexion <span>→</span></>
              )}
            </button>
          </form>

          {/* Zone de test pour la démo */}
          <div className="mt-8 pt-6 border-t border-slate-100">
            <p className="text-[10px] font-bold text-slate-400 uppercase mb-3">Comptes de test (Mdp: 123)</p>
            <div className="flex gap-2 flex-wrap">
              <span onClick={()=>setUsername('admin')} className="cursor-pointer px-2.5 py-1 bg-rose-50 text-rose-600 rounded text-xs font-bold">admin</span>
              <span onClick={()=>setUsername('net')} className="cursor-pointer px-2.5 py-1 bg-blue-50 text-blue-600 rounded text-xs font-bold">net</span>
              <span onClick={()=>setUsername('sec')} className="cursor-pointer px-2.5 py-1 bg-orange-50 text-orange-600 rounded text-xs font-bold">sec</span>
              <span onClick={()=>setUsername('audit')} className="cursor-pointer px-2.5 py-1 bg-slate-100 text-slate-600 rounded text-xs font-bold">audit</span>
            </div>
          </div>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('login-root'));
    root.render(<LoginPage />);
  </script>
</body>
</html>
